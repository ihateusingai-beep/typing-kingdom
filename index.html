        // ───────────────────────────────────────────────────────────────

        // ───────────────────────────────────────────────────────────────
        const AudioEngine = {
            ctx: null,
            init() { if (!this.ctx) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } if (this.ctx.state === 'suspended') this.ctx.resume(); },
            tone(f, t, d, v = 0.08, slideTo = null) {
                if (!this.ctx) this.init();
                const c = this.ctx.currentTime, o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, c);
                if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, c + d);
                g.gain.setValueAtTime(0, c); g.gain.linearRampToValueAtTime(v, c + 0.02);
                g.gain.exponentialRampToValueAtTime(0.001, c + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(c + d);
            },
            correct() { this.tone(880,'sine',0.15); setTimeout(()=>this.tone(1108,'sine',0.2),50); },
            wrong()   { this.tone(150,'triangle',0.3,0.12,100); },
            click()   { this.tone(1200,'sine',0.03,0.02); },

        const generateDecoys = (q, count = 2) => {
            const same = QUESTIONS.filter(x => x.mainCode === q.mainCode && x.code !== q.code);
            const others = QUESTIONS.filter(x => x.mainCode !== q.mainCode);
            const pool = same.length >= count ? same : [...same, ...others];
            return [...pool].sort(() => Math.random() - 0.5).slice(0, count);
        };

            burst:    { id:'burst',   name:'爆裂魔法', cost:0,    icon:Flame,    color:'bg-red-500',    effect: p => ({ ...p, bonusDmg: p.atk*2, log:'下次傷害 200%' }) },

            thunder:  { id:'thunder', name:'雷擊',     cost:1200, icon:Zap,      color:'bg-yellow-500', effect: p => ({ ...p, damageDealt:100, log:'100 真實傷害' }) },
            shuffle:  { id:'shuffle', name:'重置',     cost:500,  icon:Shuffle,  color:'bg-purple-500', effect: p => ({ ...p, log:'更換題目！' }) },
        };

        const META_UPGRADES = {
            hp:  { name:'生命',  baseCost:200, costMult:1.8, effectVal:10,  icon:Heart,  desc:'+10 HP' },
            atk: { name:'攻擊',  baseCost:300, costMult:2.0, effectVal:5,   icon:Sword,  desc:'+5 ATK' },
            exp: { name:'經驗',  baseCost:500, costMult:2.2, effectVal:0.05, icon:Star,   desc:'+5% EXP' },
        };

        const RPG_ARTIFACTS = [
            { id:'wand_1',  name:'新手法杖',   icon:Wand2,     cost:0,   unlockCost:0,    desc:'ATK+5',       effect:p => ({...p, atk:p.atk+5}) },
            { id:'robe_1',  name:'布衣',       icon:Sparkles,  cost:0,   unlockCost:0,    desc:'HP+20',       effect:p => ({...p, maxHp:p.maxHp+20, hp:p.hp+20}) },
            { id:'ring_1',  name:'幸運戒指',   icon:Gem,       cost:0,   unlockCost:0,    desc:'EXP+10%',     effect:p => ({...p, expMult:(p.expMult||1)+0.1}) },
            { id:'boots_1', name:'輕便鞋',     icon:Gem,       cost:0,   unlockCost:0,    desc:'Dodge+5%',    effect:p => ({...p, dodge:(p.dodge||0)+0.05}) },
            { id:'crit',    name:'暴擊之刃',   icon:Zap,       cost:150, unlockCost:500,  desc:'Crit+15%',    effect:p => ({...p, critChance:(p.critChance||0.1)+0.15}) },
            { id:'life',    name:'吸血項鏈',   icon:Droplets,  cost:300, unlockCost:800,  desc:'Lifesteal+15%',effect:p => ({...p, lifesteal:(p.lifesteal||0)+0.15}) },
            { id:'thorns', name:'反傷甲',      icon:Shield,    cost:250, unlockCost:600,  desc:'Thorns+20%',  effect:p => ({...p, thorns:(p.thorns||0)+0.2}) },
            { id:'phoenix', name:'鳳凰灰燼',   icon:Flame,     cost:0,   unlockCost:2000, desc:'復活一次',   effect:p => ({...p, revive:true}) },
        ];

        const THEMES = {
            FOREST: { bg:'bg-gradient-to-b from-sky-300 to-blue-100', road:'from-slate-700 to-slate-900', decor:Trees },
            DARK:   { bg:'bg-gradient-to-b from-slate-800 to-slate-950', road:'from-slate-700 to-black', decor:Moon },
            SUNSET: { bg:'bg-gradient-to-b from-orange-400 to-red-600', road:'from-red-900 to-orange-900', decor:Flame },
        };

        const AVATARS = {
            hero:   { id:'hero',   name:'蒼穹劍士', icon:Sword,  color:'text-cyan-400',  bg:'bg-cyan-500',   glow:'shadow-cyan-500/50' },
            heroine:{ id:'heroine',name:'緋紅魔導', icon:Wand2,  color:'text-rose-400',  bg:'bg-rose-500',   glow:'shadow-rose-500/50' }
        };

        // ───────────────────────────────────────────────────────────────
        // 共用鍵盤 UI 組件
        // ───────────────────────────────────────────────────────────────
        const KeyboardUI = ({ inputMode, userInput, currentQ, monster, onKey, disabled }) => {
            const isConfused = monster?.type?.effect === 'confusion';
            const isBlind    = monster?.type?.effect === 'blind';
            const keys = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');

            if (inputMode === 'radical') return null; // radical uses options UI

            return (
                <div className="w-full max-w-3xl mx-auto p-2">
                    <div className="flex justify-center mb-3 space-x-2 min-h-[48px] flex-wrap">
                        {userInput.map((k, i) => (
                            <div key={i} className="w-11 h-11 border-2 border-magic-500 rounded-lg flex items-center justify-center text-xl font-bold bg-slate-800 text-magic-300 animate-float-up">
                                {KEYBOARD_MAP[k]}
                            </div>
                        ))}
                    </div>
                    <div className="keyboard-grid">
                        {keys.map(k => (
                            <button key={k} onClick={() => onKey(k)} disabled={disabled}
                                className={`aspect-square rounded flex flex-col items-center justify-center text-xs transition-all active:scale-90
                                    ${disabled ? 'bg-slate-800 border border-slate-700 opacity-40 cursor-not-allowed' :
                                      'bg-slate-800 border border-slate-700 hover:bg-slate-700 active:bg-slate-600'}`}>
                                <span className="text-slate-500">{k}</span>
                                <span className={`font-bold text-magic-300 ${isBlind || isConfused ? 'opacity-30' : ''}`}>{KEYBOARD_MAP[k]}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        // 選項式 UI (radical mode)
        const OptionsUI = ({ currentQ, onSelect, disabled }) => {
            const options = useMemo(() => {
                const correct = { label:`${KEYBOARD_MAP[currentQ.code[0]]} (${currentQ.code[0]})`, val: currentQ.code[0], isCorrect:true };
                const decoys = generateDecoys(currentQ, 2).map(d => ({ label:`${KEYBOARD_MAP[d.code[0]]||'?'} (${d.code[0]})`, val:d.code[0], isCorrect:false }));
                return [correct, ...decoys].sort(() => Math.random() - 0.5);
            }, [currentQ]);

            return (
                <div className="grid grid-cols-3 gap-4 max-w-2xl mx-auto p-4">
                    {options.map((o, i) => (
                        <button key={i} onClick={() => onSelect(o.val)} disabled={disabled}
                            className={`py-6 rounded-xl text-xl font-bold border-2 transition-all active:scale-95
                                ${disabled ? 'bg-slate-800 border-slate-700 opacity-50 cursor-not-allowed' :
                                  'bg-slate-800 border-magic-600 hover:bg-slate-700 text-magic-100'}`}>
                            {o.label}
                        </button>
                    ))}
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 🎮 RPG GAME (深淵試煉)
        // ───────────────────────────────────────────────────────────────
        const RPGGame = ({ metaState, onGameEnd, goHome }) => {
            const baseStats = { hp:100+(metaState.upgrades.hp*META_UPGRADES.hp.effectVal), atk:20+(metaState.upgrades.atk*META_UPGRADES.atk.effectVal), expMult:1+(metaState.upgrades.exp*META_UPGRADES.exp.effectVal) };
            const [player, setPlayer] = useState({
                hp:baseStats.hp, maxHp:baseStats.hp, atk:baseStats.atk, level:1, exp:0, maxExp:100,
                critChance:0.1, critMult:1.5, lifesteal:0, thorns:0, dodge:0, shield:0,
                bonusDmg:0, combo:0, floor:1, gold:0, coinsGained:0, revive:false,
                avatar: metaState.avatar || 'hero',
                skills: (metaState.unlockedSkills||['heal','burst']).slice(0,4).map(sid => ({...MASTER_SKILL_POOL[sid], currentCd:0})),
                artifacts:[]
            });
            const [monster, setMonster] = useState({ hp:100, maxHp:100, name:'亂碼怪獸', type:MONSTER_TYPES[0], frozen:0 });
            const [gauge, setGauge] = useState(0);
            const [qIndex, setQIndex] = useState(0);
            const [turn, setTurn] = useState('player');
            const [userInput, setUserInput] = useState([]);
            const [combatLog, setCombatLog] = useState('戰鬥開始！');
            const [anim, setAnim] = useState(null);
            const [rewards, setRewards] = useState([]);
            const [showStats, setShowStats] = useState(false);
            const [sessionStats, setSessionStats] = useState({ correct:0, wrong:0, maxCombo:0 });

            const filteredQuestions = useMemo(() => QUESTIONS, []);
            const currentQ = useMemo(() => filteredQuestions[Math.floor(Math.random()*filteredQuestions.length)], [qIndex]);

            const spawnMonster = useCallback(() => {
                const isBoss = player.floor % 5 === 0;
                const pool = MONSTER_TYPES.filter(m => isBoss ? m.isBoss : !m.isBoss);
                const type = pool[Math.floor(Math.random()*pool.length)];
                const scale = 1 + (player.floor * 0.25);
                const hp = Math.floor(100 * type.hpMod * scale);
                setMonster({ hp, maxHp:hp, name:`${isBoss?'【BOSS】':''}${type.name} (F${player.floor})`, type, frozen:0 });
                setGauge(0);
                let log = `F${player.floor}: 遭遇 ${type.name}！`;
                if (type.effect) log += ` (${type.effectName})`;
                setCombatLog(log);
            }, [player.floor]);

            useEffect(() => { spawnMonster(); }, []);

            // Gauge timer
            useEffect(() => {
                let interval;
                if (turn === 'player') {
                    interval = setInterval(() => {
                        if (monster.frozen > 0) { setMonster(m => ({...m, frozen: m.frozen-0.2})); return; }
                        setGauge(prev => {
                            if (prev >= 100) {
                                const dmg = Math.floor((10+player.floor*2)*monster.type.atkMod);
                                handleDamage(dmg, `${monster.type.name} 攻擊！`);
                                return 0;
                            }
                            return prev + (2.5 * monster.type.speedMod);
                        });
                    }, 200);
                }
                return () => clearInterval(interval);
            }, [turn, monster.frozen, monster.type, player.floor]);

            const handleDamage = (rawDmg, reason) => {
                if (Math.random() < player.dodge) { setCombatLog(`${reason} MISS!`); return; }
                AudioEngine.hit();
                setAnim('damage');
                const dmg = Math.max(0, rawDmg - player.shield);
                const remainingShield = Math.max(0, player.shield - rawDmg);
                if (player.thorns > 0) setMonster(m => ({...m, hp: Math.max(0, m.hp-Math.floor(rawDmg*player.thorns))}));
                setPlayer(p => ({ ...p, hp: Math.max(0, p.hp-dmg), shield: remainingShield, combo:0 }));
                setCombatLog(`${reason} 受到 ${dmg} 傷害！`);
                setTimeout(() => {
                    setAnim(null);
                    if (player.hp - dmg <= 0) {
                        if (player.revive) { setPlayer(p => ({...p, hp:p.maxHp, revive:false})); setCombatLog("鳳凰灰燼觸發！"); }
                        else { setTurn('lose'); AudioEngine.lose(); }
                    }
                }, 300);
            };

            const resolveAttack = () => {
                setSessionStats(prev => ({ ...prev, correct: prev.correct+1, maxCombo: Math.max(prev.maxCombo, player.combo+1) }));
                const comboMult = 1 + (player.combo * 0.1);
                let dmg = (player.atk + player.bonusDmg) * comboMult;
                const isCrit = Math.random() < player.critChance;
                if (isCrit) { dmg *= player.critMult; AudioEngine.crit(); } else AudioEngine.attack();
                dmg = Math.floor(dmg);
                if (player.lifesteal > 0) setPlayer(p => ({...p, hp: Math.min(p.maxHp, p.hp+Math.floor(dmg*player.lifesteal))}));
                const newCombo = player.combo + 1;
                let log = `${isCrit?'會心！':''} -${dmg}`;
                let bonusHp = 0, bonusShield = 0;
                if (newCombo > 0 && newCombo % 10 === 0) { bonusHp = Math.floor(player.maxHp*0.05); bonusShield = 10; AudioEngine.powerUp(); log = `連擊獎勵！+${bonusHp}HP +${bonusShield}盾`; }
                setPlayer(p => ({ ...p, bonusDmg:0, combo:newCombo, hp:Math.min(p.maxHp,p.hp+bonusHp), shield:p.shield+bonusShield }));
                setMonster(m => ({...m, hp: Math.max(0, m.hp-dmg)}));
                setCombatLog(log);
                setGauge(prev => Math.max(0, prev-10));
                if (monster.hp - dmg <= 0) setTimeout(handleVictory, 600); else setTimeout(() => setUserInput([]), 600);
            };

            const handleVictory = () => {
                AudioEngine.levelUp();
                const expGain = Math.floor((50+player.floor*10)*baseStats.expMult);
                const coinGain = 15 + Math.floor(player.floor*3);
                let newExp = player.exp + expGain;
                let newLevel = player.level;
                let newMaxExp = player.maxExp;
                let leveledUp = false;
                if (newExp >= player.maxExp) { newExp -= player.maxExp; newLevel++; newMaxExp = Math.floor(newMaxExp*1.2); leveledUp = true; }
                setPlayer(p => ({...p, exp:newExp, level:newLevel, maxExp:newMaxExp, maxHp:leveledUp?p.maxHp+10:p.maxHp, atk:leveledUp?p.atk+2:p.atk, hp:leveledUp?p.maxHp:p.hp, floor:p.floor+1, coinsGained:p.coinsGained+coinGain, gold:p.gold+coinGain }));
                const pool = RPG_ARTIFACTS.filter(a => a.unlockCost===0 || metaState.unlockedArtifacts.includes(a.id)).sort(()=>0.5-Math.random()).slice(0,5);
                setRewards(pool);
                setTurn('reward');
            };

            const handleKey = (key) => {
                if (turn !== 'player') return;
                const targetCode = getTargetCode(currentQ, 'cangjie');
                const next = [...userInput, key];
                if (targetCode.startsWith(next.join(''))) {
                    if (next.join('') === targetCode) { resolveAttack(); setUserInput([]); }
                    else { AudioEngine.click(); setUserInput(next); }
                } else { AudioEngine.wrong(); setCombatLog("按錯了！"); setPlayer(p => ({...p, combo:0})); setSessionStats(prev => ({...prev, wrong:prev.wrong+1})); setUserInput([]); }
            };

            const handleSelect = (val) => {
                if (turn !== 'player') return;
                if (val === currentQ.code[0]) resolveAttack();
                else { AudioEngine.wrong(); setCombatLog("選錯了！"); setPlayer(p => ({...p, combo:0})); setSessionStats(prev => ({...prev, wrong:prev.wrong+1})); }
            };

            if (turn === 'lose') return (
                <div className="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center text-white p-8 z-50">
                    <LucideIcon icon={Skull} size={80} className="text-red-500 mb-6" />
                    <h2 className="text-4xl font-bold mb-2 text-red-500">挑戰結束</h2>
                    <p className="text-xl mb-4">止步於第 {player.floor} 層</p>
                    <div className="bg-slate-800 p-6 rounded-2xl mb-8"><p className="text-sm text-gold-400 mb-2">本次獲得</p><div className="flex items-center gap-2 text-3xl font-bold text-yellow-400"><LucideIcon icon={Coins}/> <span>{player.coinsGained}</span></div></div>
                    <button onClick={()=>onGameEnd(player.coinsGained, sessionStats)} className="bg-slate-700 hover:bg-slate-600 px-8 py-3 rounded-full font-bold">返回聖殿</button>
                </div>
            );

            if (turn === 'reward') return (
                <div className="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center text-white p-4 z-50">
                    <h2 className="text-3xl font-bold text-yellow-400 mb-8 animate-bounce">戰利品選擇</h2>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4 max-w-5xl w-full">
                        {rewards.map((r,i) => (
                            <button key={i} onClick={() => { AudioEngine.correct(); const newP = r.effect(player); setPlayer({...newP, artifacts:[...newP.artifacts,{id:r.id,name:r.name,icon:r.icon,desc:r.desc}]}); setTimeout(()=>{setTurn('player'); spawnMonster();},300); }}
                                className="bg-slate-800 border-2 border-magic-600 hover:scale-105 transition-transform p-4 rounded-xl flex flex-col items-center">
                                <LucideIcon icon={r.icon} size={36} className="text-yellow-400 mb-3" />
                                <h3 className="text-lg font-bold mb-1">{r.name}</h3>
                                <p className="text-xs text-slate-400">{r.desc}</p>
                            </button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className={`h-full w-full flex flex-col bg-slate-950 text-white relative overflow-hidden ${anim==='damage'?'animate-damage-flash':''}`}>
                    <div className="p-3 bg-slate-900/90 border-b border-slate-800 flex justify-between items-center z-10">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={()=>setShowStats(!showStats)}>
                            <div className="w-12 h-12 bg-magic-700 rounded-lg flex flex-col items-center justify-center border-2 border-magic-500">
                                <span className="text-xs">LV</span><span className="font-bold text-xl">{player.level}</span>
                            </div>
                            <div>
                                <div className="text-xs text-slate-400 flex justify-between w-32"><span>F{player.floor}</span><span className="text-yellow-400 font-bold">Combo {player.combo}</span></div>
                                <div className="w-32 h-3 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-red-500 transition-all" style={{width:`${(player.hp/player.maxHp)*100}%`}}/></div>
                                <div className="text-[10px] text-right">{player.hp}/{player.maxHp}</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-1 text-gold-400 font-bold bg-slate-800 px-3 py-1 rounded-full text-sm"><LucideIcon icon={Coins} size={14}/> {player.gold}</div>
                            <button onClick={goHome} className="p-2 bg-red-900/50 text-red-400 rounded hover:bg-red-900"><LucideIcon icon={X} size={18}/></button>
                        </div>
                    </div>
                    {showStats && <div className="absolute top-20 left-4 bg-slate-900/95 border border-slate-700 p-4 rounded-xl z-40 text-sm shadow-xl">
                        <h4 className="font-bold text-magic-300 mb-2">屬性</h4>
                        <p>⚔️ {player.atk} | ⚡ {Math.round(player.critChance*100)}% | 🩸 {Math.round((player.lifesteal||0)*100)}%</p>
                        <h4 className="font-bold text-magic-300 mt-2 mb-2">遺物</h4>
                        <div className="flex flex-wrap gap-1">{player.artifacts.map((a,i)=><div key={i} title={a.name} className="bg-slate-800 p-1.5 rounded border border-slate-600"><LucideIcon icon={a.icon} size={16} className="text-yellow-500"/></div>)}</div>
                    </div>}

                    <div className="flex-1 relative flex flex-col items-center justify-center">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-magic-900/30 to-slate-950 -z-10"/>
                        {/* Skills */}
                        <div className="absolute top-4 flex gap-3 z-20">
                            {player.skills.map((s,i) => (
                                <button key={s.id} onClick={() => { AudioEngine.skill(); if(s.id==='heal'){const v=Math.floor(player.maxHp*0.3); setPlayer(p=>({...p,hp:Math.min(p.maxHp,p.hp+v)})); setCombatLog(`回覆 ${v} HP`);} else if(s.id==='burst'){setPlayer(p=>({...p,bonusDmg:p.atk*2})); setCombatLog('下次傷害 200%！');} setPlayer(p=>({...p,skills:p.skills.map((sk,j)=>j===i?{...sk,currentCd:5}:sk)})); }}
                                    disabled={s.currentCd>0} className={`w-13 h-13 rounded-full border-2 flex items-center justify-center relative transition-transform active:scale-95 ${s.currentCd>0?'bg-slate-800 border-slate-600 opacity-50 cursor-not-allowed':`${s.color} border-white shadow-lg`}`}>
                                    <LucideIcon icon={s.icon} size={22} className="text-white"/>
                                    {s.currentCd>0&&<div className="absolute inset-0 bg-black/60 rounded-full flex items-center justify-center font-bold text-white">{s.currentCd}</div>}
                                </button>
                            ))}
                        </div>
                        {/* Monster */}
                        <motion.div animate={{y:[0,-10,0]}} transition={{repeat:Infinity,duration:3}} className="relative z-10 mt-8 mb-4">
                            <div className="w-40 h-40 bg-slate-800 rounded-full border-4 border-magic-500 flex items-center justify-center shadow-[0_0_30px_rgba(139,92,246,0.4)]">
                                <LucideIcon icon={monster.type.icon} size={80} className={monster.type.color}/>
                                <span className="absolute text-7xl font-serif font-black text-white drop-shadow-md">{currentQ.char}</span>
                                {monster.frozen>0&&<div className="absolute inset-0 flex items-center justify-center bg-cyan-500/30 rounded-full"><LucideIcon icon={Snowflake} size={64} className="text-white animate-pulse"/></div>}
                            </div>
                            <div className="absolute -bottom-6 left-1/2 transform -translate-x-1/2 w-32 h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-600"><motion.div className="h-full bg-red-500" style={{width:`${gauge}%`}} transition={{ease:'linear',duration:0.2}}/></div>
                            <div className="absolute -top-8 w-full text-center text-red-400 font-bold text-sm">{monster.name}</div>
                        </motion.div>
                        <div className="text-center h-8 font-bold text-lg text-magic-200 mb-4">{combatLog}</div>
                    </div>

                    <div className="bg-slate-900 border-t border-slate-800 p-4 rounded-t-3xl shadow-2xl relative z-20">
                        <div className="text-center mb-3 text-slate-400 text-sm">
                            輸入全碼：{currentQ.code} — 提示：{currentQ.hint}
                        </div>
                        <KeyboardUI inputMode="cangjie" userInput={userInput} currentQ={currentQ} monster={monster} onKey={handleKey} disabled={turn!=='player'}/>
                    </div>
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 🏃 RUNNER GAME (速成跑酷)
        // ───────────────────────────────────────────────────────────────
        const RunnerGame = ({ chapter, goHome }) => {
            const [qIndex, setQIndex] = useState(0);
            const [gameState, setGameState] = useState('running');
            const [userInput, setUserInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [message, setMessage] = useState(null);
            const [time, setTime] = useState(0);
            const [score, setScore] = useState(0);
            const [qStartTime, setQStartTime] = useState(null);
            const [sessionStats, setSessionStats] = useState({ correct:0, wrong:0, maxCombo:0 });
            const [currentCombo, setCurrentCombo] = useState(0);
            const theme = THEMES.FOREST;

            const filtered = useMemo(() => chapter ? QUESTIONS.filter(q=>q.mainCode===chapter) : QUESTIONS, [chapter]);
            const currentQ = useMemo(() => filtered[Math.floor(Math.random()*filtered.length)], [qIndex]);

            const charProgress = (qIndex / 10) * 80;
            const charPos = gameState==='win' ? 90 : 10 + charProgress;

            useEffect(() => { const i = setInterval(() => setTime(t => t+1), 1000); return () => clearInterval(i); }, []);
            useEffect(() => { if (gameState==='running') { const t = setTimeout(() => { setGameState('bullet_time'); setQStartTime(Date.now()); }, 2000); return () => clearTimeout(t); } }, [gameState, qIndex]);

            const processAnswer = useCallback(() => {
                AudioEngine.correct();
                setFeedback('correct');
                const speedBonus = Math.max(0, Math.floor(50-((Date.now()-qStartTime)/1000)*5));
                setScore(s => s + 100 + speedBonus);
                setCurrentCombo(c => { const n=c+1; setSessionStats(prev=>({...prev, correct:prev.correct+1, maxCombo:Math.max(prev.maxCombo,n)})); return n; });
                setTimeout(() => { setFeedback(null); setUserInput([]); setQIndex(q=>q+1); setGameState('running'); }, 1000);
            }, [qStartTime]);

            const handleWrong = () => {
                AudioEngine.wrong();
                setFeedback('wrong');
                setMessage('再試一次！');
                setCurrentCombo(0);
                setSessionStats(prev => ({...prev, wrong:prev.wrong+1}));

                    else { AudioEngine.click(); setUserInput(next); }
                } else { handleWrong(); setUserInput([]); }

        // ───────────────────────────────────────────────────────────────
        // 📖 SELF-LEARN GAME (自學練習)

        const SelfLearnGame = ({ chapter, goHome }) => {

            const handleKey = (key) => {

                    } else { AudioEngine.click(); setUserInput(next); }
                } else { AudioEngine.wrong(); setFeedback('wrong'); setStats(s=>({...s, wrong:s.wrong+1})); setTimeout(() => { setFeedback(null); setUserInput([]); }, 1000); }

        // ───────────────────────────────────────────────────────────────
        // ⚡ SPEED GAME (速打模式)
        // ───────────────────────────────────────────────────────────────
        const SpeedGame = ({ chapter, goHome }) => {
            const [qIndex, setQIndex] = useState(0);
            const [userInput, setUserInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [timeLeft, setTimeLeft] = useState(60);
            const [score, setScore] = useState(0);
            const [wpm, setWpm] = useState(0);
            const [gameState, setGameState] = useState('ready'); // ready | playing | done
            const [stats, setStats] = useState({ correct:0, wrong:0 });
            const qStartRef = useRef(Date.now());
            const filtered = useMemo(() => chapter ? QUESTIONS.filter(q=>q.mainCode===chapter) : QUESTIONS, [chapter]);
            const currentQ = useMemo(() => filtered[qIndex % filtered.length], [qIndex]);

            useEffect(() => {
                if (gameState !== 'playing') return;
                if (timeLeft <= 0) { setGameState('done'); AudioEngine.win(); return; }
                const i = setInterval(() => setTimeLeft(t => t-1), 1000);
                return () => clearInterval(i);
            }, [gameState, timeLeft]);

            const processAnswer = () => {
                const elapsed = (Date.now() - qStartRef.current) / 1000;
                const wpmCalc = Math.round((score + 100) / (60 - timeLeft + elapsed) * 60);
                setWpm(wpmCalc || 0);
                setScore(s => s + 100);
                setStats(s => ({...s, correct: s.correct+1}));
                AudioEngine.correct();
                setFeedback('correct');
                qStartRef.current = Date.now();
                setTimeout(() => { setFeedback(null); setUserInput([]); setQIndex(q => q+1); }, 400);
            };

            const handleKey = (key) => {
                if (gameState === 'ready') { setGameState('playing'); qStartRef.current = Date.now(); }
                if (gameState !== 'playing' || feedback) return;
                const target = getTargetCode(currentQ, 'cangjie');
                const next = [...userInput, key];
                if (target.startsWith(next.join(''))) {
                    if (next.join('') === target) processAnswer();
                    else { AudioEngine.click(); setUserInput(next); }

                            <div className="text-8xl font-serif font-black mb-6">{currentQ?.char}</div>
                            <div className="text-center text-slate-400 mb-4">全碼：{currentQ?.code} | 提示：{currentQ?.hint}</div>
                            <div className="flex justify-center mb-4 space-x-2 min-h-[48px] flex-wrap">{userInput.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-orange-500 rounded-lg flex items-center justify-center text-xl font-bold bg-slate-800 text-orange-300">{KEYBOARD_MAP[k]}</div>)}</div>
                            <KeyboardUI inputMode="cangjie" userInput={userInput} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={!!feedback}/>
                        </div>
                    )}
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 📝 VOCABULARY GAME (單字闖關)
        // ───────────────────────────────────────────────────────────────
        const VocabularyGame = ({ chapter, goHome }) => {
            const TOTAL = 10;
            const [qIndex, setQIndex] = useState(0);
            const [userInput, setUserInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [lives, setLives] = useState(3);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [gameState, setGameState] = useState('playing');
            const [stats, setStats] = useState({ correct:0, wrong:0 });
            const filtered = useMemo(() => chapter ? QUESTIONS.filter(q=>q.mainCode===chapter) : QUESTIONS, [chapter]);
            const currentQ = useMemo(() => filtered[qIndex % filtered.length], [qIndex]);

            const processAnswer = () => {
                AudioEngine.correct();
                setFeedback('correct');
                const streakBonus = Math.min(streak * 10, 50);
                setScore(s => s + 100 + streakBonus);
                setStreak(s => s+1);
                setStats(s => ({...s, correct:s.correct+1}));
                if (qIndex+1 >= TOTAL) { AudioEngine.win(); setGameState('win'); }
                else setTimeout(() => { setFeedback(null); setUserInput([]); setQIndex(q=>q+1); }, 600);
            };

            const handleWrong = () => {
                AudioEngine.wrong();
                setFeedback('wrong');
                setLives(l => { const n=l-1; if(n<=0) { AudioEngine.lose(); setGameState('lose'); } return n; });
                setStreak(0);
                setStats(s => ({...s, wrong:s.wrong+1}));
                setTimeout(() => { setFeedback(null); setUserInput([]); }, 800);

            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [gameState, userInput, currentQ, feedback]);

                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-8">
                        <div className="text-8xl font-serif font-black mb-4">{currentQ?.char}</div>
                        <div className="text-center text-slate-400 mb-4">全碼：{currentQ?.code} | 提示：{currentQ?.hint}</div>
                        <div className="flex justify-center mb-4 space-x-2 min-h-[48px] flex-wrap">{userInput.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-teal-500 rounded-lg flex items-center justify-center text-xl font-bold bg-slate-800 text-teal-300">{KEYBOARD_MAP[k]}</div>)}</div>
                        <KeyboardUI inputMode="cangjie" userInput={userInput} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={!!feedback}/>
                    </div>

        };

        // ───────────────────────────────────────────────────────────────
        // ⏱️ CHALLENGE GAME (限時挑戰)
        // ───────────────────────────────────────────────────────────────
        const ChallengeGame = ({ chapter, goHome }) => {

            const [qIndex, setQIndex] = useState(0);

                    if (next.join('') === target) processAnswer();
                    else { AudioEngine.click(); setUserInput(next); }

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                            <div className="bg-slate-800 p-4 rounded-xl text-center"><div className="text-3xl font-black text-yellow-400">{score}</div><div className="text-xs text-slate-400">總分</div></div>
                            <div className="bg-slate-800 p-4 rounded-xl text-center"><div className="text-3xl font-black text-green-400">{stats.correct}</div><div className="text-xs text-slate-400">答對</div></div>
                            <div className="bg-slate-800 p-4 rounded-xl text-center"><div className="text-3xl font-black text-red-400">{stats.wrong}</div><div className="text-xs text-slate-400">答錯</div></div>
                            <div className="bg-slate-800 p-4 rounded-xl text-center"><div className="text-3xl font-black text-cyan-400">{accuracy}%</div><div className="text-xs text-slate-400">準確率</div></div>

                            <h2 className="text-3xl font-bold mb-2">限時挑戰</h2>
                            <p className="text-slate-400 mb-6">3分鐘內盡量答對更多題目</p>
                            <button onClick={() => setGameState('playing')} className="bg-red-600 hover:bg-red-500 px-10 py-4 rounded-full font-bold text-xl animate-pulse">開始挑戰</button>
                        </div>
                    ) : (
                        <div className="flex-1 flex flex-col items-center justify-center p-6">
                            <div className="text-8xl font-serif font-black mb-4">{currentQ?.char}</div>
                            <div className="text-center text-slate-400 mb-4">全碼：{currentQ?.code} | 提示：{currentQ?.hint}</div>
                            <div className="flex justify-center mb-4 space-x-2 min-h-[48px] flex-wrap">{userInput.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-red-500 rounded-lg flex items-center justify-center text-xl font-bold bg-slate-800 text-red-300">{KEYBOARD_MAP[k]}</div>)}</div>
                            <KeyboardUI inputMode="cangjie" userInput={userInput} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={!!feedback}/>
                        </div>
                    )}
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 🎧 DICTATION GAME (聽打模式) — 示範：顯示提示但不顯示字
        // ───────────────────────────────────────────────────────────────
        const DictationGame = ({ chapter, goHome }) => {
            const [qIndex, setQIndex] = useState(0);
            const [userInput, setUserInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [showHint, setShowHint] = useState(false);
            const [score, setScore] = useState(0);
            const [gameState, setGameState] = useState('playing');
            const [stats, setStats] = useState({ correct:0, wrong:0 });
            const filtered = useMemo(() => chapter ? QUESTIONS.filter(q=>q.mainCode===chapter) : QUESTIONS, [chapter]);
            const currentQ = useMemo(() => filtered[qIndex % filtered.length], [qIndex]);

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'zh-HK'; u.rate = 0.8;
                    speechSynthesis.cancel(); speechSynthesis.speak(u);
                }
            };

            const processAnswer = () => {
                AudioEngine.correct(); setFeedback('correct');
                setScore(s => s+100);
                setStats(s => ({...s, correct:s.correct+1}));
                setTimeout(() => { setFeedback(null); setUserInput([]); setShowHint(false); setQIndex(q=>q+1); }, 800);
            };

            const handleKey = (key) => {
                if (gameState !== 'playing' || feedback) return;
                const target = getTargetCode(currentQ, 'cangjie');
                const next = [...userInput, key];
                if (target.startsWith(next.join(''))) {
                    if (next.join('') === target) processAnswer();
                    else { AudioEngine.click(); setUserInput(next); }
                } else { AudioEngine.wrong(); setFeedback('wrong'); setStats(s => ({...s, wrong:s.wrong+1})); setUserInput([]); setTimeout(() => setFeedback(null), 800); }
            };

            useEffect(() => { speak(currentQ?.char); }, [qIndex]);
            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [gameState, userInput, currentQ, feedback]);

            return (
                <div className="h-full w-full flex flex-col bg-indigo-950 text-white">
                    <div className="p-4 bg-indigo-900/50 flex justify-between items-center border-b border-indigo-800">
                        <div className="flex items-center gap-3">
                            <button onClick={goHome} className="bg-indigo-800 p-2 rounded-full hover:bg-indigo-700"><LucideIcon icon={ArrowLeft}/></button>
                            <span className="font-bold">聽打模式</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-xl font-bold text-yellow-400"><LucideIcon icon={Star}/> {score}</div>
                            <div className="text-green-400">✓{stats.correct}</div>
                            <div className="text-red-400">✗{stats.wrong}</div>
                        </div>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-8">
                        <button onClick={() => speak(currentQ?.char)} className="mb-8 bg-indigo-700 hover:bg-indigo-600 px-6 py-3 rounded-full font-bold flex items-center gap-2"><LucideIcon icon={Headphones}/> 再聽一次</button>
                        <div className="text-6xl font-serif font-black mb-6 text-indigo-300 opacity-50 blur-sm select-none">{currentQ?.char}</div>
                        {!showHint && <button onClick={() => setShowHint(true)} className="mb-4 text-indigo-300 text-sm hover:text-white">顯示提示（扣分）</button>}
                        {showHint && <div className="text-center text-slate-400 mb-4">提示：{currentQ?.hint}</div>}
                        <div className="text-center text-slate-500 mb-4 text-sm">全碼長度：{currentQ?.code?.length} 碼</div>
                        <div className="flex justify-center mb-6 space-x-2 min-h-[48px] flex-wrap">{userInput.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-indigo-500 rounded-lg flex items-center justify-center text-xl font-bold bg-slate-800 text-indigo-300">{KEYBOARD_MAP[k]}</div>)}</div>
                        <KeyboardUI inputMode="cangjie" userInput={userInput} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={!!feedback}/>
                    </div>
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // ⚔️ BATTLE GAME (對戰模式 — CPU 對手)
        // ───────────────────────────────────────────────────────────────
        const BattleGame = ({ chapter, goHome }) => {
            const [playerHP, setPlayerHP] = useState(100);
            const [cpuHP, setCpuHP] = useState(100);
            const [qIndex, setQIndex] = useState(0);
            const [userInput, setUserInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [log, setLog] = useState('對戰開始！');
            const [gameState, setGameState] = useState('playing');
            const [turn, setTurn] = useState('player');
            const [sessionStats, setSessionStats] = useState({ correct:0, wrong:0 });
            const filtered = useMemo(() => chapter ? QUESTIONS.filter(q=>q.mainCode===chapter) : QUESTIONS, [chapter]);
            const currentQ = useMemo(() => filtered[qIndex % filtered.length], [qIndex]);

            const cpuThink = useCallback(() => {
                setTimeout(() => {
                    if (cpuHP <= 0) { setGameState('win'); AudioEngine.win(); return; }
                    const cpuCorrect = Math.random() > 0.35;
                    if (cpuCorrect) { AudioEngine.attack(); setCpuHP(h => Math.max(0, h-8)); setLog('CPU 命中！-8 HP'); }
                    else { setLog('CPU 失手了！'); }
                    setTurn('player');
                }, 800);
            }, [cpuHP]);

            const processAnswer = () => {
                AudioEngine.correct();
                setFeedback('correct');
                setSessionStats(s => ({...s, correct:s.correct+1}));
                setCpuHP(h => Math.max(0, h-15));
                setLog('你命中！-15 HP');
                if (cpuHP <= 15) { setGameState('win'); AudioEngine.win(); }
                else { setTurn('cpu'); cpuThink(); }
                setTimeout(() => { setFeedback(null); setUserInput([]); setQIndex(q=>q+1); }, 500);
            };

            const handleWrong = () => {
                AudioEngine.wrong();
                setFeedback('wrong');
                setSessionStats(s => ({...s, wrong:s.wrong+1}));
                setLog('你失手了！');
                setPlayerHP(h => Math.max(0, h-12));
                if (playerHP <= 12) { setGameState('lose'); AudioEngine.lose(); }
                else { setTurn('cpu'); cpuThink(); }
                setTimeout(() => { setFeedback(null); setUserInput([]); }, 500);
            };

            const handleKey = (key) => {
                if (gameState !== 'playing' || turn !== 'player' || feedback) return;
                const target = getTargetCode(currentQ, 'cangjie');
                const next = [...userInput, key];
                if (target.startsWith(next.join(''))) {
                    if (next.join('') === target) processAnswer();
                    else { AudioEngine.click(); setUserInput(next); }
                } else handleWrong();
            };

            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [gameState, turn, userInput, currentQ, feedback, cpuHP, playerHP]);

            if (gameState === 'win') return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-slate-900 text-white p-8">
                    <LucideIcon icon={Trophy2} size={80} className="text-yellow-400 mb-6 animate-bounce"/>
                    <h2 className="text-4xl font-bold mb-2 text-green-400">勝利！</h2>
                    <p className="text-slate-400 mb-6">你戰勝了 CPU！</p>
                    <div className="flex gap-6 mb-8">
                        <div className="bg-slate-800 p-4 rounded-xl text-center"><div className="text-2xl font-black text-green-400">{sessionStats.correct}</div><div className="text-xs text-slate-400">答對</div></div>
                        <div className="bg-slate-800 p-4 rounded-xl text-center"><div className="text-2xl font-black text-red-400">{sessionStats.wrong}</div><div className="text-xs text-slate-400">答錯</div></div>
                    </div>
                    <button onClick={goHome} className="bg-magic-600 hover:bg-magic-500 px-8 py-3 rounded-full font-bold">返回</button>
                </div>
            );

            if (gameState === 'lose') return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-slate-900 text-white p-8">
                    <LucideIcon icon={Skull} size={80} className="text-red-500 mb-6"/>
                    <h2 className="text-4xl font-bold mb-2 text-red-400">失敗</h2>
                    <p className="text-slate-400 mb-6">CPU 戰勝了你</p>
                    <button onClick={goHome} className="bg-slate-700 hover:bg-slate-600 px-8 py-3 rounded-full font-bold">返回</button>
                </div>
            );

            return (
                <div className="h-full w-full flex flex-col bg-slate-900 text-white">
                    <div className="p-3 bg-slate-800/80 flex justify-between items-center border-b border-slate-700">
                        <button onClick={goHome} className="bg-slate-700 p-2 rounded-full hover:bg-slate-600"><LucideIcon icon={ArrowLeft}/></button>
                        <div className="text-sm font-bold text-slate-400">對戰模式</div>
                        <div/>
                    </div>
                    <div className="p-4 flex justify-between items-center">
                        <div className="text-center">
                            <div className="text-2xl mb-1">👤 你</div>
                            <div className="w-40 h-4 bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-green-500 transition-all" style={{width:`${playerHP}%`}}/></div>
                            <div className="text-xs mt-1">{playerHP}%</div>
                        </div>
                        <div className="text-3xl font-black text-red-400">VS</div>
                        <div className="text-center">
                            <div className="text-2xl mb-1">🤖 CPU</div>
                            <div className="w-40 h-4 bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-red-500 transition-all" style={{width:`${cpuHP}%`}}/></div>
                            <div className="text-xs mt-1">{cpuHP}%</div>
                        </div>
                    </div>
                    <div className="text-center text-lg font-bold text-yellow-400 mb-4 h-6">{log}</div>
                    <div className="flex-1 flex flex-col items-center justify-center p-4">
                        <div className="text-7xl font-serif font-black mb-4">{currentQ?.char}</div>
                        <div className="text-center text-slate-400 mb-4">全碼：{currentQ?.code} | 提示：{currentQ?.hint}</div>
                        <div className="flex justify-center mb-4 space-x-2 min-h-[48px] flex-wrap">{userInput.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-rose-500 rounded-lg flex items-center justify-center text-xl font-bold bg-slate-800 text-rose-300">{KEYBOARD_MAP[k]}</div>)}</div>
                        <KeyboardUI inputMode="cangjie" userInput={userInput} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={turn!=='player' || !!feedback}/>
                        {turn==='cpu' && <div className="mt-4 text-slate-500 animate-pulse">CPU 思考中...</div>}
                    </div>
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 📜 STORY GAME (故事模式)
        // ───────────────────────────────────────────────────────────────
        const StoryGame = ({ chapter, goHome }) => {
            const STORY = [
                { char:'冒', code:'AM', hint:'日一一', text:'很久以前，有一個勇敢的劍士...' },
                { char:'險', code:'YIHN', hint:'卜戈弓弓', text:'他踏上了尋找真相的旅程...' },
                { char:'旅', code:'LII', hint:'中戈戈', text:'旅途充滿了未知與危險...' },
                { char:'程', code:'HDRHG', hint:'竹木口竹土', text:'但他從未退縮，勇往直前...' },
                { char:'發', code:'NOHNE', hint:'弓人竹水', text:'最終，他發現了古老的秘密...' },
            ];
            const [idx, setIdx] = useState(0);
            const [input, setInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [done, setDone] = useState(false);
            const [stats, setStats] = useState({ correct:0, wrong:0 });

            const currentQ = STORY[idx];

            const handleKey = (key) => {
                if (done || feedback) return;
                const target = currentQ.code;
                const next = [...input, key];
                if (target.startsWith(next.join(''))) {
                    if (next.join('') === target) {
                        AudioEngine.correct(); setFeedback('correct');
                        setStats(s=>({...s, correct:s.correct+1}));
                        setTimeout(() => {
                            if (idx+1 >= STORY.length) { setDone(true); }
                            else { setInput([]); setFeedback(null); setIdx(i=>i+1); }
                        }, 800);
                    } else { AudioEngine.click(); setInput(next); }
                } else { AudioEngine.wrong(); setFeedback('wrong'); setStats(s=>({...s, wrong:s.wrong+1})); setInput([]); setTimeout(()=>setFeedback(null),800); }
            };

            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [done, input, feedback, idx]);

            if (done) return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-amber-950 text-white p-8">
                    <LucideIcon icon={Scroll} size={80} className="text-amber-400 mb-6 animate-bounce"/>
                    <h2 className="text-3xl font-bold mb-2 text-amber-300">故事完結</h2>
                    <p className="text-slate-400 mb-6 italic">"勇敢的心，永不退縮。"</p>
                    <div className="flex gap-6 mb-8">
                        <div className="bg-amber-900/50 p-4 rounded-xl text-center"><div className="text-2xl font-black text-green-400">{stats.correct}</div><div className="text-xs text-slate-400">正確</div></div>
                        <div className="bg-amber-900/50 p-4 rounded-xl text-center"><div className="text-2xl font-black text-red-400">{stats.wrong}</div><div className="text-xs text-slate-400">錯誤</div></div>
                    </div>
                    <button onClick={goHome} className="bg-amber-700 hover:bg-amber-600 px-8 py-3 rounded-full font-bold">返回</button>
                </div>
            );

            return (
                <div className="h-full w-full flex flex-col bg-gradient-to-b from-amber-900 to-amber-950 text-white">
                    <div className="p-4 bg-amber-900/50 flex justify-between items-center border-b border-amber-800">
                        <button onClick={goHome} className="bg-amber-800 p-2 rounded-full hover:bg-amber-700"><LucideIcon icon={ArrowLeft}/></button>
                        <span className="font-bold text-amber-300">故事模式</span>
                        <span className="text-amber-400 text-sm">{idx+1}/{STORY.length}</span>
                    </div>
                    <div className="p-6 bg-amber-900/30 border-b border-amber-800/50">
                        <p className="text-lg italic text-amber-200 leading-relaxed">"{currentQ?.text}"</p>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-6">
                        <div className="text-8xl font-serif font-black mb-6">{currentQ?.char}</div>
                        <div className="text-center text-amber-300 mb-4 text-sm">全碼：{currentQ?.code} | 提示：{currentQ?.hint}</div>
                        <div className="flex justify-center mb-6 space-x-2 min-h-[48px] flex-wrap">{input.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-amber-500 rounded-lg flex items-center justify-center text-xl font-bold bg-slate-800 text-amber-300">{KEYBOARD_MAP[k]}</div>)}</div>
                        <KeyboardUI inputMode="cangjie" userInput={input} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={!!feedback}/>
                    </div>
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 📃 ARTICLE GAME (文章模式)
        // ───────────────────────────────────────────────────────────────
        const ArticleGame = ({ chapter, goHome }) => {
            const ARTICLE = [
                { char:'每', code:'UXXX', hint:'山XXX' },
                { char:'日', code:'AM', hint:'日一' },
                { char:'進', code:'NDHH', hint:'弓木竹竹' },
                { char:'步', code:'YPU', hint:'卜心山' },
                { char:'學', code:'HIO', hint:'竹戈人' },
                { char:'習', code:'HNI', hint:'竹弓戈' },
                { char:'打字', code:'QPAK', hint:'手心日大' },
                { char:'技術', code:'TCIT', hint:'廿金戈廿' },
            ];
            const TOTAL = ARTICLE.length;
            const [idx, setIdx] = useState(0);
            const [input, setInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [done, setDone] = useState(false);
            const [stats, setStats] = useState({ correct:0, wrong:0 });

            const currentQ = ARTICLE[idx];

            const handleKey = (key) => {
                if (done || feedback) return;
                const target = currentQ.code;
                const next = [...input, key];
                if (target.startsWith(next.join(''))) {
                    if (next.join('') === target) {
                        AudioEngine.correct(); setFeedback('correct');
                        setStats(s=>({...s, correct:s.correct+1}));
                        setTimeout(() => {
                            if (idx+1 >= TOTAL) { setDone(true); }
                            else { setInput([]); setFeedback(null); setIdx(i=>i+1); }
                        }, 600);
                    } else { AudioEngine.click(); setInput(next); }
                } else { AudioEngine.wrong(); setFeedback('wrong'); setStats(s=>({...s, wrong:s.wrong+1})); setInput([]); setTimeout(()=>setFeedback(null),800); }
            };

            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [done, input, feedback, idx]);

            if (done) return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-emerald-950 text-white p-8">
                    <LucideIcon icon={Book} size={80} className="text-emerald-400 mb-6 animate-bounce"/>
                    <h2 className="text-3xl font-bold mb-2 text-emerald-300">文章完成！</h2>
                    <div className="flex gap-6 mb-8">
                        <div className="bg-emerald-900/50 p-4 rounded-xl text-center"><div className="text-2xl font-black text-green-400">{stats.correct}</div><div className="text-xs text-slate-400">正確</div></div>
                        <div className="bg-emerald-900/50 p-4 rounded-xl text-center"><div className="text-2xl font-black text-red-400">{stats.wrong}</div><div className="text-xs text-slate-400">錯誤</div></div>
                    </div>
                    <button onClick={goHome} className="bg-emerald-700 hover:bg-emerald-600 px-8 py-3 rounded-full font-bold">返回</button>
                </div>
            );

            return (
                <div className="h-full w-full flex flex-col bg-gradient-to-b from-emerald-900 to-emerald-950 text-white">
                    <div className="p-4 bg-emerald-900/50 flex justify-between items-center border-b border-emerald-800">
                        <button onClick={goHome} className="bg-emerald-800 p-2 rounded-full hover:bg-emerald-700"><LucideIcon icon={ArrowLeft}/></button>
                        <span className="font-bold text-emerald-300">文章模式</span>
                        <span className="text-emerald-400 text-sm">{idx+1}/{TOTAL}</span>
                    </div>
                    {/* Progress */}
                    <div className="flex gap-1 px-4 py-2 bg-emerald-950/50">
                        {ARTICLE.map((_, i) => <div key={i} className={`h-2 flex-1 rounded-full ${i<idx?'bg-green-500':i===idx?'bg-yellow-400':'bg-slate-700'}`}/>)}
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-6">
                        <div className="text-8xl font-serif font-black mb-6">{currentQ?.char}</div>
                        <div className="text-center text-emerald-300 mb-4 text-sm">全碼：{currentQ?.code} | 提示：{currentQ?.hint}</div>
                        <div className="flex justify-center mb-6 space-x-2 min-h-[48px] flex-wrap">{input.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-emerald-500 rounded-lg flex items-center justify-center text-xl font-bold bg-slate-800 text-emerald-300">{KEYBOARD_MAP[k]}</div>)}</div>
                        <KeyboardUI inputMode="cangjie" userInput={input} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={!!feedback}/>
                    </div>
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 🏠 APP 主體
        // ───────────────────────────────────────────────────────────────
        const App = () => {
            const [view, setView] = useState('home');
            const [userName, setUserName] = useState('');
            const [config, setConfig] = useState({ mode:null, chapter:null });
            const [metaState, setMetaState] = useState({
                coins:0, upgrades:{hp:0,atk:0,exp:0},
                unlockedArtifacts:['wand_1','robe_1','ring_1','boots_1'],
                unlockedSkills:['heal','burst'],
                stats:{ totalCorrect:0, totalWrong:0, gamesPlayed:0, highestCombo:0 },
                avatar:'hero'
            });

            useEffect(() => {
                const s = localStorage.getItem('speedy_adventure_meta');
                if (s) { try { const p = JSON.parse(s); setMetaState(prev=>({...prev,...p.metaState,stats:{...prev.stats,...(p.metaState?.stats||{})}})); setUserName(p.userName||''); } catch(e){} }
            }, []);
            useEffect(() => { localStorage.setItem('speedy_adventure_meta', JSON.stringify({metaState, userName})); }, [metaState, userName]);

            const goHome = () => setView('mode_select');
            const goBack = () => { setView('mode_select'); setConfig({mode:null, chapter:null}); };

            const handleGameEnd = (coinsEarned, sessionStats) => {
                setMetaState(prev => ({
                    ...prev, coins: prev.coins + (coinsEarned||0),
                    stats: {
                        totalCorrect: prev.stats.totalCorrect + (sessionStats?.correct||0),
                        totalWrong: prev.stats.totalWrong + (sessionStats?.wrong||0),
                        gamesPlayed: prev.stats.gamesPlayed + 1,
                        highestCombo: Math.max(prev.stats.highestCombo, (sessionStats?.maxCombo||0))
                    }
                }));
                goHome();
            };

            const handleExportSave = () => {
                const blob = new Blob([JSON.stringify({metaState, userName})], {type:'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href=url; a.download='typing_kingdom_backup.json';
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            // ── 渲染各視圖 ──
            if (view === 'home') return (
                <div className="h-full flex flex-col items-center justify-center bg-slate-900 p-6 text-white">
                    <div className="absolute top-4 left-4"><button onClick={()=>setView('dashboard')} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl"><LucideIcon icon={BarChart3} className="text-blue-400"/><span className="font-bold">儀表版</span></button></div>
                    <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl text-center w-full max-w-md border border-slate-700">
                        <LucideIcon icon={Rocket} size={64} className="text-magic-500 mx-auto mb-6 animate-float-slow"/>
                        <h1 className="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-magic-300 to-brand-300">速成王國 V50</h1>
                        <p className="text-slate-400 mb-8">10種打字遊戲模式</p>
                        <input className="w-full p-4 bg-slate-900 border border-slate-600 rounded-xl text-center text-lg mb-6 text-white focus:border-magic-500 outline-none" placeholder="召喚師之名" value={userName} onChange={e=>setUserName(e.target.value)}/>
                        <button disabled={!userName} onClick={()=>{AudioEngine.click();setView('mode_select')}} className="w-full bg-magic-600 hover:bg-magic-500 text-white p-4 rounded-xl font-bold shadow-lg disabled:opacity-50 flex items-center justify-center gap-2 mb-4"><LucideIcon icon={Play}/> 進入王國</button>
                        <button onClick={handleExportSave} className="text-slate-500 hover:text-magic-300 text-sm flex items-center gap-1 mx-auto"><LucideIcon icon={Download} size={14}/> 備份存檔</button>
                    </div>
                </div>
            );

            if (view === 'dashboard') {
                const {totalCorrect,totalWrong,gamesPlayed,highestCombo} = metaState.stats;
                const accuracy = totalCorrect+totalWrong>0 ? Math.round((totalCorrect/(totalCorrect+totalWrong))*100) : 0;
                return (
                    <div className="h-full bg-slate-50 p-6 overflow-y-auto">
                        <div className="flex items-center gap-4 mb-8"><button onClick={()=>setView('home')} className="bg-white p-3 rounded-full shadow hover:bg-slate-100"><LucideIcon icon={ArrowLeft}/></button><h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><LucideIcon icon={BarChart3}/> 學習儀表版</h2></div>
                        <div className="grid grid-cols-2 gap-6 max-w-4xl mx-auto">
                            <div className="bg-white p-6 rounded-2xl shadow-lg border border-slate-100 flex items-center justify-between"><div><div className="text-sm text-slate-500 font-bold mb-1">總遊戲次數</div><div className="text-3xl font-black text-slate-800">{gamesPlayed}</div></div><div className="p-4 rounded-xl bg-blue-500"><LucideIcon icon={Activity}/></div></div>
                            <div className="bg-white p-6 rounded-2xl shadow-lg border border-slate-100 flex items-center justify-between"><div><div className="text-sm text-slate-500 font-bold mb-1">準確率</div><div className={`text-3xl font-black ${accuracy>=80?'text-green-500':accuracy>=60?'text-yellow-500':'text-red-500'}`}>{accuracy}%</div></div><div className={`p-4 rounded-xl ${accuracy>=80?'bg-green-500':'bg-red-500'}`}><LucideIcon icon={Target}/></div></div>
                            <div className="bg-white p-6 rounded-2xl shadow-lg border border-slate-100 flex items-center justify-between"><div><div className="text-sm text-slate-500 font-bold mb-1">累積答對</div><div className="text-3xl font-black text-slate-800">{totalCorrect}</div></div><div className="p-4 rounded-xl bg-indigo-500"><LucideIcon icon={CheckCircle}/></div></div>
                            <div className="bg-white p-6 rounded-2xl shadow-lg border border-slate-100 flex items-center justify-between"><div><div className="text-sm text-slate-500 font-bold mb-1">最高連擊</div><div className="text-3xl font-black text-slate-800">{highestCombo}</div></div><div className="p-4 rounded-xl bg-orange-500"><LucideIcon icon={Zap}/></div></div>
                        </div>
                        <div className="mt-8 text-center text-slate-400 text-sm">數據僅儲存於本機</div>
                    </div>
                );
            }

            if (view === 'mode_select') return (
                <div className="h-full bg-slate-950 p-6 overflow-y-auto">
                    <div className="flex justify-between items-center mb-6 max-w-5xl mx-auto">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-magic-900 rounded-full flex items-center justify-center border border-magic-600"><LucideIcon icon={User} className="text-magic-300"/></div>
                            <div><h2 className="text-xl font-bold text-white">{userName}</h2><div className="flex items-center gap-1 text-gold-400 text-sm"><LucideIcon icon={Coins} size={14}/> {metaState.coins}</div></div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={()=>setView('meta_shop')} className="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-gold-400 font-bold flex items-center gap-2"><LucideIcon icon={ShoppingBag} size={16}/> 知識聖殿</button>
                            <button onClick={()=>setView('home')} className="bg-slate-800 hover:bg-slate-700 p-2 rounded-full"><LucideIcon icon={Home}/></button>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 max-w-5xl mx-auto">
                        {Object.values(GAME_MODES).map(mode => (
                            <button key={mode.id} onClick={()=>{AudioEngine.click();setConfig({...config,mode:mode.id});setView('chapter_select');}}
                                className={`p-4 rounded-2xl border-2 transition-all hover:scale-105 active:scale-95 flex flex-col items-center text-center gap-2 bg-slate-900 border-slate-700 hover:border-${mode.accent}-500 group`}>
                                <div className={`p-3 rounded-xl bg-${mode.accent}-900/50`}><LucideIcon icon={mode.icon} size={32} className={mode.color}/></div>
                                <h3 className={`font-bold text-sm ${mode.color} group-hover:scale-105 transition-transform`}>{mode.name}</h3>
                                <p className="text-xs text-slate-500 leading-tight">{mode.desc}</p>
                            </button>
                        ))}
                    </div>
                </div>
            );

            if (view === 'chapter_select') {
                const currentMode = GAME_MODES[config.mode];
                return (
                    <div className="h-full bg-slate-950 p-6 overflow-y-auto">
                        <div className="flex justify-between items-center mb-6 max-w-4xl mx-auto">
                            <div className="flex items-center gap-4">
                                <button onClick={goBack} className="bg-slate-800 p-2 rounded-full hover:bg-slate-700"><LucideIcon icon={ArrowLeft}/></button>
                                <div className="flex items-center gap-2">
                                    <LucideIcon icon={currentMode.icon} className={currentMode.color}/>
                                    <h2 className="text-xl font-bold text-white">{currentMode.name}</h2>
                                </div>
                            </div>
                        </div>
                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3 max-w-4xl mx-auto">
                            <button onClick={()=>{setConfig({...config,chapter:null});setView('game');}} className="p-4 bg-magic-900 border-2 border-magic-500 rounded-xl hover:bg-magic-800 transition-all flex flex-col items-center gap-1 col-span-full mb-2">
                                <span className="text-lg font-bold text-magic-300">🌐 隨機挑戰</span>
                            </button>
                            {CHAPTERS.map(ch => (
                                <button key={ch.code} onClick={()=>{setConfig({...config,chapter:ch.code});setView('game');}}
                                    className="p-3 bg-slate-800 rounded-xl border border-slate-700 hover:border-brand-500 hover:bg-slate-700 transition-all flex flex-col items-center gap-1">
                                    <div className="text-2xl font-black text-slate-500">{ch.code}</div>
                                    <div className="text-sm font-serif font-bold text-brand-400">{ch.name}</div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'game') {
                const gameProps = { chapter: config.chapter, goHome: goBack, onGameEnd: handleGameEnd, metaState };
                switch (config.mode) {
                    case 'rpg':        return <RPGGame {...gameProps}/>;
                    case 'runner':     return <RunnerGame {...gameProps}/>;
                    case 'selfLearn':  return <SelfLearnGame {...gameProps}/>;
                    case 'speed':      return <SpeedGame {...gameProps}/>;
                    case 'vocabulary': return <VocabularyGame {...gameProps}/>;
                    case 'challenge':  return <ChallengeGame {...gameProps}/>;
                    case 'dictation':  return <DictationGame {...gameProps}/>;
                    case 'battle':     return <BattleGame {...gameProps}/>;
                    case 'story':      return <StoryGame {...gameProps}/>;
                    case 'article':    return <ArticleGame {...gameProps}/>;
                    default:           return goBack();
                }
            }

            // MetaShop
            if (view === 'meta_shop') {
                const buyUpgrade = (type) => {
                    const cfg = META_UPGRADES[type];
                    const lv = metaState.upgrades[type];
                    const cost = Math.floor(cfg.baseCost * Math.pow(cfg.costMult, lv));
                    if (metaState.coins >= cost) { AudioEngine.coin(); setMetaState(prev=>({...prev,coins:prev.coins-cost,upgrades:{...prev.upgrades,[type]:lv+1}})); }
                    else AudioEngine.wrong();
                };
                const unlockArtifact = (artId, cost) => {
                    if (metaState.coins >= cost) { AudioEngine.coin(); setMetaState(prev=>({...prev,coins:prev.coins-cost,unlockedArtifacts:[...prev.unlockedArtifacts,artId]})); }
                    else AudioEngine.wrong();
                };
                const unlockSkill = (skillId, cost) => {
                    if (metaState.coins >= cost) { AudioEngine.coin(); setMetaState(prev=>({...prev,coins:prev.coins-cost,unlockedSkills:[...(prev.unlockedSkills||[]),skillId]})); }
                    else AudioEngine.wrong();
                };
                return (
                    <div className="h-full bg-slate-900 text-white p-6 overflow-y-auto">
                        <div className="flex justify-between items-center mb-8 sticky top-0 bg-slate-900/95 p-4 z-10 border-b border-slate-700">
                            <div className="flex items-center gap-4"><button onClick={()=>setView('mode_select')} className="bg-slate-700 p-2 rounded-full hover:bg-slate-600"><LucideIcon icon={ArrowLeft}/></button><h2 className="text-2xl font-bold text-magic-300">知識聖殿</h2></div>
                            <div className="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-full border border-gold-500/50"><LucideIcon icon={Coins} className="text-gold-400"/><span className="font-bold text-xl text-gold-400">{metaState.coins}</span></div>
                        </div>
                        <div className="max-w-5xl mx-auto space-y-10">
                            <section>
                                <h3 className="text-xl font-bold mb-4 text-magic-100 flex items-center gap-2"><LucideIcon icon={GraduationCap}/> 基礎能力</h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">{Object.entries(META_UPGRADES).map(([key,cfg])=>{const lv=metaState.upgrades[key];const cost=Math.floor(cfg.baseCost*Math.pow(cfg.costMult,lv));const can=metaState.coins>=cost;return(<div key={key} className="bg-slate-800 p-5 rounded-xl border border-slate-700"><div className="flex items-center gap-3 mb-3"><div className="p-2 bg-magic-900 rounded-lg"><LucideIcon icon={cfg.icon} size={24} className="text-magic-300"/></div><div><div className="font-bold">{cfg.name}</div><div className="text-xs text-slate-400">Lv.{lv}</div></div></div><p className="text-sm text-slate-300 mb-3">{cfg.desc}</p><button onClick={()=>buyUpgrade(key)} disabled={!can} className={`w-full py-2 rounded-xl font-bold flex items-center justify-center gap-2 ${can?'bg-gold-600 hover:bg-gold-500 text-white':'bg-slate-700 text-slate-500 cursor-not-allowed'}`}><LucideIcon icon={Coins} size={14}/> {cost}</button></div>)})}</div>
                            </section>
                            <section>
                                <h3 className="text-xl font-bold mb-4 text-magic-100 flex items-center gap-2"><LucideIcon icon={Book}/> 技能學習</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">{Object.values(MASTER_SKILL_POOL).filter(s=>s.cost>0).map(skill=>{const isUn=(metaState.unlockedSkills||[]).includes(skill.id);const can=metaState.coins>=skill.cost;return(<div key={skill.id} className={`p-4 rounded-xl border-2 flex flex-col items-center text-center ${isUn?'bg-magic-900/30 border-magic-500/50':'bg-slate-800 border-slate-700'}`}><div className={`p-2 rounded-full mb-2 ${skill.color} bg-opacity-20`}><LucideIcon icon={skill.icon} className={isUn?'text-white':'text-slate-400'}/></div><h4 className={`font-bold text-sm ${isUn?'text-white':'text-slate-500'}`}>{skill.name}</h4>{isUn?<div className="text-green-400 text-xs font-bold flex items-center mt-2"><LucideIcon icon={CheckCircle} size={12}/> 已學習</div>:<button onClick={()=>unlockSkill(skill.id,skill.cost)} disabled={!can} className={`mt-2 px-3 py-1 rounded-lg text-xs font-bold flex items-center ${can?'bg-gold-600 text-white':'bg-slate-700 text-slate-500'}`}><LucideIcon icon={Unlock} size={10}/> {skill.cost}</button>}</div>)})}</div>
                            </section>
                            <section>
                                <h3 className="text-xl font-bold mb-4 text-magic-100 flex items-center gap-2"><LucideIcon icon={Lock}/> 遺物</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">{RPG_ARTIFACTS.filter(a=>a.unlockCost>0).map(art=>{const isUn=metaState.unlockedArtifacts.includes(art.id);const can=metaState.coins>=art.unlockCost;return(<div key={art.id} className={`p-4 rounded-xl border-2 flex flex-col items-center text-center ${isUn?'bg-magic-900/30 border-magic-500/50':'bg-slate-800 border-slate-700'}`}><div className="p-2 mb-2"><LucideIcon icon={art.icon} className={isUn?'text-magic-300':'text-slate-600'}/></div><h4 className={`font-bold text-sm ${isUn?'text-white':'text-slate-500'}`}>{art.name}</h4><p className="text-xs text-slate-400 mb-2">{art.desc}</p>{isUn?<div className="text-green-400 text-xs font-bold flex items-center"><LucideIcon icon={CheckCircle} size={12}/> 已解鎖</div>:<button onClick={()=>unlockArtifact(art.id,art.unlockCost)} disabled={!can} className={`mt-1 px-3 py-1 rounded-lg text-xs font-bold flex items ${can?'bg-gold-600 text-white':'bg-slate-700 text-slate-500'}`}><LucideIcon icon={Unlock} size={10}/> {art.unlockCost}</button>}</div>)})}</div>
                            </section>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
</body>
</html>
