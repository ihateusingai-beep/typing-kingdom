    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

            Heart, AlertTriangle, CheckCircle, RefreshCw, Keyboard, MousePointer2, Box, Home,
            Trees, Cloud, Moon, Flag, Timer, Leaf, Smile, Coffee, BookOpen, Sword, Shield,
            Ghost, Sparkles, Skull, Flame, Plus, Crown, Gift, Hammer, Droplets, Wind,
            Eye, Save, Upload, Download, X, Coins, GraduationCap, Lock, Unlock,
            ShoppingBag, Tent, BedDouble, Dumbbell, Gem, Gauge, EyeOff, MicOff, Shuffle,
            Snowflake, BarChart3, Activity, Target, Dices, Book, Gavel, FlaskConical,

            VolumeX, Wifi, WifiOff, PlayCircle, LayoutDashboard, Copy

        const LucideIcon = ({ icon, size = 24, className = "" }) => {
            if (!icon) return null;
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {icon.map(([tag, attrs], i) => React.createElement(tag, { ...attrs, key: i }))}
            </svg>;
        };

        // ───────────────────────────────────────────────────────────────
        // Audio Engine
        // ───────────────────────────────────────────────────────────────
        const AudioEngine = {
            ctx: null,
            muted: false,
            init() { if (!this.ctx) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } if (this.ctx.state === 'suspended') this.ctx.resume(); },
            tone(f, t, d, v = 0.08, slideTo = null) {
                if (this.muted) return;
                if (!this.ctx) this.init();
                const c = this.ctx.currentTime, o = this.ctx.createOscillator(), g = this.ctx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, c);
                if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, c + d);
                g.gain.setValueAtTime(0, c); g.gain.linearRampToValueAtTime(v, c + 0.02);
                g.gain.exponentialRampToValueAtTime(0.001, c + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(c + d);
            },
            correct() { this.tone(880,'sine',0.15); setTimeout(()=>this.tone(1108,'sine',0.2),50); },
            wrong()   { this.tone(150,'triangle',0.3,0.12,100); },
            click()   { this.tone(1200,'sine',0.03,0.02); },
            attack()  { this.tone(200,'triangle',0.15,0.08,50); },
            crit()    { this.tone(600,'square',0.1,0.04,1200); },
            hit()     { this.tone(100,'triangle',0.2,0.1,50); },
            levelUp() { [523.25,659.25,783.99,1046.50].forEach((f,i)=>setTimeout(()=>this.tone(f,'sine',0.25,0.08),i*80)); },
            win()     { [523,659,784,1046,784,1046].forEach((f,i)=>setTimeout(()=>this.tone(f,'triangle',0.2,0.08),i*120)); },
            lose()    { [392,370,349,330].forEach((f,i)=>setTimeout(()=>this.tone(f,'triangle',0.4,0.08),i*300)); },
            coin()    { this.tone(1318,'sine',0.1,0.04); setTimeout(()=>this.tone(1975,'sine',0.18,0.04),80); },
            heal()    { this.tone(400,'sine',0.5,0.08,800); },
            freeze()  { this.tone(800,'sine',0.4,0.08); setTimeout(()=>this.tone(400,'sine',0.4,0.08),100); },
            skill()   { this.tone(300,'sine',0.35,0.08,600); },
            powerUp() { this.tone(440,'sine',0.08,0.08); setTimeout(()=>this.tone(554,'sine',0.08,0.08),60); setTimeout(()=>this.tone(659,'sine',0.15,0.08),120); },
            // TTS for student voice feedback (uses Web Speech API)
            speak(text, lang='zh-HK') { try { if(this.muted) return; const u=new SpeechSynthesisUtterance(text); u.lang=lang; u.rate=0.85; u.pitch=1.1; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch(e){} },
            comboTTS(combo) {
                if (combo >= 20) this.speak('火力全開');
                else if (combo >= 15) this.speak('熱辣辣');
                else if (combo >= 10) this.speak('強烈連擊');
                else if (combo >= 5) this.speak('好犀利');
            },
            correctTTS() { this.speak('正確'); },
            victoryTTS() { this.speak('勝利'); },
            defeatTTS() { this.speak('下次再試'); },
            levelUpTTS() { this.speak('升級'); },
            skillTTS(skillName) { this.speak(skillName === 'heal' ? '治療' : '爆發'); }

        ];

        // ───────────────────────────────────────────────────────────────
        // 工具函數
        // ───────────────────────────────────────────────────────────────
        const generateDecoys = (q, count = 2) => {
            const same = QUESTIONS.filter(x => x.mainCode === q.mainCode && x.code !== q.code);
            const others = QUESTIONS.filter(x => x.mainCode !== q.mainCode);
            const pool = same.length >= count ? same : [...same, ...others];
            return [...pool].sort(() => Math.random() - 0.5).slice(0, count);
        };
        const getTargetCode = (q, inputMode) => {
            if (inputMode === 'cangjie') return q.code;
            return q.code[0];
        };

                artifacts:[]
            });
            const [monster, setMonster] = useState({ hp:100, maxHp:100, name:'亂碼怪獸', type:MONSTER_TYPES[0], frozen:0 });
            const [gauge, setGauge] = useState(0);
            const [qIndex, setQIndex] = useState(0);
            const [turn, setTurn] = useState('player');
            const [userInput, setUserInput] = useState([]);
            const [combatLog, setCombatLog] = useState('戰鬥開始！');
            const [anim, setAnim] = useState(null);
            const [levelUpFlash, setLevelUpFlash] = useState(false);
            const [rewards, setRewards] = useState([]);
            const [showStats, setShowStats] = useState(false);
            const [sessionStats, setSessionStats] = useState({ correct:0, wrong:0, maxCombo:0 });

            const currentQ = useMemo(() => QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)], [qIndex]);

            const spawnMonster = useCallback(() => {
                const isBoss = player.floor % 5 === 0;
                const pool = MONSTER_TYPES.filter(m => isBoss ? m.isBoss : !m.isBoss);
                const type = pool[Math.floor(Math.random()*pool.length)];
                const scale = 1 + (player.floor * 0.25);
                const hp = Math.floor(100 * type.hpMod * scale);
                setMonster({ hp, maxHp:hp, name:`${isBoss?'【BOSS】':''}${type.name} (F${player.floor})`, type, frozen:0 });
                setGauge(0);
                let log = `F${player.floor}: 遭遇 ${type.name}！`;
                if (type.effect) log += ` (${type.effectName})`;
                setCombatLog(log);
            }, [player.floor]);

            useEffect(() => { spawnMonster(); }, []);

            useEffect(() => {
                let interval;
                if (turn === 'player') {
                    interval = setInterval(() => {
                        if (monster.frozen > 0) { setMonster(m => ({...m, frozen: m.frozen-0.2})); return; }
                        setGauge(prev => {
                            if (prev >= 100) {
                                const dmg = Math.floor((10+player.floor*1.5)*monster.type.atkMod);
                                handleDamage(dmg, `${monster.type.name} 攻擊！`);
                                return 0;
                            }
                            return prev + (2.0 * monster.type.speedMod);
                        });
                    }, 200);
                }
                return () => clearInterval(interval);
            }, [turn, monster.frozen, monster.type, player.floor]);

            const handleDamage = (rawDmg, reason) => {
                if (Math.random() < player.dodge) { setCombatLog(`${reason} MISS!`); return; }
                AudioEngine.hit();
                setAnim('damage');
                const dmg = Math.max(0, rawDmg - player.shield);
                const remainingShield = Math.max(0, player.shield - rawDmg);
                if (player.thorns > 0) setMonster(m => ({...m, hp: Math.max(0, m.hp-Math.floor(rawDmg*player.thorns))}));
                setPlayer(p => ({ ...p, hp: Math.max(0, p.hp-dmg), shield: remainingShield, combo:0 }));
                setCombatLog(`${reason} 受到 ${dmg} 傷害！`);
                setTimeout(() => {
                    setAnim(null);
                    if (player.hp - dmg <= 0) {
                        if (player.revive) { setPlayer(p => ({...p, hp:p.maxHp, revive:false})); setCombatLog("鳳凰灰燼觸發！"); }
                        else { setTurn('lose'); AudioEngine.lose(); AudioEngine.defeatTTS(); }
                    }
                }, 300);
            };

            const resolveAttack = () => {
                setSessionStats(prev => ({ ...prev, correct: prev.correct+1, maxCombo: Math.max(prev.maxCombo, player.combo+1) }));
                const comboMult = 1 + (player.combo * 0.1);
                let dmg = (player.atk + player.bonusDmg) * comboMult;
                const isCrit = Math.random() < player.critChance;
                if (isCrit) { dmg *= player.critMult; AudioEngine.crit(); } else AudioEngine.attack();
                dmg = Math.floor(dmg);
                if (player.lifesteal > 0) setPlayer(p => ({...p, hp: Math.min(p.maxHp, p.hp+Math.floor(dmg*player.lifesteal))}));
                const newCombo = player.combo + 1;
                let log = `${isCrit?'會心！':''} -${dmg}`;
                let bonusHp = 0, bonusShield = 0;
                if (newCombo > 0 && newCombo % 10 === 0) { bonusHp = Math.floor(player.maxHp*0.10); bonusShield = 15; AudioEngine.powerUp(); AudioEngine.comboTTS(newCombo); log = `連擊獎勵！+${bonusHp}HP +${bonusShield}盾`; }
                else if (newCombo >= 5) { AudioEngine.comboTTS(newCombo); }
                AudioEngine.correctTTS();
                setPlayer(p => ({ ...p, bonusDmg:0, combo:newCombo, hp:Math.min(p.maxHp,p.hp+bonusHp), shield:p.shield+bonusShield }));
                setMonster(m => ({...m, hp: Math.max(0, m.hp-dmg)}));
                setCombatLog(log);
                setGauge(prev => Math.max(0, prev-10));
                if (monster.hp - dmg <= 0) setTimeout(handleVictory, 600); else setTimeout(() => setUserInput([]), 600);
            };

            const handleVictory = () => {
                AudioEngine.levelUp();
                AudioEngine.victoryTTS();
                const expGain = Math.floor((50+player.floor*10)*baseStats.expMult);
                const coinGain = 15 + Math.floor(player.floor*3);
                let newExp = player.exp + expGain;
                let newLevel = player.level;
                let newMaxExp = player.maxExp;
                let leveledUp = false;
                if (newExp >= player.maxExp) { newExp -= player.maxExp; newLevel++; newMaxExp = Math.floor(newMaxExp*1.2); leveledUp = true; }
                if (leveledUp) { AudioEngine.powerUp(); AudioEngine.levelUpTTS(); setLevelUpFlash(true); setTimeout(() => setLevelUpFlash(false), 1200); }
                setPlayer(p => ({...p, exp:newExp, level:newLevel, maxExp:newMaxExp, maxHp:leveledUp?p.maxHp+10:p.maxHp, atk:leveledUp?p.atk+2:p.atk, hp:leveledUp?p.maxHp:p.hp, floor:p.floor+1, coinsGained:p.coinsGained+coinGain, gold:p.gold+coinGain }));
                const pool = RPG_ARTIFACTS.filter(a => a.unlockCost===0 || metaState.unlockedArtifacts.includes(a.id)).sort(()=>0.5-Math.random()).slice(0,5);
                setRewards(pool);
                setTurn('reward');
            };

            const handleKey = (key) => {
                if (turn !== 'player') return;
                const targetCode = getTargetCode(currentQ, 'cangjie');
                const next = [...userInput, key];
                if (targetCode.startsWith(next.join(''))) {
                    if (next.join('') === targetCode) { resolveAttack(); setUserInput([]); }
                    else { AudioEngine.click(); setUserInput(next); }
                } else { AudioEngine.wrong(); setCombatLog("按錯了！"); setPlayer(p => ({...p, combo:0})); setSessionStats(prev => ({...prev, wrong:prev.wrong+1})); setUserInput([]); }
            };

            const handleSelect = (val) => {
                if (turn !== 'player') return;
                if (val === currentQ.code[0]) resolveAttack();
                else { AudioEngine.wrong(); setCombatLog("選錯了！"); setPlayer(p => ({...p, combo:0})); setSessionStats(prev => ({...prev, wrong:prev.wrong+1})); }
            };

            if (turn === 'lose') return (
                <div className="absolute inset-0 bg-zinc-950 flex flex-col items-center justify-center text-white p-8 z-50">
                    {levelUpFlash && <motion.div initial={{opacity:0}} animate={{opacity:[0,0.6,0]}} transition={{duration:1}} className="absolute inset-0 bg-yellow-500/10 pointer-events-none z-40}/>}
                    {player.avatar !== 'hero' && player.avatar !== 'heroine' && AVATARS[player.avatar]?.hurtPath && (
                        <motion.img initial={{scale:0.8,opacity:0}} animate={{scale:1,opacity:1}} src={AVATARS[player.avatar].hurtPath} alt={AVATARS[player.avatar].name} className="w-32 h-32 object-contain mb-4 rounded-2xl" onError={e=>e.target.style.display='none'}/>
                    )}
                    <LucideIcon icon={Skull} size={80} className="text-red-500 mb-6" />
                    <h2 className="text-4xl font-black mb-2 text-red-500 font-display">挑戰結束</h2>
                    <p className="text-xl mb-4 text-zinc-400">止步於第 {player.floor} 層</p>
                    <div className="bg-zinc-900 p-6 rounded-2xl mb-8 border border-zinc-800"><p className="text-sm text-gold-400 mb-2">本次獲得</p><div className="flex items-center gap-2 text-3xl font-black text-yellow-400"><LucideIcon icon={Coins}/> <span>{player.coinsGained}</span></div></div>
                    <div className="grid grid-cols-2 gap-4 mb-8 text-center">
                        <div className="bg-zinc-900 p-4 rounded-xl border border-zinc-800"><div className="text-2xl font-black text-green-400">{sessionStats.correct}</div><div className="text-xs text-zinc-500">答對</div></div>
                        <div className="bg-zinc-900 p-4 rounded-xl border border-zinc-800"><div className="text-2xl font-black text-purple-400">{sessionStats.maxCombo}</div><div className="text-xs text-zinc-500">最高連擊</div></div>
                    </div>
                    <button aria-label="返回聖殿" onPointerDown={()=>onGameEnd(player.coinsGained, sessionStats)} className="bg-zinc-800 hover:bg-zinc-700 px-8 py-3 rounded-full font-bold border border-zinc-700 min-h-[44px]">返回聖殿</button>
                </div>
            );

            if (turn === 'reward') return (
                <div className="absolute inset-0 bg-zinc-950/95 backdrop-blur-xl flex flex-col items-center justify-center text-white p-4 z-50">
                    {levelUpFlash && <motion.div initial={{opacity:0}} animate={{opacity:[0,0.8,0]}} transition={{duration:1.2}} className="absolute inset-0 bg-yellow-500/20 pointer-events-none z-40}/>}
                    {player.avatar !== 'hero' && player.avatar !== 'heroine' && AVATARS[player.avatar]?.victoryPath && (
                        <motion.img initial={{scale:0.8,opacity:0}} animate={{scale:1,opacity:1}} src={AVATARS[player.avatar].victoryPath} alt={AVATARS[player.avatar].name} className="w-32 h-32 object-contain mb-4 rounded-2xl" onError={e=>e.target.style.display='none'}/>
                    )}
                    <motion.h2 initial={{y:-20, opacity:0}} animate={{y:0, opacity:1}} className="text-3xl font-black text-yellow-400 mb-8 font-display animate-pulse">戰利品選擇</motion.h2>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4 max-w-5xl w-full">
                        {rewards.map((r,i) => (
                            <motion.button key={i} initial={{scale:0, opacity:0}} animate={{scale:1, opacity:1}} transition={{delay:i*0.08}}
                                onPointerDown={() => { AudioEngine.correct(); const newP = r.effect(player); setPlayer({...newP, artifacts:[...newP.artifacts,{id:r.id,name:r.name,icon:r.icon,desc:r.desc}]}); setTimeout(()=>{setTurn('player'); spawnMonster();},300); }}
                                className="bg-zinc-900 border-2 border-purple-500/50 hover:border-purple-400 hover:scale-105 transition-all p-4 rounded-2xl flex flex-col items-center glass">
                                <LucideIcon icon={r.icon} size={36} className="text-yellow-400 mb-3" />
                                <h3 className="text-lg font-bold mb-1">{r.name}</h3>
                                <p className="text-xs text-zinc-500">{r.desc}</p>
                            </motion.button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className={`h-full w-full flex flex-col bg-zinc-950 text-white relative overflow-hidden ${anim==='damage'?'animate-damage-flash':''}`}>
                    {/* Top bar */}
                    <div className="p-3 bg-zinc-900/90 border-b border-zinc-800/50 flex justify-between items-center z-10">
                        <div className="flex items-center gap-3 cursor-pointer" onPointerDown={()=>setShowStats(!showStats)}>
                            <div className="w-12 h-12 bg-purple-900/80 rounded-xl flex flex-col items-center justify-center border border-purple-500/40 shadow-lg shadow-purple-900/30">
                                <span className="text-[10px] text-purple-300">LV</span><span className="font-black text-xl text-purple-200">{player.level}</span>
                            </div>
                            <div>
                                <div className="flex justify-between w-36 text-[10px] text-zinc-500 mb-1"><span>F{player.floor}</span><span className="text-yellow-400 font-bold">Combo {player.combo}</span></div>
                                <div className="w-36 h-3 bg-zinc-800 rounded-full overflow-hidden border border-zinc-700/50 relative"><div className={`h-full bg-gradient-to-r ${player.hp/player.maxHp < 0.3 ? 'from-red-700 to-red-500 animate-pulse-glow' : 'from-red-600 to-red-400'} transition-all`} style={{width:`${(player.hp/player.maxHp)*100}%`}}/><div className={`absolute inset-0 rounded-full ${player.hp/player.maxHp < 0.3 ? 'shadow-[0_0_8px_rgba(239,68,68,0.8)]' : ''} transition-all duration-300`}/></div>
                                <div className="text-[10px] text-right text-zinc-600">{player.hp}/{player.maxHp}</div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-1 text-gold-400 font-bold bg-zinc-900/80 px-3 py-1.5 rounded-full text-sm border border-gold-500/20">
                                <LucideIcon icon={Coins} size={14}/> <span>{player.gold}</span>
                            </div>
                            <button aria-label="關閉" onPointerDown={goHome} className="p-3 bg-red-900/30 text-red-400/70 rounded-lg hover:bg-red-900/50 transition-colors border border-red-900/30 min-w-[44px] min-h-[44px] flex items-center justify-center"><LucideIcon icon={X} size={18}/></button>
                        </div>
                    </div>

                    {showStats && <div className="absolute top-20 left-4 bg-zinc-900/95 border border-zinc-700/50 p-4 rounded-2xl z-40 text-sm glass shadow-2xl">
                        <h4 className="font-bold text-purple-300 mb-2">屬性</h4>
                        <p className="text-zinc-400">⚔️ {player.atk} | ⚡ {Math.round(player.critChance*100)}% | 🩸 {Math.round((player.lifesteal||0)*100)}%</p>
                        <h4 className="font-bold text-purple-300 mt-2 mb-2">遺物</h4>
                        <div className="flex flex-wrap gap-1">{player.artifacts.map((a,i)=><div key={i} title={`${a.name}: ${a.desc}`} className="bg-zinc-800 p-1.5 rounded-lg border border-zinc-700"><LucideIcon icon={a.icon} size={14} className="text-yellow-500"/></div>)}</div>
                    </div>}

                    <div className="flex-1 relative flex flex-col items-center justify-center">
                        <div className="absolute inset-0 -z-10" style={{background:'radial-gradient(circle at 50% 60%, rgba(76,29,149,0.15) 0%, rgba(9,9,11,1) 70%)'}}/>
                        {/* Skills bar */}
                        <div className="absolute top-4 flex gap-3 z-20">
                            {player.skills.map((s,i) => (
                                <button aria-label={`技能: ${s.id}`} onPointerDown={() => { AudioEngine.skill(); AudioEngine.skillTTS(s.id); if(s.id==='heal'){const v=Math.floor(player.maxHp*0.3); setPlayer(p=>({...p,hp:Math.min(p.maxHp,p.hp+v)})); setCombatLog(`回覆 ${v} HP`);}
                                    else if(s.id==='burst'){setPlayer(p=>({...p,bonusDmg:p.atk*2})); setCombatLog('下次傷害 200%！');}
                                    setPlayer(p=>({...p,skills:p.skills.map((sk,j)=>j===i?{...sk,currentCd:5}:sk)}));
                                }} disabled={s.currentCd>0}
                                    className={`w-13 h-13 rounded-xl border-2 flex items-center justify-center relative transition-all active:scale-90 ${s.currentCd>0?'bg-zinc-900 border-zinc-700 opacity-40 cursor-not-allowed':'border-white/20 shadow-lg'}`}
                                    style={{background:'rgba(0,0,0,0.6)'}}>
                                    <LucideIcon icon={s.icon} size={20} className="text-white"/>
                                    {s.currentCd>0&&<div className="absolute inset-0 bg-black/70 rounded-xl flex items-center justify-center font-black text-white text-sm">{s.currentCd}</div>}
                                </button>
                            ))}
                        </div>

                        {/* Monster */}
                        <motion.div animate={{y:[0,-10,0]}} transition={{repeat:Infinity,duration:3}} className="relative z-10 mt-8 mb-4" style={{x: feedback === 'correct' ? [0, 8, -8, 4, 0] : 0}}>
                            <div className="w-40 h-40 rounded-full border-4 flex items-center justify-center shadow-2xl relative"
                                style={{borderColor:'#8b5cf6', boxShadow:'0 0 40px rgba(139,92,246,0.3), inset 0 0 30px rgba(139,92,246,0.1)', background:'radial-gradient(circle, #1e1b4b 0%, #0f0f12 100%)'}}>
                                <LucideIcon icon={monster.type.icon} size={72} className={monster.type.color}/>
                                <span className="absolute inset-0 flex items-center justify-center text-6xl font-serif font-black text-white/90 drop-shadow-lg">{currentQ.char}</span>
                                {monster.frozen>0&&<div className="absolute inset-0 flex items-center justify-center bg-cyan-500/20 rounded-full"><LucideIcon icon={Snowflake} size={56} className="text-cyan-300 animate-pulse"/></div>}
                            </div>
                            {/* HP bar */}
                            <div className="absolute -bottom-4 left-1/2 transform -translate-x-1/2 w-44 h-2.5 bg-zinc-800 rounded-full overflow-hidden border border-zinc-700/50">
                                <motion.div className="h-full bg-gradient-to-r from-purple-600 to-purple-400" style={{width:`${(monster.hp/monster.maxHp)*100}%`}} transition={{duration:0.2}}/>
                            </div>
                            <div className="absolute -top-10 w-full text-center text-sm font-bold text-red-400 drop-shadow-lg">{monster.name}</div>
                        </motion.div>

                        {/* Combat log */}
                        <motion.div key={combatLog} initial={{opacity:0,y:10}} animate={{opacity:1,y:0}} className="text-center font-bold text-lg text-purple-200/80 mb-2 h-8">{combatLog}</motion.div>

                        {/* Combo display with milestone milestones */}
                        {player.combo >= 5 && (
                            <motion.div initial={{scale:0.5, opacity:0}} animate={{scale:1, opacity:1}} key={player.combo}
                                className="text-2xl font-black mb-2 font-display"
                                style={{color: player.combo >= 20 ? '#f43f5e' : player.combo >= 15 ? '#f97316' : player.combo >= 10 ? '#eab308' : '#facc15'}}
                                animate={player.combo >= 15 ? {rotate:[0,-2,2,-2,0]} : player.combo >= 10 ? {scale:[1,1.1,1]} : undefined}
                                transition={player.combo >= 10 ? {duration:0.4} : {duration:0.5}}>
                                {player.combo >= 20 ? '💥 火力全開！' : player.combo >= 15 ? '🔥 熱辣辣！' : player.combo >= 10 ? '⚡ 強烈連擊！' : '⚡'} {player.combo} COMBO
                            </motion.div>
                        )}
                    </div>

                    {/* Bottom keyboard panel */}
                    <div className="bg-zinc-900/95 border-t border-zinc-800/50 p-4 rounded-t-3xl shadow-2xl relative z-20">
                        <div className="text-center mb-3 text-zinc-500 text-sm">
                            <span className="text-purple-300">全碼：{currentQ.code}</span> — 提示：{currentQ.hint}
                        </div>
                        <KeyboardUI inputMode="cangjie" userInput={userInput} currentQ={currentQ} monster={monster} onKey={handleKey} disabled={turn!=='player'} accentColor="#a78bfa"/>
                    </div>
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 🏃 RUNNER GAME
        // ───────────────────────────────────────────────────────────────
        const RunnerGame = ({ chapter, goHome }) => {
            const [qIndex, setQIndex] = useState(0);
            const [gameState, setGameState] = useState('running');
            const [userInput, setUserInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [time, setTime] = useState(0);
            const [score, setScore] = useState(0);
            const [qStartTime, setQStartTime] = useState(null);
            const [sessionStats, setSessionStats] = useState({ correct:0, wrong:0, maxCombo:0 });
            const currentQ = useMemo(() => QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)], [qIndex]);

            const charProgress = (qIndex / 10) * 75;

            useEffect(() => { const i = setInterval(() => setTime(t => t+1), 1000); return () => clearInterval(i); }, []);
            useEffect(() => {
                if (gameState==='running') { const t = setTimeout(() => { setGameState('bullet_time'); setQStartTime(Date.now()); }, 2500); return () => clearTimeout(t); }
            }, [gameState, qIndex]);

            const processAnswer = useCallback(() => {
                AudioEngine.correct(); setFeedback('correct');
                const speedBonus = Math.max(0, Math.floor(50-((Date.now()-qStartTime)/1000)*5));
                setScore(s => s + 100 + speedBonus);
                setSessionStats(prev=>({...prev, correct:prev.correct+1, maxCombo:Math.max(prev.maxCombo,qIndex+1)}));
                setTimeout(() => { setFeedback(null); setUserInput([]); setQIndex(q=>q+1); setGameState('running'); }, 800);
            }, [qStartTime, qIndex]);

            const handleWrong = () => { AudioEngine.wrong(); setFeedback('wrong'); setSessionStats(prev=>({...prev, wrong:prev.wrong+1})); setTimeout(() => { setFeedback(null); setUserInput([]); }, 600); };

            const handleKey = (key) => {
                if (gameState !== 'bullet_time' || feedback === 'correct') return;
                const target = getTargetCode(currentQ, 'cangjie');
                const next = [...userInput, key];
                if (target.startsWith(next.join(''))) {
                    if (next.join('') === target) { processAnswer(); setUserInput([]); }
                    else { AudioEngine.click(); setUserInput(next); }
                } else handleWrong();
            };

            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [gameState, userInput, feedback, currentQ]);

            return (
                <div className="h-full w-full flex flex-col bg-zinc-950 overflow-hidden relative">
                    <div className="absolute top-0 left-0 right-0 p-4 flex justify-between items-center z-20 pointer-events-none">
                        <div className="flex items-center space-x-3 pointer-events-auto">
                            <button aria-label="返回" onPointerDown={goHome} className="bg-zinc-800/80 backdrop-blur p-3 rounded-xl border border-zinc-700/50 shadow-lg min-w-[44px] min-h-[44px] flex items-center justify-center"><LucideIcon icon={ArrowLeft} size={20}/></button>
                            <div className="flex items-center space-x-2 bg-zinc-800/80 backdrop-blur px-3 py-1.5 rounded-xl border border-zinc-700/50 shadow-lg"><LucideIcon icon={Timer} className="text-blue-400" size={18}/><span className="font-black text-white font-mono">{Math.floor(time/60).toString().padStart(2,'0')}:{(time%60).toString().padStart(2,'0')}</span></div>
                            <div className="flex items-center space-x-2 bg-zinc-800/80 backdrop-blur px-3 py-1.5 rounded-xl border border-zinc-700/50 shadow-lg"><LucideIcon icon={Star} className="text-yellow-400" size={18}/><span className="font-black text-yellow-400">{score}</span></div>
                        </div>
                    </div>

                    {/* Runner track */}
                    <div className="relative h-[58%] flex flex-col justify-end overflow-hidden">
                        {/* Speed lines */}
                        <div className="absolute inset-0 overflow-hidden opacity-20">
                            {[...Array(8)].map((_, i) => <div key={i} className="absolute h-0.5 bg-gradient-to-r from-transparent via-yellow-400 to-transparent" style={{top:`${15+i*10}%`,left:'-10%',width:'120%',animation:`speedLine ${2+i*0.3}s linear infinite`,animationDelay:`${i*0.2}s`}}/>)}</div>
                        <style>{`@keyframes speedLine { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }`}</style>

                        {/* Ground */}
                        <div className="absolute bottom-0 w-full h-1/2" style={{background:'linear-gradient(to bottom, #1e3a5f 0%, #0c1a2e 100%)'}}>
                            {[...Array(20)].map((_, i) => <div key={i} className="absolute bottom-0 h-1 w-8 bg-yellow-400/20" style={{left:`${i*5}%`}}/>)}
                        </div>
                        <div className="absolute bottom-10 right-[8%] z-10"><LucideIcon icon={Flag} size={48} className="text-red-500 drop-shadow-lg"/></div>

                        {/* Character */}

        // ───────────────────────────────────────────────────────────────

            const processAnswer = () => {
                const elapsed = (Date.now() - qStartRef.current) / 1000;
                setWpm(Math.round((score + 100) / (elapsed + 1) * 60) || 0);
                setScore(s => s + 100);

                const target = getTargetCode(currentQ, 'cangjie');

                if (target.startsWith(next.join(''))) {

        // ───────────────────────────────────────────────────────────────
        // 🏰 VOCABULARY GAME
        // ───────────────────────────────────────────────────────────────
        const VocabularyGame = ({ chapter, goHome }) => {
            const TOTAL = 10;
            const [qIndex, setQIndex] = useState(0);
            const [userInput, setUserInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [lives, setLives] = useState(3);
            const [score, setScore] = useState(0);
            const [streak, setStreak] = useState(0);
            const [gameState, setGameState] = useState('playing');
            const [stats, setStats] = useState({ correct:0, wrong:0 });
            const filtered = useMemo(() => chapter ? QUESTIONS.filter(q=>q.mainCode===chapter) : QUESTIONS, [chapter]);
            const currentQ = useMemo(() => filtered[qIndex % filtered.length], [qIndex]);

            const processAnswer = () => {
                AudioEngine.correct(); setFeedback('correct');
                const streakBonus = Math.min(streak * 10, 50);
                setScore(s => s + 100 + streakBonus);
                setStreak(s => s+1);
                setStats(s => ({...s, correct:s.correct+1}));
                if (qIndex+1 >= TOTAL) { AudioEngine.win(); setGameState('win'); }
                else setTimeout(() => { setFeedback(null); setUserInput([]); setQIndex(q=>q+1); }, 500);
            };

            const handleWrong = () => {
                AudioEngine.wrong(); setFeedback('wrong');
                setLives(l => { const n=l-1; if(n<=0) { AudioEngine.lose(); setGameState('lose'); } return n; });
                setStreak(0);
                setStats(s => ({...s, wrong:s.wrong+1}));
                setTimeout(() => { setFeedback(null); setUserInput([]); }, 600);
            };

            const handleKey = (key) => {
                if (gameState !== 'playing' || feedback) return;
                const target = getTargetCode(currentQ, 'cangjie');
                const next = [...userInput, key];
                if (target.startsWith(next.join(''))) { if (next.join('') === target) processAnswer(); else { AudioEngine.click(); setUserInput(next); } }
                else handleWrong();
            };

            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [gameState, userInput, currentQ, feedback]);

                    <div className="flex-1 flex flex-col items-center justify-center p-6">
                        <div className="text-7xl font-serif font-black mb-4 text-emerald-100">{currentQ?.char}</div>

        };

        // ───────────────────────────────────────────────────────────────
        // ⏱️ CHALLENGE GAME
        // ───────────────────────────────────────────────────────────────
        const ChallengeGame = ({ chapter, goHome }) => {
            const [qIndex, setQIndex] = useState(0);

            const [feedback, setFeedback] = useState(null);

                if (gameState !== 'playing') return;

            const processAnswer = () => { AudioEngine.correct(); setFeedback('correct'); setScore(s => s+100); setStats(s => ({...s, correct:s.correct+1})); setTimeout(() => { setFeedback(null); setUserInput([]); setQIndex(q=>q+1); }, 250); };

                            {[{v:score,l:'總分',c:'text-yellow-400'},{v:stats.correct,l:'答對',c:'text-green-400'},{v:stats.wrong,l:'答錯',c:'text-red-400'},{v:accuracy,l:'準確率',c:'text-cyan-400'}].map(x => <div key={x.l} className="bg-zinc-900 p-4 rounded-xl border border-zinc-800 text-center"><div className={`text-2xl font-black ${x.c}`}>{x.v}</div><div className="text-xs text-zinc-500">{x.l}</div></div>)}

                        <button aria-label="返回" onPointerDown={goHome} className="bg-red-700 hover:bg-red-600 px-8 py-3 rounded-full font-bold border border-red-600/50 min-h-[44px]">返回</button>

                    {gameState==='ready' ? (

        // ───────────────────────────────────────────────────────────────
        // 🎧 DICTATION GAME
        // ───────────────────────────────────────────────────────────────
        const DictationGame = ({ chapter, goHome }) => {
            const [qIndex, setQIndex] = useState(0);

            const currentQ = useMemo(() => filtered[qIndex % filtered.length], [qIndex]);

            const speak = (text) => { if ('speechSynthesis' in window) { const u = new SpeechSynthesisUtterance(text); u.lang = 'zh-HK'; u.rate = 0.8; speechSynthesis.cancel(); speechSynthesis.speak(u); } };

            const processAnswer = () => { AudioEngine.correct(); setFeedback('correct'); setScore(s => s+100); setStats(s => ({...s, correct:s.correct+1})); setTimeout(() => { setFeedback(null); setUserInput([]); setShowHint(false); setQIndex(q=>q+1); }, 700); };

            const handleKey = (key) => {
                const target = getTargetCode(currentQ, 'cangjie');
                const next = [...userInput, key];
                if (target.startsWith(next.join(''))) { if (next.join('') === target) processAnswer(); else { AudioEngine.click(); setUserInput(next); } }
                else { AudioEngine.wrong(); setFeedback('wrong'); setStats(s => ({...s, wrong:s.wrong+1})); setUserInput([]); setTimeout(() => setFeedback(null), 700); }
            };

            useEffect(() => { speak(currentQ?.char); }, [qIndex]);
            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [gameState, userInput, currentQ, feedback]);

            return (
                <div className="h-full w-full flex flex-col bg-indigo-950 text-white">
                    <div className="p-4 border-b border-indigo-800/30 flex justify-between items-center bg-indigo-900/20">
                        <div className="flex items-center gap-3">
                            <button aria-label="返回" onPointerDown={goHome} className="bg-indigo-900/30 p-3 rounded-xl hover:bg-indigo-900/50 border border-indigo-700/30 min-w-[44px] min-h-[44px] flex items-center justify-center"><LucideIcon icon={ArrowLeft}/></button>
                            <span className="font-bold text-indigo-200">聽打模式</span>
                        </div>
                        <div className="flex items-center gap-3 text-sm">
                            <div className="text-xl font-bold text-yellow-400"><LucideIcon icon={Star}/> {score}</div>
                            <span className="text-green-400">✓{stats.correct}</span>
                            <span className="text-red-400">✗{stats.wrong}</span>
                        </div>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-8">
                        <button aria-label="朗讀題目" onPointerDown={() => speak(currentQ?.char)} className="mb-8 bg-indigo-800/60 hover:bg-indigo-700/60 px-6 py-3 rounded-2xl font-bold flex items-center gap-2 border border-indigo-600/40 min-h-[44px] transition-colors">
                            <LucideIcon icon={Headphones}/> 再聽一次
                        </button>
                        <div className="text-6xl font-serif font-black mb-6 text-indigo-200/30 blur-sm select-none">{currentQ?.char}</div>
                        {!showHint && <button aria-label="顯示提示" onPointerDown={() => setShowHint(true)} className="mb-3 text-indigo-300/50 text-sm hover:text-indigo-200 transition-colors min-h-[44px]">顯示提示</button>}
                        {showHint && <div className="text-center text-indigo-200/50 mb-3 text-sm">提示：{currentQ?.hint}</div>}

                        <div className="flex justify-center mb-4 space-x-2 min-h-[48px] flex-wrap">{userInput.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-indigo-500/40 rounded-lg flex items-center justify-center text-xl font-bold bg-black/40 text-indigo-300">{KEYBOARD_MAP[k]}</div>)}</div>

        };

        // ───────────────────────────────────────────────────────────────
        // ⚔️ BATTLE GAME
        // ───────────────────────────────────────────────────────────────
        const BattleGame = ({ chapter, goHome }) => {
            const [playerHP, setPlayerHP] = useState(100);
            const [cpuHP, setCpuHP] = useState(100);
            const [qIndex, setQIndex] = useState(0);
            const [userInput, setUserInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [log, setLog] = useState('對戰開始！');
            const [gameState, setGameState] = useState('playing');
            const [turn, setTurn] = useState('player');
            const [sessionStats, setSessionStats] = useState({ correct:0, wrong:0 });
            const filtered = useMemo(() => chapter ? QUESTIONS.filter(q=>q.mainCode===chapter) : QUESTIONS, [chapter]);
            const currentQ = useMemo(() => filtered[qIndex % filtered.length], [qIndex]);

            const cpuThink = useCallback(() => {
                setTimeout(() => {
                    if (cpuHP <= 0) { setGameState('win'); AudioEngine.win(); return; }
                    const cpuCorrect = Math.random() > 0.35;
                    if (cpuCorrect) { AudioEngine.attack(); setCpuHP(h => Math.max(0, h-8)); setLog('CPU 命中！-8 HP'); }
                    else setLog('CPU 失手了！');
                    setTurn('player');
                }, 800);
            }, [cpuHP]);

            const processAnswer = () => {
                AudioEngine.correct(); setFeedback('correct'); setSessionStats(s => ({...s, correct:s.correct+1}));
                setCpuHP(h => Math.max(0, h-15)); setLog('你命中！-15 HP');
                if (cpuHP <= 15) { setGameState('win'); AudioEngine.win(); }
                else { setTurn('cpu'); cpuThink(); }
                setTimeout(() => { setFeedback(null); setUserInput([]); setQIndex(q=>q+1); }, 400);
            };

            const handleWrong = () => {
                AudioEngine.wrong(); setFeedback('wrong'); setSessionStats(s => ({...s, wrong:s.wrong+1}));
                setLog('你失手了！'); setPlayerHP(h => Math.max(0, h-12));
                if (playerHP <= 12) { setGameState('lose'); AudioEngine.lose(); }
                else { setTurn('cpu'); cpuThink(); }
                setTimeout(() => { setFeedback(null); setUserInput([]); }, 400);
            };

            const handleKey = (key) => {
                if (gameState !== 'playing' || turn !== 'player' || feedback) return;
                const target = getTargetCode(currentQ, 'cangjie');
                const next = [...userInput, key];
                if (target.startsWith(next.join(''))) { if (next.join('') === target) processAnswer(); else { AudioEngine.click(); setUserInput(next); } }
                else handleWrong();
            };

            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [gameState, turn, userInput, currentQ, feedback, cpuHP, playerHP]);

            if (gameState === 'win') return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-zinc-950 text-white p-8">
                    <LucideIcon icon={Trophy2} size={80} className="text-yellow-400 mb-6 animate-bounce" />
                    <h2 className="text-4xl font-black mb-2 text-green-400 font-display">勝利！</h2>
                    <div className="flex gap-4 mb-8">{[{v:sessionStats.correct,l:'答對',c:'text-green-400'},{v:sessionStats.wrong,l:'答錯',c:'text-red-400'}].map(x => <div key={x.l} className="bg-zinc-900 p-4 rounded-xl border border-zinc-800 text-center"><div className={`text-2xl font-black ${x.c}`}>{x.v}</div><div className="text-xs text-zinc-500">{x.l}</div></div>)}</div>
                    <button aria-label="返回" onPointerDown={goHome} className="bg-rose-700 hover:bg-rose-600 px-8 py-3 rounded-full font-bold border border-rose-600/50 min-h-[44px]">返回</button>
                </div>
            );

            if (gameState === 'lose') return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-zinc-950 text-white p-8">
                    <LucideIcon icon={Skull} size={80} className="text-red-500 mb-6" />
