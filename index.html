<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>速成打字王國 | TypeQuest Kingdom</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'magic': { 950: '#1e1b4b', 900: '#2e1065', 800: '#4c1d95', 600: '#7c3aed', 500: '#8b5cf6', 300: '#c4b5fd', 100: '#ede9fe' },
                        'gold': { 400: '#facc15', 500: '#eab308', 600: '#ca8a04' },
                    },
                    fontFamily: {
                        'sans': ['"Noto Sans TC"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* CSS Variables - Theme */
        :root {
            --primary: #8b5cf6;
            --primary-dark: #4c1d95;
            --primary-light: #c4b5fd;
            --accent: #facc15;
            --accent-dark: #eab308;
            --success: #4ade80;
            --danger: #f87171;
            --purple-300: #c4b5fd;
            --purple-400: #a78bfa;
            --purple-500: #8b5cf6;
            --purple-600: #7c3aed;
            --purple-800: #4c1d95;
            --purple-900: #2e1065;
            --purple-950: #1e1b4b;
            --orange-400: #fb923c;
            --blue-400: #38bdf8;
            --green-400: #4ade80;
            --red-400: #f87171;
        }
        
        html, body { height: 100%; margin: 0; font-family: 'Noto Sans TC', sans-serif; }
        .perspective-road { transform: perspective(500px) rotateX(40deg); transform-origin: 50% 100%; }
        .typing-char { transition: all 0.2s ease; }
        .typing-char.correct { color: #4ade80; transform: scale(1.1); }
        .typing-char.wrong { color: #f87171; animation: shake 0.3s ease; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 2s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); } 50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.8); } }
        .animate-glow { animation: glow 2s ease-in-out infinite; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideIn { animation: slideIn 0.3s ease-out; }
        @keyframes comboFlash { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); } 100% { transform: scale(1); opacity: 0.8; } }
        .combo-flash { animation: comboFlash 0.5s ease-out; }
        @keyframes screenShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .screen-shake { animation: screenShake 0.3s ease; }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 10px 2px rgba(139, 92, 246, 0.6); } 50% { box-shadow: 0 0 25px 5px rgba(139, 92, 246, 0.9); } }
        .pulse-glow { animation: pulseGlow 1s ease-in-out infinite; }
        @keyframes progressPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .progress-pulse { animation: progressPulse 1s ease-in-out infinite; }
        .combo-milestone { background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .energy-bar-fill { transition: width 0.3s ease-out; }
        .mode-card:hover { transform: scale(1.02); }
        .mode-card { transition: transform 0.2s ease; }

        /* Touch target for accessibility (44x44px min for special ed) */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
            padding: 10px 16px;
        }
        
        /* Ensure input has proper touch target */
        input[type="text"] {
            min-height: 48px;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-magic-950 to-magic-900 min-h-screen text-white overflow-hidden">
    <div id="app"></div>

    <script type="module">
        // =============================================
        // 核心系統 (Core Systems)
        // =============================================
        
        // Event Bus
        const EventBus = {
            listeners: new Map(),
            on(event, callback) {
                if (!this.listeners.has(event)) this.listeners.set(event, new Set());
                this.listeners.get(event).add(callback);
                return () => this.off(event, callback);
            },
            once(event, callback) {
                const wrapper = (data) => { this.off(event, wrapper); callback(data); };
                this.on(event, wrapper);
            },
            emit(event, data) {
                if (this.listeners.has(event)) {
                    this.listeners.get(event).forEach(cb => { try { cb(data); } catch (e) { console.error(e); } });
                }
            },
            off(event, callback) {
                if (this.listeners.has(event)) this.listeners.get(event).delete(callback);
            },
        };
        
        const EVENTS = {
            GAME_START: 'game:start', GAME_END: 'game:end',
            QUESTION_SHOW: 'question:show', QUESTION_CORRECT: 'question:correct', QUESTION_WRONG: 'question:wrong',
            LEVEL_COMPLETE: 'level:complete', LEVEL_FAILED: 'level:failed',
            DIFFICULTY_CHANGE: 'difficulty:change', COMBO_UPDATE: 'combo:update', COMBO_MILESTONE: 'combo:milestone',
            MODE_CHANGE: 'mode:change', TIME_TICK: 'time:tick', SKILL_ACTIVATE: 'skill:activate',
        };
        
        // State Machine
        const StateMachine = {
            currentState: 'HOME',
            states: {
                HOME: {}, MENU: {}, MODE_SELECT: {}, PLAYING: {}, LEVEL_COMPLETE: {}, SETTINGS: {}, GAME_OVER: {},
            },
            transition(to) { this.currentState = to; EventBus.emit(EVENTS.STATE_CHANGE, { from: this.currentState, to }); },
            getState() { return this.currentState; },
        };
        
        // Adaptive Difficulty Engine
        const DIFFICULTY_LEVELS = {
            1: { name: '輕鬆', timeLimit: null, hintLevel: 3 },
            2: { name: '簡單', timeLimit: 20, hintLevel: 2 },
            3: { name: '普通', timeLimit: 15, hintLevel: 1 },
            4: { name: '困難', timeLimit: 10, hintLevel: 0 },
            5: { name: '專家', timeLimit: 5, hintLevel: 0 },
        };
        
        const AdaptiveEngine = {
            currentLevel: 3,
            metrics: { recentAccuracy: [], recentTimes: [], consecutiveErrors: 0, consecutiveSuccess: 0, frustrationLevel: 0 },
            recordAnswer({ correct, time }) {
                this.metrics.recentAccuracy.push(correct);
                this.metrics.recentTimes.push(time);
                if (this.metrics.recentAccuracy.length > 10) this.metrics.recentAccuracy.shift();
                if (this.metrics.recentTimes.length > 10) this.metrics.recentTimes.shift();
                if (correct) { this.metrics.consecutiveErrors = 0; this.metrics.consecutiveSuccess++; }
                else { this.metrics.consecutiveErrors++; this.metrics.consecutiveSuccess = 0; }
                this.metrics.frustrationLevel = Math.min(100, this.metrics.consecutiveErrors * 20);
                this._checkAndAdapt();
            },
            _checkAndAdapt() {
                const acc = this.metrics.recentAccuracy.filter(x => x).length / Math.max(1, this.metrics.recentAccuracy.length);
                if (acc < 0.6 || this.metrics.consecutiveErrors >= 3) {
                    this.currentLevel = Math.max(1, this.currentLevel - 1);
                    EventBus.emit(EVENTS.DIFFICULTY_CHANGE, { from: this.currentLevel + 1, to: this.currentLevel });
                } else if (acc > 0.95 && this.metrics.consecutiveSuccess >= 5) {
                    this.currentLevel = Math.min(5, this.currentLevel + 1);
                    EventBus.emit(EVENTS.DIFFICULTY_CHANGE, { from: this.currentLevel - 1, to: this.currentLevel });
                }
            },
            getCurrentDifficulty() { return { level: this.currentLevel, ...DIFFICULTY_LEVELS[this.currentLevel] }; },
            reset() { this.metrics = { recentAccuracy: [], recentTimes: [], consecutiveErrors: 0, consecutiveSuccess: 0, frustrationLevel: 0 }; },
            setLevel(lvl) { this.currentLevel = lvl; },
        };
        
        // Storage Manager
        const StorageManager = {
            PREFIX: 'tk_',
            set(key, value) { try { localStorage.setItem(this.PREFIX + key, JSON.stringify(value)); return true; } catch (e) { return false; } },
            get(key, defaultValue = null) { try { const d = localStorage.getItem(this.PREFIX + key); return d ? JSON.parse(d) : defaultValue; } catch (e) { return defaultValue; } },
        };
        
        // Progress Tracker
        const ProgressTracker = {
            player: null,
            session: { correctCount: 0, wrongCount: 0, startTime: 0, streak: 0, maxStreak: 0 },
            init() { this.player = StorageManager.get('player', this._defaultPlayer()); return this.player; },
            _defaultPlayer() {
                return {
                    id: 'p_' + Date.now(), name: '打字王', avatar: 'hero',
                    progress: { totalStars: 0, completedLevels: [], highScores: {} },
                    stats: { totalQuestions: 0, correctAnswers: 0, bestWPM: 0, longestStreak: 0, gamesPlayed: 0 },
                    badges: [], settings: { difficulty: 3, soundEnabled: true },
                };
            },
            startSession() { this.session = { correctCount: 0, wrongCount: 0, startTime: Date.now(), streak: 0, maxStreak: 0 }; },
            recordCorrect() {
                this.session.correctCount++;
                this.session.streak++;
                if (this.session.streak > this.session.maxStreak) this.session.maxStreak = this.session.streak;
                return { streak: this.session.streak };
            },
            recordWrong() { this.session.wrongCount++; this.session.streak = 0; return { streak: 0 }; },
            getSessionSummary() {
                const total = this.session.correctCount + this.session.wrongCount;
                const elapsed = (Date.now() - this.session.startTime) / 1000;
                const wpm = elapsed > 0 ? Math.round((this.session.correctCount / elapsed) * 60) : 0;
                return { correct: this.session.correctCount, wrong: this.session.wrongCount, total, accuracy: total > 0 ? this.session.correctCount / total : 0, maxStreak: this.session.maxStreak, wpm, elapsed };
            },
            savePlayer() { StorageManager.set('player', this.player); },
        };
        
        // Audio System
        const AudioSystem = {
            ctx: null, enabled: true, volume: 0.1,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx?.state === 'suspended') this.ctx.resume(); },
            playTone(freq, type = 'sine', duration = 0.2, vol = 0.1) {
                if (!this.enabled) return;
                this.init();
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(vol, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(t + duration);
            },
            correct() { this.playTone(880, 'sine', 0.15, this.volume); setTimeout(() => this.playTone(1108, 'sine', 0.2, this.volume), 50); },
            wrong() { this.playTone(150, 'triangle', 0.3, this.volume * 1.5); },
            levelUp() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this.playTone(f, 'sine', 0.25, this.volume), i * 80)); },
            click() { this.playTone(1200, 'sine', 0.03, 0.02); },
            combo5() { this.playTone(660, 'square', 0.1, 0.15); setTimeout(() => this.playTone(880, 'square', 0.1, 0.15), 100); },
            combo10() { [440, 554, 659, 880].forEach((f, i) => setTimeout(() => this.playTone(f, 'square', 0.15, 0.12), i * 80)); },
            combo20() { [523, 659, 784, 1047, 1318].forEach((f, i) => setTimeout(() => this.playTone(f, 'sine', 0.2, 0.15), i * 60)); },
        };
        
        // =============================================
        // 評分系統 (Score System)
        // =============================================
        const ScoreSystem = {
            getGrade(accuracy) {
                if (accuracy >= 0.95) return 'S';
                if (accuracy >= 0.9) return 'A';
                if (accuracy >= 0.8) return 'B';
                if (accuracy >= 0.7) return 'C';
                if (accuracy >= 0.6) return 'D';
                return 'F';
            },
            getGradeColor(grade) {
                const colors = { S: 'text-yellow-400', A: 'text-green-400', B: 'text-blue-400', C: 'text-purple-400', D: 'text-orange-400', F: 'text-red-400' };
                return colors[grade] || 'text-white';
            },
            calculateScore(correct, wrong, maxStreak, timeBonus = 0) {
                const baseScore = correct * 100;
                const streakBonus = maxStreak * 50;
                return baseScore + streakBonus + timeBonus;
            },
            getWPM(correct, elapsedSeconds) {
                if (elapsedSeconds <= 0) return 0;
                return Math.round((correct / elapsedSeconds) * 60);
            },
        };
        
        // =============================================
        // Combo System
        // =============================================
        const ComboSystem = {
            currentCombo: 0,
            maxCombo: 50,
            milestones: [5, 10, 20, 30, 50],
            milestoneMessages: {
                5: { text: '🔥 熱辣辣！', color: 'text-orange-400', sound: 'combo5' },
                10: { text: '💥 火力全開！', color: 'text-yellow-400', sound: 'combo10' },
                20: { text: '⚡ 雷神之怒！', color: 'text-blue-400', sound: 'combo20' },
                30: { text: '🌟 傳奇！', color: 'text-purple-400', sound: 'combo20' },
                50: { text: '👑 天下無敵！', color: 'text-yellow-300', sound: 'combo20' },
            },
            add() {
                this.currentCombo++;
                EventBus.emit(EVENTS.COMBO_UPDATE, { combo: this.currentCombo, max: this.maxCombo });
                if (this.milestones.includes(this.currentCombo)) {
                    const msg = this.milestoneMessages[this.currentCombo];
                    EventBus.emit(EVENTS.COMBO_MILESTONE, { combo: this.currentCombo, message: msg.text, color: msg.color });
                    if (AudioSystem[msg.sound]) AudioSystem[msg.sound]();
                }
                return this.currentCombo;
            },
            reset() { this.currentCombo = 0; EventBus.emit(EVENTS.COMBO_UPDATE, { combo: 0, max: this.maxCombo }); },
            getComboMultiplier() { return 1 + Math.floor(this.currentCombo / 10) * 0.5; },
        };
        
        // =============================================
        // 10種遊戲模式定義
        // =============================================
        const GAME_MODES = {
            foundation: {
                id: 'foundation', name: '基礎關卡', icon: '🏰', description: '線性關卡學習',
                timed: false, hasHints: true, comboEnabled: true, challenges: []
            },
            timeAttack: {
                id: 'timeAttack', name: '限時挑戰', icon: '⏱️', description: '60秒盡量答多題',
                timed: true, timeLimit: 60, hasHints: false, comboEnabled: true, challenges: ['scoreBased']
            },
            vocabulary: {
                id: 'vocabulary', name: '詞彙學習', icon: '📖', description: '先記憶後輸入',
                timed: false, hasHints: true, comboEnabled: false, memorizationPhase: true, challenges: []
            },
            sprint: {
                id: 'sprint', name: '速打模式', icon: '🚀', description: '50題追求最快時間',
                timed: false, targetCount: 50, hasHints: false, comboEnabled: true, challenges: ['speedBased']
            },
            challenge: {
                id: 'challenge', name: '挑戰模式', icon: '🎯', description: '完成特定目標',
                timed: false, hasHints: false, comboEnabled: true, challenges: ['perfect', 'combo10', 'accuracy90']
            },
            practice: {
                id: 'practice', name: '練習模式', icon: '📝', description: '無壓力學習',
                timed: false, infiniteHints: true, hasHints: true, comboEnabled: false, challenges: []
            },
            boss: {
                id: 'boss', name: 'BOSS 戰', icon: '👹', description: '多階段史詩戰鬥',
                timed: false, hasHints: false, comboEnabled: true, isBossMode: true, challenges: []
            },
            free: {
                id: 'free', name: '自由練習', icon: '🎲', description: '自訂題目', comingSoon: true,
                timed: false, customQuestions: true, hasHints: true, comboEnabled: false, challenges: []
            },
        };

        // =============================================
        // GameModeManager - 統一管理 10 種遊戲模式切換
        // =============================================
        const GameModeManager = {
            currentMode: null,
            modeState: {},
            
            // 初始化指定模式
            initMode(modeId, level, config = {}) {
                const modeDef = GAME_MODES[modeId];
                if (!modeDef) {
                    console.error(`[GameModeManager] 未知模式: ${modeId}`);
                    return false;
                }
                
                this.currentMode = modeId;
                this.modeState = {
                    phase: 'playing',
                    correctCount: 0,
                    wrongCount: 0,
                    startTime: Date.now(),
                    streak: 0,
                    maxStreak: 0,
                };
                
                // 觸發模式切換事件
                EventBus.emit(EVENTS.MODE_CHANGE, { 
                    mode: modeId, 
                    modeName: modeDef.name,
                    config: modeDef 
                });
                
                return true;
            },
            
            // 獲取當前模式定義
            getCurrentModeDef() {
                return this.currentMode ? GAME_MODES[this.currentMode] : null;
            },
            
            // 獲取當前即時評級（答題過程中）
            getLiveGrade() {
                const total = this.modeState.correctCount + this.modeState.wrongCount;
                if (total === 0) return { grade: '-', accuracy: 0, color: 'text-gray-400' };
                
                const accuracy = this.modeState.correctCount / total;
                const grade = ScoreSystem.getGrade(accuracy);
                const color = ScoreSystem.getGradeColor(grade);
                
                return { grade, accuracy, color };
            },
            
            // 記錄答題結果
            recordAnswer(correct) {
                if (correct) {
                    this.modeState.correctCount++;
                    this.modeState.streak++;
                    if (this.modeState.streak > this.modeState.maxStreak) {
                        this.modeState.maxStreak = this.modeState.streak;
                    }
                } else {
                    this.modeState.wrongCount++;
                    this.modeState.streak = 0;
                }
                return this.getLiveGrade();
            },
            
            // 獲取模式統計
            getStats() {
                const elapsed = (Date.now() - this.modeState.startTime) / 1000;
                const total = this.modeState.correctCount + this.modeState.wrongCount;
                return {
                    correct: this.modeState.correctCount,
                    wrong: this.modeState.wrongCount,
                    total,
                    accuracy: total > 0 ? this.modeState.correctCount / total : 0,
                    maxStreak: this.modeState.maxStreak,
                    elapsed,
                    wpm: elapsed > 0 ? Math.round((this.modeState.correctCount / elapsed) * 60) : 0,
                };
            },
            
            // 結束當前模式
            endMode() {
                const summary = this.getStats();
                this.currentMode = null;
                this.modeState = {};
                return summary;
            },
            
            // 檢查是否為特殊模式
            isSpecialMode(modeId) {
                const specialModes = ['timeAttack', 'sprint', 'vocabulary', 'boss'];
                return specialModes.includes(modeId);
            },
            
            // 獲取模式列表（用於 UI 渲染）
            getModeList() {
                return Object.values(GAME_MODES);
            },
        };

        // =============================================
        // Boss Mode 系統 - 多階段 HP 血條戰鬥
        // =============================================
        const BossSystem = {
            bossData: null,
            currentPhase: 0,
            maxPhases: 3,
            bossHP: 100,
            bossMaxHP: 100,
            playerHP: 100,
            playerMaxHP: 100,
            enemiesDefeated: 0,
            phaseThreshold: 10, // 每階段需要擊敗多少敵人
            
            // Boss 定義
            BOSS_TEMPLATES: {
                goblin: {
                    name: '哥布林之王',
                    icon: '👹',
                    phases: [
                        { name: '第一形態', hp: 100, difficulty: 1, color: 'green' },
                        { name: '第二形態', hp: 150, difficulty: 2, color: 'yellow' },
                        { name: '最終形態', hp: 200, difficulty: 3, color: 'red' },
                    ],
                    damagePerWrong: 10,
                    damagePerCorrect: 20,
                },
                dragon: {
                    name: '打字龍',
                    icon: '🐉',
                    phases: [
                        { name: '噴火階段', hp: 120, difficulty: 2, color: 'orange' },
                        { name: '旋風階段', hp: 180, difficulty: 3, color: 'purple' },
                        { name: '毀滅階段', hp: 250, difficulty: 4, color: 'red' },
                    ],
                    damagePerWrong: 15,
                    damagePerCorrect: 25,
                },
            },
            
            // 初始化 Boss 戰
            initBoss(bossType = 'goblin') {
                const template = this.BOSS_TEMPLATES[bossType] || this.BOSS_TEMPLATES.goblin;
                this.bossData = { ...template };
                this.currentPhase = 0;
                this.bossMaxHP = template.phases[0].hp;
                this.bossHP = this.bossMaxHP;
                this.playerHP = 100;
                this.playerMaxHP = 100;
                this.enemiesDefeated = 0;
                this.phaseThreshold = 10;
                
                EventBus.emit('boss:init', {
                    boss: this.bossData,
                    phase: this.currentPhase,
                    bossHP: this.bossHP,
                    bossMaxHP: this.bossMaxHP,
                    playerHP: this.playerHP,
                    playerMaxHP: this.playerMaxHP,
                });
                
                return this.bossData;
            },
            
            // 答題正確時對 Boss 造成傷害
            damageBoss() {
                const phase = this.bossData?.phases[this.currentPhase];
                const damage = phase ? 20 + (this.currentPhase * 5) : 20;
                this.bossHP = Math.max(0, this.bossHP - damage);
                this.enemiesDefeated++;
                
                EventBus.emit('boss:damage', { 
                    damage, 
                    bossHP: this.bossHP, 
                    bossMaxHP: this.bossMaxHP,
                    enemiesDefeated: this.enemiesDefeated 
                });
                
                // 檢查是否需要進入下一階段
                this._checkPhaseTransition();
                
                return { bossHP: this.bossHP, damage };
            },
            
            // 答題錯誤時玩家受傷
            playerTakeDamage(wrongCount = 1) {
                const damage = (this.bossData?.damagePerWrong || 10) * wrongCount;
                this.playerHP = Math.max(0, this.playerHP - damage);
                
                EventBus.emit('boss:playerDamage', { 
                    damage, 
                    playerHP: this.playerHP, 
                    playerMaxHP: this.playerMaxHP 
                });
                
                if (this.playerHP <= 0) {
                    this._handleDefeat();
                }
                
                return { playerHP: this.playerHP, damage };
            },
            
            // 檢查階段轉換
            _checkPhaseTransition() {
                const phase = this.bossData?.phases[this.currentPhase];
                if (!phase) return;
                
                // 每擊敗 phaseThreshold 個敵人進入下一階段
                if (this.enemiesDefeated >= (this.currentPhase + 1) * this.phaseThreshold) {
                    this._advancePhase();
                }

                        </div>
                        <div class="mt-8 text-center">
                            <button aria-label="返回主頁" @click="state = 'HOME'" class="px-6 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg">
                                ← 返回
                            </button>
                        </div>
                    </div>
                    
                    <!-- MENU -->
                    <div v-if="state === 'MENU'" class="w-full max-w-4xl animate-slideIn">
                        <div class="text-center mb-4">
                            <h2 class="text-3xl font-bold mb-2">🎮 選擇關卡</h2>
                            <p class="text-purple-300">
                                模式：{{ GAME_MODES[selectedMode]?.name || '基礎' }} | 
                                難度：{{ difficulty.name }}級
                            </p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <button
                                v-for="level in LEVELS"
                                :key="level.id"
                                :aria-label="'開始' + level.name"
                                @click="startLevel(level, selectedMode || 'foundation')"
                                class="p-6 bg-gradient-to-br from-magic-800 to-magic-900 rounded-xl border-2 border-purple-500/30 hover:border-purple-400 transition-all hover:scale-102 text-left group"
                            >
                                <div class="flex items-center gap-4">
                                    <span class="text-4xl">{{ level.icon }}</span>
                                    <div>
                                        <h3 class="text-xl font-bold">{{ level.name }}</h3>
                                        <p class="text-purple-300 text-sm">{{ level.description }}</p>
                                        <span class="text-xs px-2 py-1 bg-purple-600/50 rounded mt-2 inline-block">{{ level.category }}</span>
                                    </div>
                                </div>
                            </button>
                        </div>
                        
                        <div class="mt-8 flex justify-center gap-4">
                            <button aria-label="返回模式選擇" @click="state = 'MODE_SELECT'" class="px-6 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg">
                                ← 換模式
                            </button>
                            <button aria-label="返回主頁" @click="state = 'HOME'" class="px-6 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg">
                                🏠 主頁
                            </button>
                        </div>
                    </div>
                    
                    <!-- PLAYING -->
                    <div v-if="state === 'PLAYING'" class="w-full max-w-2xl animate-slideIn">
                        <!-- 頂部狀態列 -->
                        <div class="flex justify-between items-center mb-4">
                            <div class="text-purple-300">
                                <span class="text-lg">{{ currentLevel?.name }}</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <div v-if="timeRemaining > 0" class="text-xl font-bold" :class="timeRemaining <= 10 ? 'text-red-400' : 'text-yellow-400'">
                                    ⏱️ {{ timeRemaining }}s
                                </div>
                                <div class="text-xl font-bold text-purple-300">
                                    {{ questionIndex + 1 }} / {{ questionTotal }}
                                </div>
                            </div>
                        </div>
                        
                        <!-- 進度條 -->
                        <div class="h-2 bg-magic-800 rounded-full overflow-hidden mb-4" role="progressbar" :aria-valuenow="questionIndex" :aria-valuemin="0" :aria-valuemax="questionTotal" aria-label="答題進度">
                            <div 
                                class="h-full bg-gradient-to-r from-purple-500 to-pink-500 transition-all duration-300"
                                :class="{ 'progress-pulse': combo >= 10 }"
                                :style="{ width: ((questionIndex / questionTotal) * 100) + '%' }"
                            ></div>
                        </div>
                        
                        <!-- Combo & 能量條 -->
                        <div v-if="selectedMode !== 'practice' && selectedMode !== 'vocabulary'" class="mb-4">
                            <div class="flex justify-between text-sm mb-1">
                                <span class="font-bold" :class="combo >= 10 ? 'combo-milestone' : 'text-purple-300'">
                                    {{ combo >= 5 ? '🔥' : '' }} Combo: {{ combo }}
                                </span>
                                <span class="text-purple-400">{{ ScoreSystem.getComboMultiplier().toFixed(1) }}x</span>
                            </div>
                            <div class="h-3 bg-magic-800 rounded-full overflow-hidden">
                                <div 
                                    class="h-full bg-gradient-to-r from-yellow-500 to-orange-500 energy-bar-fill"
                                    :style="{ width: Math.min(100, (combo / 30) * 100) + '%' }"
                                ></div>
                            </div>
                        </div>
                        
                        <!-- Boss HP 血條 (Boss Mode) -->
                        <div v-if="isBossMode" class="mb-4 bg-gradient-to-br from-red-900/50 to-magic-900 rounded-xl p-4 border-2 border-red-500/50">
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-3xl">{{ bossIcon }}</span>
                                    <div>
                                        <div class="font-bold text-red-400">{{ bossName }}</div>
                                        <div class="text-xs text-red-300">{{ bossPhaseName }} ({{ bossPhase + 1 }}/3)</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="text-sm text-red-300">HP</div>
                                    <div class="font-bold text-red-400">{{ bossHP }} / {{ bossMaxHP }}</div>
                                </div>
                            </div>
                            <div class="h-4 bg-red-950 rounded-full overflow-hidden">
                                <div 
                                    class="h-full transition-all duration-300"
                                    :class="{
                                        'bg-gradient-to-r from-red-600 to-red-400': bossPhase === 0,
                                        'bg-gradient-to-r from-yellow-600 to-orange-400': bossPhase === 1,
                                        'bg-gradient-to-r from-purple-600 to-pink-400': bossPhase === 2
                                    }"
                                    :style="{ width: (bossHP / bossMaxHP * 100) + '%' }"
                                ></div>
                            </div>
                            
                            <!-- 玩家 HP -->
                            <div class="flex items-center justify-between mt-3">
                                <div class="flex items-center gap-2">
                                    <span class="text-2xl">🧙</span>
                                    <span class="text-sm text-purple-300">玩家</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="text-sm text-purple-300">{{ bossPlayerHP }} / {{ bossPlayerMaxHP }}</div>
                                    <div class="w-24 h-2 bg-purple-950 rounded-full overflow-hidden">
                                        <div 
                                            class="h-full bg-gradient-to-r from-green-600 to-emerald-400 transition-all duration-300"
                                            :style="{ width: (bossPlayerHP / bossPlayerMaxHP * 100) + '%' }"
                                        ></div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 即時評級 -->
                            <div class="mt-2 text-center">
                                <span class="text-lg font-bold" :class="GameModeManager.getLiveGrade().color">
                                    評級：{{ GameModeManager.getLiveGrade().grade }}
                                </span>
                                <span class="text-sm text-purple-300 ml-2">
                                    ({{ Math.round(GameModeManager.getLiveGrade().accuracy * 100) }}%)
                                </span>
                            </div>
                        </div>
                        
                        <!-- Combo 里程碑訊息 -->
                        <div v-if="comboMilestone" 
                            class="text-center text-2xl font-bold mb-4 animate-slideIn"
                            :class="comboMilestone.color"
                        >
                            {{ comboMilestone.message }}
                        </div>
                        
                        <!-- 遊戲區域 -->
                        <div class="game-container bg-gradient-to-br from-magic-800 to-magic-900 rounded-2xl p-8 border-2 border-purple-500/30">
                            <!-- 題目顯示 -->
                            <div class="text-center mb-6">
                                <div class="text-6xl font-bold mb-2 text-purple-300">{{ currentQuestion?.text }}</div>
                                <div v-if="showHint || selectedMode === 'practice'" class="text-lg text-purple-400 mt-2">
                                    💡 提示：{{ currentQuestion?.hint || '無' }}<br v-if="selectedMode === 'vocabulary'"><span v-if="selectedMode === 'vocabulary' && showCode" class="text-green-400 mt-2 block">答案：{{ currentQuestion?.code }}</span>
                                </div>
                            </div>
                            
                            <!-- 反饋 -->
                            <div v-if="feedback" 
                                class="text-center text-2xl font-bold mb-4 animate-slideIn"
                                :class="feedback.type === 'correct' ? 'text-green-400' : 'text-red-400'"
                            >
                                {{ feedback.message }}
                            </div>
                            
                            <!-- 輸入框 -->
                            <div class="mb-4">
                                <input
                                    ref="inputRef"
                                    v-model="userInput"
                                    @keyup.enter="submitAnswer"
                                    type="text"
                                    aria-label="輸入倉頡碼"
                                    class="w-full px-6 py-4 text-2xl text-center bg-magic-950 border-2 border-purple-500 rounded-xl focus:border-purple-400 focus:outline-none uppercase"
                                    placeholder="輸入倉頡碼..."
                                    autocomplete="off"
                                    autofocus
                                />
                            </div>
                            
                            <!-- 按鈕 -->
                            <div class="flex gap-4">
                                <button v-if="selectedMode !== 'timeAttack' && selectedMode !== 'sprint'" 
                                    @click="showHint = !showHint" 
                                    class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg"
                                >
                                    {{ showHint ? '隱藏提示' : '💡提示' }}
                                </button>
                                <button v-if="selectedMode === 'vocabulary'" 
                                    @click="showCode = !showCode" 
                                    class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 rounded-lg touch-target"
                                    aria-label="顯示或隱藏答案">
                                    {{ showCode ? '隱藏答案' : '顯示答案' }}
                                </button>
                                <button aria-label="確認答案" @click="submitAnswer" class="flex-1 py-3 bg-purple-600 hover:bg-purple-500 rounded-lg font-bold text-lg touch-target">
                                    確認 ✓
                                </button>
                                <button aria-label="離開遊戲" @click="goToMenu" class="py-3 px-4 bg-red-900/50 hover:bg-red-800/50 rounded-lg text-xl touch-target">
                                    ✕
                                </button>
                            </div>
                        </div>
                        
                        <div v-if="currentQuestion" class="text-center text-purple-400 text-sm mt-2">
                            WPM: {{ Math.round((ProgressTracker.session.correctCount / Math.max(1, (Date.now() - ProgressTracker.session.startTime) / 60000)) || 0) }}
                        </div>
<!-- 難度提示 -->
                        <div class="mt-4 text-center text-purple-400 text-sm">
                            難度：{{ difficulty.name }}級 | 
                            <span v-if="combo > 0" :class="combo >= 10 ? 'text-yellow-400 font-bold' : ''">
                                連擊：{{ combo }}
                            </span>
                            <span v-else>連擊：0</span>
                        </div>
                    </div>
                    
                    <!-- LEVEL_COMPLETE -->
                    <div v-if="state === 'LEVEL_COMPLETE'" class="w-full max-w-md text-center animate-slideIn">
                        <div class="text-6xl mb-4">{{ sessionSummary?.defeated ? '💀' : '🎉' }}</div>
                        <h2 class="text-3xl font-bold mb-2">
                            {{ sessionSummary?.defeated ? '挑戰失敗...' : (sessionSummary?.bossMode ? 'Boss擊敗！' : '關卡完成！') }}
                        </h2>
                        
                        <div class="bg-gradient-to-br from-magic-800 to-magic-900 rounded-2xl p-6 border-2 border-purple-500/30 mb-6">
                            <div v-if="sessionSummary?.bossMode" class="text-center mb-4">
                                <div class="text-5xl">{{ sessionSummary?.defeated ? '💀' : '👑' }}</div>
                                <div class="text-xl font-bold mt-2" :class="sessionSummary?.defeated ? 'text-red-400' : 'text-yellow-400'">
                                    {{ sessionSummary?.defeated ? '下次一定打敗它！' : '恭喜擊敗 Boss！' }}
                                </div>
                            </div>
                            <div class="text-6xl font-bold mb-2" :class="getGradeColor(getGrade(sessionSummary?.accuracy || 0))">
                                {{ getGrade(sessionSummary?.accuracy || 0) }}
                            </div>
                            <div class="grid grid-cols-2 gap-4 text-left mt-4">
                                <div class="text-purple-300">正確</div>
                                <div class="font-bold text-green-400">{{ sessionSummary?.correct || 0 }} 題</div>
                                <div class="text-purple-300">錯誤</div>
                                <div class="font-bold text-red-400">{{ sessionSummary?.wrong || 0 }} 題</div>
                                <div class="text-purple-300">準確率</div>
                                <div class="font-bold">{{ Math.round((sessionSummary?.accuracy || 0) * 100) }}%</div>
                                <div class="text-purple-300">最高連擊</div>
                                <div class="font-bold text-yellow-400">{{ sessionSummary?.maxStreak || 0 }}</div>
                                <div class="text-purple-300">WPM</div>
                                <div class="font-bold text-blue-400">{{ sessionSummary?.wpm || 0 }}</div>
                                <div class="text-purple-300">最佳WPM</div>
                                <div class="font-bold text-yellow-400">{{ player?.stats?.bestWPM || 0 }}</div>
                            </div>
                        </div>
                        
                        <div class="flex gap-4">
                            <button aria-label="再玩一次" @click="retryLevel" class="flex-1 py-3 bg-purple-600 hover:bg-purple-500 rounded-lg font-bold touch-target">
                                再玩一次
                            </button>
                            <button aria-label="返回選單" @click="goToMenu" class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg">
                                返回選單
                            </button>
                        </div>
                    </div>
                    
                    <!-- GAME_OVER (Boss 模式玩家失敗) -->
                    <div v-if="state === 'GAME_OVER'" class="w-full max-w-md text-center animate-slideIn">
                        <div class="text-6xl mb-4">💀</div>
                        <h2 class="text-3xl font-bold mb-2 text-red-400">挑戰失敗...</h2>
                        <p class="text-purple-300 mb-6">勇敢的法师倒下了，Boss 還有一段時間可以休息...</p>
                        
                        <div class="bg-gradient-to-br from-magic-800 to-magic-900 rounded-2xl p-6 border-2 border-red-500/30 mb-6">
                            <div class="text-lg text-purple-300 mb-2">擊敗敵人</div>
                            <div class="text-4xl font-bold text-red-400">{{ BossSystem.enemiesDefeated }}</div>
                            <div class="text-sm text-purple-400 mt-1">敵人</div>
                        </div>
                        
                        <div class="flex gap-4">
                            <button aria-label="再挑戰一次" @click="retryLevel" class="flex-1 py-3 bg-red-600 hover:bg-red-500 rounded-lg font-bold touch-target">
                                再挑戰一次
                            </button>
                            <button aria-label="返回選單" @click="goToMenu" class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg">
                                返回選單
                            </button>
                        </div>
                    </div>
                    
                    <!-- SETTINGS -->
                    <div v-if="state === 'SETTINGS'" class="w-full max-w-md animate-slideIn">
                        <div class="bg-gradient-to-br from-magic-800 to-magic-900 rounded-2xl p-6 border-2 border-purple-500/30">
                            <h2 class="text-2xl font-bold mb-6 text-center">⚙️ 設定</h2>
                            
                            <div class="space-y-4">
                                <div class="flex justify-between items-center">
                                    <span>難度等級</span>
                                    <select 
                                        aria-label="選擇難度等級"
                                        v-model="difficulty.level"
                                        @change="AdaptiveEngine.setLevel(difficulty.level)"
                                        class="px-4 py-2 bg-magic-950 rounded-lg border border-purple-500"
                                    >
                                        <option v-for="(d, idx) in [1,2,3,4,5]" :key="idx" :value="idx+1">
                                            {{ ['輕鬆','簡單','普通','困難','專家'][idx] }}
                                        </option>
                                    </select>
                                </div>
                                
                                <div class="flex justify-between items-center">
                                    <span>音效</span>
                                    <button 
                                        @click="AudioSystem.enabled = !AudioSystem.enabled"
                                        class="px-4 py-2 rounded-lg"
                                        :class="AudioSystem.enabled ? 'bg-green-600' : 'bg-gray-600'"
                                    >
                                        {{ AudioSystem.enabled ? '開' : '關' }}
                                    </button>
                                </div>
                            </div>
                            
                            <div class="mt-6 flex justify-center">
                                <button @click="state = 'HOME'" class="px-6 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg">
                                    ← 返回
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `,
        }).mount('#app');
        
        // 暴露到全域
        window.AdaptiveEngine = AdaptiveEngine;
        window.AudioSystem = AudioSystem;
        window.ScoreSystem = ScoreSystem;
        window.BossSystem = BossSystem;
        window.GameModeManager = GameModeManager;
    </script>
</body>
</html>
