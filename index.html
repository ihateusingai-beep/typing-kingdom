                                {filteredChapters.map(ch => (
                                    <button aria-label={`選擇章節 ${ch.code}`} onPointerDown={()=>{setConfig({...config,chapter:ch.code});setView('game');}}
                                        className="p-3 bg-zinc-900/80 rounded-2xl border border-zinc-800/50 hover:border-zinc-700 hover:bg-zinc-800/80 transition-all flex flex-col items-center gap-1 glass">
                                        <div className="text-2xl font-black text-zinc-600">{ch.code}</div>
                                        <div className="text-sm font-serif font-bold" style={{color:currentMode.accentColor}}>{ch.name}</div>
                                    </button>
                                ))}
                                {filteredChapters.length === 0 && (
                                    <div className="col-span-full text-center py-8 text-zinc-600">
                                        <div className="text-4xl mb-2">🔜</div>
                                        <p className="text-sm">敬請期待</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // ── GAME ──
            if (view === 'game') {
                const gameProps = { chapter: config.chapter, goHome: goBack, onGameEnd: handleGameEnd, metaState };
                switch (config.mode) {
                    case 'rpg':        return <RPGGame {...gameProps}/>;
                    case 'runner':     return <RunnerGame {...gameProps}/>;
                    case 'selfLearn':  return <SelfLearnGame {...gameProps}/>;
                    case 'speed':      return <SpeedGame {...gameProps}/>;
                    case 'vocabulary': return <VocabularyGame {...gameProps}/>;
                    case 'challenge':  return <ChallengeGame {...gameProps}/>;
                    case 'dictation':  return <DictationGame {...gameProps}/>;
                    case 'battle':     return <BattleGame {...gameProps}/>;
                    case 'story':      return <StoryGame {...gameProps}/>;
                    case 'article':    return <ArticleGame {...gameProps}/>;
                    default:           return goBack();
                }
            }

            // ── META SHOP ──
            if (view === 'meta_shop') {
                const buyUpgrade = (type) => {
                    const cfg = META_UPGRADES[type];
                    const lv = metaState.upgrades[type];
                    const cost = Math.floor(cfg.baseCost * Math.pow(cfg.costMult, lv));
                    if (metaState.coins >= cost) { AudioEngine.coin(); setMetaState(prev=>({...prev,coins:prev.coins-cost,upgrades:{...prev.upgrades,[type]:lv+1}})); }
                    else AudioEngine.wrong();
                };
                const unlockArtifact = (artId, cost) => {
                    if (metaState.coins >= cost) { AudioEngine.coin(); setMetaState(prev=>({...prev,coins:prev.coins-cost,unlockedArtifacts:[...prev.unlockedArtifacts,artId]})); }
                    else AudioEngine.wrong();
                };
                const unlockSkill = (skillId, cost) => {
                    if (metaState.coins >= cost) { AudioEngine.coin(); setMetaState(prev=>({...prev,coins:prev.coins-cost,unlockedSkills:[...(prev.unlockedSkills||[]),skillId]})); }
                    else AudioEngine.wrong();
                };
                return (
                    <div className="h-full bg-zinc-950 text-white overflow-y-auto">
                        <div className="sticky top-0 z-30 bg-zinc-950/95 backdrop-blur-xl border-b border-zinc-800/50 px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <button aria-label="返回" onPointerDown={()=>setView('mode_select')} className="bg-zinc-800 p-3 rounded-xl hover:bg-zinc-700 border border-zinc-700/50 transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"><LucideIcon icon={ArrowLeft}/></button>
                                <h2 className="text-2xl font-black text-purple-300 font-display flex items-center gap-2"><LucideIcon icon={GraduationCap}/> 知識聖殿</h2>
                            </div>
                            <div className="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-full border border-gold-500/30">
                                <LucideIcon icon={Coins} className="text-gold-400"/><span className="font-black text-xl text-gold-400">{metaState.coins}</span>
                            </div>
                        </div>

                        <div className="max-w-5xl mx-auto p-6 space-y-12">
                            {/* Upgrades */}
                            <section>
                                <h3 className="text-lg font-bold mb-4 text-purple-200 flex items-center gap-2"><LucideIcon icon={TrendingUp} size={20}/> 基礎能力</h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">{Object.entries(META_UPGRADES).map(([key,cfg])=>{
                                    const lv=metaState.upgrades[key];
                                    const cost=Math.floor(cfg.baseCost*Math.pow(cfg.costMult,lv));
                                    const can=metaState.coins>=cost;
                                    return(<div key={key} className="bg-zinc-900/80 p-5 rounded-2xl border border-zinc-800/50 glass">
                                        <div className="flex items-center gap-3 mb-3">
                                            <div className="p-2 bg-purple-900/40 rounded-xl border border-purple-700/30"><LucideIcon icon={cfg.icon} size={22} className="text-purple-300"/></div>
                                            <div><div className="font-bold">{cfg.name}</div><div className="text-xs text-zinc-500">Lv.{lv} → Lv.{lv+1}</div></div>
                                        </div>
                                        <p className="text-sm text-zinc-400 mb-3">{cfg.desc}</p>
                                        <button aria-label="購買升級" onPointerDown={()=>buyUpgrade(key)} disabled={!can}
                                            className={`w-full py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${can?'bg-gradient-to-r from-yellow-600 to-yellow-500 text-black hover:from-yellow-500 hover:to-yellow-400':'bg-zinc-800 text-zinc-600 cursor-not-allowed'}`}>
                                            <LucideIcon icon={Coins} size={14}/> {cost}
                                        </button>
                                    </div>);
                                })}</div>
                            </section>

                            {/* Skills */}
                            <section>
                                <h3 className="text-lg font-bold mb-4 text-purple-200 flex items-center gap-2"><LucideIcon icon={Sparkles} size={20}/> 技能學習</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">{Object.values(MASTER_SKILL_POOL).filter(s=>s.cost>0).map(skill=>{
                                    const isUn=(metaState.unlockedSkills||[]).includes(skill.id);
                                    const can=metaState.coins>=skill.cost;
                                    return(<div key={skill.id} className={`p-4 rounded-2xl border-2 flex flex-col items-center text-center glass ${isUn?'border-green-500/30 bg-green-900/10':'border-zinc-800/50 bg-zinc-900/50'}`}>
                                        <div className={`p-3 rounded-full mb-2 ${skill.color}`} style={{opacity:isUn?1:0.5}}><LucideIcon icon={skill.icon} size={24} className={isUn?'text-white':'text-zinc-600'}/></div>
                                        <h4 className={`font-bold text-sm ${isUn?'text-white':'text-zinc-600'}`}>{skill.name}</h4>
                                        {isUn?<div className="text-green-400 text-xs font-bold flex items-center mt-2"><LucideIcon icon={CheckCircle} size={12}/> 已學習</div>:
                                            <button aria-label="解鎖技能" onPointerDown={()=>unlockSkill(skill.id,skill.cost)} disabled={!can}
                                                className={`mt-2 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center ${can?'bg-gradient-to-r from-yellow-600 to-yellow-500 text-black':'bg-zinc-800 text-zinc-600'}`}>
                                                <LucideIcon icon={Unlock} size={10}/> {skill.cost}
                                            </button>}
                                    </div>);
                                })}</div>
                            </section>

                            {/* Artifacts */}
                            <section>
                                <h3 className="text-lg font-bold mb-4 text-purple-200 flex items-center gap-2"><LucideIcon icon={Gem} size={20}/> 遺物</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">{RPG_ARTIFACTS.filter(a=>a.unlockCost>0).map(art=>{
                                    const isUn=metaState.unlockedArtifacts.includes(art.id);
                                    const can=metaState.coins>=art.unlockCost;
                                    return(<div key={art.id} className={`p-4 rounded-2xl border-2 flex flex-col items-center text-center glass ${isUn?'border-purple-500/30 bg-purple-900/10':'border-zinc-800/50 bg-zinc-900/50'}`}>
                                        <div className="p-2 mb-2"><LucideIcon icon={art.icon} size={28} className={isUn?'text-purple-300':'text-zinc-700'}/></div>
                                        <h4 className={`font-bold text-sm ${isUn?'text-white':'text-zinc-600'}`}>{art.name}</h4>
                                        <p className="text-xs text-zinc-500 mb-2">{art.desc}</p>
                                        {isUn?<div className="text-green-400 text-xs font-bold flex items-center"><LucideIcon icon={CheckCircle} size={12}/> 已解鎖</div>:
                                            <button aria-label="解鎖神器" onPointerDown={()=>unlockArtifact(art.id,art.unlockCost)} disabled={!can}
                                                className={`mt-1 px-3 py-1.5 rounded-lg text-xs font-bold flex items ${can?'bg-gradient-to-r from-yellow-600 to-yellow-500 text-black':'bg-zinc-800 text-zinc-600'}`}>
                                                <LucideIcon icon={Unlock} size={10}/> {art.unlockCost}
                                            </button>}
                                    </div>);
                                })}</div>
                            </section>
                        </div>
                    </div>
                );
            }

            // ── LEADERBOARD MODAL ──
            if (view === 'leaderboard') {
                return <LeaderboardModal onClose={() => setView('mode_select')} />;
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App/>);
    </script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
