                    <button aria-label="返回" onPointerDown={goHome} className="bg-zinc-800 hover:bg-zinc-700 px-8 py-3 rounded-full font-bold border border-zinc-700 min-h-[44px]">返回</button>
                </div>
            );

            return (
                <div className="h-full w-full flex flex-col bg-zinc-950 text-white">
                    <div className="p-3 border-b border-zinc-800/50 flex justify-between items-center bg-rose-950/20">
                        <button aria-label="返回" onPointerDown={goHome} className="bg-zinc-800 p-3 rounded-xl hover:bg-zinc-700 border border-zinc-700/50 min-w-[44px] min-h-[44px] flex items-center justify-center"><LucideIcon icon={ArrowLeft}/></button>
                        <div className="text-sm font-bold text-rose-300">對戰模式</div>
                        <div/>
                    </div>
                    <div className="p-5 flex justify-between items-center">
                        <div className="text-center flex-1">
                            <div className="text-2xl mb-2">👤 你</div>
                            <div className="w-36 h-4 bg-zinc-800 rounded-full overflow-hidden border border-zinc-700/50 mx-auto"><div className="h-full bg-gradient-to-r from-green-600 to-green-400 transition-all" style={{width:`${playerHP}%`}}/></div>
                            <div className="text-xs mt-1 text-green-400">{playerHP}%</div>
                        </div>
                        <div className="text-3xl font-black text-rose-500 px-6 font-display">VS</div>
                        <div className="text-center flex-1">
                            <div className="text-2xl mb-2">🤖 CPU</div>
                            <div className="w-36 h-4 bg-zinc-800 rounded-full overflow-hidden border border-zinc-700/50 mx-auto"><div className="h-full bg-gradient-to-r from-red-600 to-red-400 transition-all" style={{width:`${cpuHP}%`}}/></div>
                            <div className="text-xs mt-1 text-red-400">{cpuHP}%</div>
                        </div>
                    </div>
                    <div className="text-center text-base font-bold text-yellow-400 mb-3 h-6">{log}</div>
                    <div className="flex-1 flex flex-col items-center justify-center p-4">
                        <div className="text-6xl font-serif font-black mb-4 text-rose-100">{currentQ?.char}</div>
                        <div className="text-center text-zinc-500 mb-3 text-sm">全碼：{currentQ?.code} | 提示：{currentQ?.hint}</div>
                        <div className="flex justify-center mb-3 space-x-2 min-h-[48px] flex-wrap">{userInput.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-rose-500/50 rounded-lg flex items-center justify-center text-xl font-bold bg-black/40 text-rose-300">{KEYBOARD_MAP[k]}</div>)}</div>
                        <KeyboardUI inputMode="cangjie" userInput={userInput} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={turn!=='player' || !!feedback} accentColor="#fb7185"/>
                        {turn==='cpu' && <div className="mt-3 text-rose-300/50 text-sm animate-pulse">CPU 思考中...</div>}
                    </div>
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 📜 STORY GAME
        // ───────────────────────────────────────────────────────────────
        const StoryGame = ({ chapter, goHome }) => {
            const STORY = [
                { char:'冒', code:'AM', hint:'日一一', text:'很久以前，有一個勇敢的劍士...' },
                { char:'險', code:'YIHN', hint:'卜戈弓弓', text:'他踏上了尋找真相的旅程...' },
                { char:'旅', code:'LII', hint:'中戈戈', text:'旅途充滿了未知與危險...' },
                { char:'程', code:'HDRHG', hint:'竹木口竹土', text:'但他從未退縮，勇往直前...' },
                { char:'發', code:'NOHNE', hint:'弓人竹水', text:'最終，他發現了古老的秘密...' },
            ];
            const [idx, setIdx] = useState(0);
            const [input, setInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [done, setDone] = useState(false);
            const [stats, setStats] = useState({ correct:0, wrong:0 });
            const currentQ = STORY[idx];

            const handleKey = (key) => {
                if (done || feedback) return;
                const target = currentQ.code;
                const next = [...input, key];
                if (target.startsWith(next.join(''))) {
                    if (next.join('') === target) { AudioEngine.correct(); setFeedback('correct'); setStats(s=>({...s, correct:s.correct+1})); setTimeout(() => { if (idx+1 >= STORY.length) setDone(true); else { setInput([]); setFeedback(null); setIdx(i=>i+1); } }, 700); }
                    else { AudioEngine.click(); setInput(next); }
                } else { AudioEngine.wrong(); setFeedback('wrong'); setStats(s=>({...s, wrong:s.wrong+1})); setInput([]); setTimeout(()=>setFeedback(null),700); }
            };

            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [done, input, feedback, idx]);

            if (done) return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-amber-950 text-white p-8">
                    <LucideIcon icon={Scroll} size={80} className="text-amber-400 mb-6 animate-bounce" />
                    <h2 className="text-3xl font-black mb-2 text-amber-200 font-display">故事完結</h2>
                    <p className="text-amber-200/50 mb-6 italic">"勇敢的心，永不退縮。"</p>
                    <div className="flex gap-4 mb-8">{[{v:stats.correct,l:'正確',c:'text-green-400'},{v:stats.wrong,l:'錯誤',c:'text-red-400'}].map(x => <div key={x.l} className="bg-amber-900/40 p-4 rounded-xl border border-amber-700/30 text-center"><div className={`text-2xl font-black ${x.c}`}>{x.v}</div><div className="text-xs text-amber-200/50">{x.l}</div></div>)}</div>
                    <button aria-label="返回" onPointerDown={goHome} className="bg-amber-700 hover:bg-amber-600 px-8 py-3 rounded-full font-bold border border-amber-600/50 min-h-[44px]">返回</button>
                </div>
            );

            return (
                <div className="h-full w-full flex flex-col bg-gradient-to-b from-amber-900 to-amber-950 text-white">
                    <div className="p-4 border-b border-amber-800/30 flex justify-between items-center bg-amber-900/20">
                        <button aria-label="返回" onPointerDown={goHome} className="bg-amber-900/30 p-3 rounded-xl hover:bg-amber-900/50 border border-amber-700/30 min-w-[44px] min-h-[44px] flex items-center justify-center"><LucideIcon icon={ArrowLeft}/></button>
                        <span className="font-bold text-amber-200">故事模式</span>
                        <span className="text-amber-400 text-sm">{idx+1}/{STORY.length}</span>
                    </div>
                    <div className="p-5 bg-amber-900/10 border-b border-amber-800/20">
                        <p className="text-base italic text-amber-100/70 leading-relaxed">"{currentQ?.text}"</p>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-5">
                        <div className="text-7xl font-serif font-black mb-5 text-amber-100">{currentQ?.char}</div>
                        <div className="text-center text-amber-200/50 mb-3 text-sm">全碼：{currentQ?.code} | 提示：{currentQ?.hint}</div>
                        <div className="flex justify-center mb-4 space-x-2 min-h-[48px] flex-wrap">{input.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-amber-500/40 rounded-lg flex items-center justify-center text-xl font-bold bg-black/40 text-amber-300">{KEYBOARD_MAP[k]}</div>)}</div>
                        <KeyboardUI inputMode="cangjie" userInput={input} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={!!feedback} accentColor="#fbbf24"/>
                    </div>
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 📃 ARTICLE GAME
        // ───────────────────────────────────────────────────────────────
        const ArticleGame = ({ chapter, goHome }) => {
            const ARTICLE = [
                { char:'每', code:'UXXX', hint:'山XXX' },{ char:'日', code:'AM', hint:'日一' },
                { char:'進', code:'NDHH', hint:'弓木竹竹' },{ char:'步', code:'YPU', hint:'卜心山' },
                { char:'學', code:'HIO', hint:'竹戈戈' },{ char:'習', code:'HNI', hint:'竹弓戈' },
                { char:'打', code:'QPA', hint:'手心日' },{ char:'字', code:'JND', hint:'十弓木' },
            ];
            const TOTAL = ARTICLE.length;
            const [idx, setIdx] = useState(0);
            const [input, setInput] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [done, setDone] = useState(false);
            const [stats, setStats] = useState({ correct:0, wrong:0 });
            const currentQ = ARTICLE[idx];

            const handleKey = (key) => {
                if (done || feedback) return;
                const target = currentQ.code;
                const next = [...input, key];
                if (target.startsWith(next.join(''))) {
                    if (next.join('') === target) { AudioEngine.correct(); setFeedback('correct'); setStats(s=>({...s, correct:s.correct+1})); setTimeout(() => { if (idx+1 >= TOTAL) setDone(true); else { setInput([]); setFeedback(null); setIdx(i=>i+1); } }, 500); }
                    else { AudioEngine.click(); setInput(next); }
                } else { AudioEngine.wrong(); setFeedback('wrong'); setStats(s=>({...s, wrong:s.wrong+1})); setInput([]); setTimeout(()=>setFeedback(null),700); }
            };

            useEffect(() => { const h = e => { const k = e.key.toUpperCase(); if (/^[A-Z]$/.test(k)) handleKey(k); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, [done, input, feedback, idx]);

            if (done) return (
                <div className="h-full w-full flex flex-col items-center justify-center bg-emerald-950 text-white p-8">
                    <LucideIcon icon={Book} size={80} className="text-emerald-400 mb-6 animate-bounce" />
                    <h2 className="text-3xl font-black mb-2 text-emerald-200 font-display">文章完成！</h2>
                    <div className="flex gap-4 mb-8">{[{v:stats.correct,l:'正確',c:'text-green-400'},{v:stats.wrong,l:'錯誤',c:'text-red-400'}].map(x => <div key={x.l} className="bg-emerald-900/40 p-4 rounded-xl border border-emerald-700/30 text-center"><div className={`text-2xl font-black ${x.c}`}>{x.v}</div><div className="text-xs text-emerald-200/50">{x.l}</div></div>)}</div>
                    <button aria-label="返回" onPointerDown={goHome} className="bg-emerald-700 hover:bg-emerald-600 px-8 py-3 rounded-full font-bold border border-emerald-600/50 min-h-[44px]">返回</button>
                </div>
            );

            return (
                <div className="h-full w-full flex flex-col bg-gradient-to-b from-emerald-900 to-emerald-950 text-white">
                    <div className="p-4 border-b border-emerald-800/30 flex justify-between items-center bg-emerald-900/20">
                        <button aria-label="返回" onPointerDown={goHome} className="bg-emerald-900/30 p-3 rounded-xl hover:bg-emerald-900/50 border border-emerald-700/30 min-w-[44px] min-h-[44px] flex items-center justify-center"><LucideIcon icon={ArrowLeft}/></button>
                        <span className="font-bold text-emerald-200">文章模式</span>
                        <span className="text-emerald-400 text-sm">{idx+1}/{TOTAL}</span>
                    </div>
                    <div className="flex gap-1 px-4 py-2 bg-emerald-950/50">
                        {ARTICLE.map((_, i) => <div key={i} className={`h-2 flex-1 rounded-full transition-colors ${i<idx?'bg-emerald-500':i===idx?'bg-yellow-400 animate-pulse':'bg-zinc-700'}`}/>)}
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-5">
                        <div className="text-7xl font-serif font-black mb-5 text-emerald-100">{currentQ?.char}</div>
                        <div className="text-center text-emerald-200/50 mb-3 text-sm">全碼：{currentQ?.code} | 提示：{currentQ?.hint}</div>
                        <div className="flex justify-center mb-4 space-x-2 min-h-[48px] flex-wrap">{input.map((k,i)=><div key={i} className="w-11 h-11 border-2 border-emerald-500/40 rounded-lg flex items-center justify-center text-xl font-bold bg-black/40 text-emerald-300">{KEYBOARD_MAP[k]}</div>)}</div>
                        <KeyboardUI inputMode="cangjie" userInput={userInput} currentQ={currentQ} monster={{}} onKey={handleKey} disabled={!!feedback} accentColor="#4ade80"/>
                    </div>
                </div>
            );
        };

        // ───────────────────────────────────────────────────────────────
        // 🏠 APP 主體
        // ───────────────────────────────────────────────────────────────

        // ── LEADERBOARD MODAL (P1b) ──
        const LeaderboardModal = ({ onClose }) => {
            const [entries, setEntries] = useState({ all: [], weekly: [] });
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('all');

            useEffect(() => {
                const API_URL = window.TYPING_KINGDOM_API_URL || (window.location.protocol === 'https:' ? 'https://locally-ultram-fall-mile.trycloudflare.com' : 'http://localhost:3000');
                Promise.all([
                    fetch(`${API_URL}/api/leaderboard`).then(r => r.ok ? r.json() : []).catch(() => []),
                    fetch(`${API_URL}/api/leaderboard/weekly`).then(r => r.ok ? r.json() : []).catch(() => [])
                ]).then(([all, weekly]) => {
                    setEntries({ all, weekly });
                    setLoading(false);
                });
            }, []);

            const tab = activeTab === 'weekly' ? entries.weekly : entries.all;
            const medals = ['🥇','🥈','🥉'];

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4" onPointerDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
                    <div className="bg-gradient-to-b from-zinc-900 to-zinc-950 rounded-3xl border border-zinc-700 w-full max-w-md max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
                        <div className="p-6 pb-4 border-b border-zinc-800">
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-2xl font-black text-yellow-400 flex items-center gap-2">
                                    <LucideIcon icon={Trophy} size={24} className="text-yellow-400"/> 排行榜
                                </h2>
                                <button onPointerDown={onClose} className="w-10 h-10 rounded-xl bg-zinc-800 hover:bg-zinc-700 flex items-center justify-center text-zinc-400 transition-colors">
                                    <LucideIcon icon={X} size={18}/>
                                </button>
                            </div>
                            <div className="flex gap-2">
                                <button onPointerDown={() => setActiveTab('all')} className={`flex-1 py-2 rounded-xl font-bold text-sm transition-all ${activeTab === 'all' ? 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/40' : 'bg-zinc-800 text-zinc-400 border border-zinc-700'}`}>🏆 全部時間</button>
                                <button onPointerDown={() => setActiveTab('weekly')} className={`flex-1 py-2 rounded-xl font-bold text-sm transition-all ${activeTab === 'weekly' ? 'bg-blue-500/20 text-blue-400 border border-blue-500/40' : 'bg-zinc-800 text-zinc-400 border border-zinc-700'}`}>📅 本週</button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {loading ? (
                                <div className="text-center py-12 text-zinc-500">載入中...</div>
                            ) : tab.length === 0 ? (
                                <div className="text-center py-12 text-zinc-600">
                                    <div className="text-5xl mb-3">📭</div>
                                    <p className="text-zinc-500 font-bold">暫時沒有數據</p>
                                    <p className="text-zinc-600 text-sm mt-1">快啲去玩遊戲啦！</p>
                                </div>
                            ) : tab.map((p, i) => (
                                <div key={i} className={`flex items-center gap-3 p-3 rounded-2xl border transition-all ${i === 0 ? 'bg-yellow-500/10 border-yellow-500/30' : i === 1 ? 'bg-zinc-800/60 border-zinc-600/40' : i === 2 ? 'bg-orange-500/10 border-orange-500/30' : 'bg-zinc-900/40 border-zinc-800/40'}`}>
                                    <div className={`w-9 h-9 rounded-xl flex items-center justify-center font-black text-sm ${i === 0 ? 'bg-yellow-500 text-black' : i === 1 ? 'bg-zinc-400 text-black' : i === 2 ? 'bg-orange-500 text-black' : 'bg-zinc-800 text-zinc-500'}`}>
                                        {i < 3 ? medals[i] : i + 1}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="font-black text-white truncate">{p.nickname}</div>
                                        <div className="text-xs text-zinc-500">{p.games_played || 1} 場</div>
                                    </div>
                                    <div className="text-right flex-shrink-0">
                                        <div className="font-black text-yellow-400">{Number(p.total_score || p.weekly_score || 0).toLocaleString()}</div>
                                        <div className="text-xs text-zinc-500">分</div>
                                    </div>
                                    {p.highest_wpm > 0 && (
                                        <div className="text-right flex-shrink-0">
                                            <div className="font-black text-blue-400">{p.highest_wpm}</div>
                                            <div className="text-xs text-zinc-500">WPM</div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [userName, setUserName] = useState('');
            const [config, setConfig] = useState({ mode:null, chapter:null });
            const [selectedCategory, setSelectedCategory] = useState('all'); // P1a: category filter
            const [metaState, setMetaState] = useState({
                coins:0, upgrades:{hp:0,atk:0,exp:0},
                unlockedArtifacts:['wand_1','robe_1','ring_1','boots_1'],
                unlockedSkills:['heal','burst'],
                stats:{ totalCorrect:0, totalWrong:0, gamesPlayed:0, highestCombo:0 },
                avatar:'hero'
            });
            const [audioMuted, setAudioMuted] = useState(() => {
                try { return localStorage.getItem('audioMuted') === 'true'; } catch(e) { return false; }
            });

            // Load saved meta on mount
            useEffect(() => {
try {
                const s = localStorage.getItem('speedy_adventure_meta');
                if (s) { const p = JSON.parse(s); setMetaState(prev=>({...prev,...p.metaState,stats:{...prev.stats,...(p.metaState?.stats||{})}})); setUserName(p.userName||''); }
            } catch(e) {}
            // Cloud load meta_state from server if player exists
            const API_URL = window.TYPING_KINGDOM_API_URL || (window.location.protocol === 'https:' ? 'https://locally-ultram-fall-mile.trycloudflare.com' : 'http://localhost:3000');
            const storedName = (() => { try { return JSON.parse(localStorage.getItem('speedy_adventure_meta')||'{}').userName||''; } catch(e) { return ''; } })();
            if (serverOnline && storedName) {
                fetch(`${API_URL}/api/player/${encodeURIComponent(storedName)}`)
                    .then(r => r.ok ? r.json() : null)
                    .then(data => {
                        if (data && data.meta_state) {
                            setMetaState(prev => ({ ...prev, ...data.meta_state, stats: { ...prev.stats, ...(data.meta_state.stats||{}) } }));
                        }
                    })
                    .catch(() => {});
            }
            }, []);
            useEffect(() => { try { localStorage.setItem('speedy_adventure_meta', JSON.stringify({metaState, userName})); } catch(e) {} }, [metaState, userName]);
            useEffect(() => { try { localStorage.setItem('audioMuted', String(audioMuted)); AudioEngine.muted = audioMuted; } catch(e) {} }, [audioMuted]);
            const toggleSound = () => setAudioMuted(m => !m);

            // Multiplayer Socket
            const [socket, setSocket] = useState(null);
            const [serverOnline, setServerOnline] = useState(true);
            const [multiplayerState, setMultiplayerState] = useState({
                connected: false,
                inRoom: false,
                roomId: null,
                players: [],
                questions: [],
                gameStarted: false,
                myProgress: 0,
                rankings: []
            });

            useEffect(() => {
                // Connect to server
                const SERVER_URL = window.TYPING_KINGDOM_SERVER_URL || (window.location.protocol === 'https:' ? 'https://locally-ultram-fall-mile.trycloudflare.com' : 'http://localhost:3000');
                const s = io(SERVER_URL, {
                    transports: ['websocket', 'polling']
                });
                setSocket(s);
                s.on('connect', () => {
                    setMultiplayerState(prev => ({ ...prev, connected: true }));
                    setServerOnline(true);
                });
                s.on('connect_error', () => {
                    setServerOnline(false);
                });
                s.on('disconnect', () => {
                    setMultiplayerState(prev => ({ ...prev, connected: false }));
                    setServerOnline(false);
                });
                // Handle reconnection: restore room state if player was in a room
                s.on('reconnect_attempt', () => {
                    // Store last room info for restoration
                });
                s.on('reconnect', () => {
                    setServerOnline(true);
                    setMultiplayerState(prev => {
                        if (prev.roomId && prev.inRoom) {
                            // Rejoin room if we were in one (emit from multiplayer view's useEffect)
                            return { ...prev, connected: true };
                        }
                        return { ...prev, connected: true };
                    });
                });
                s.on('room_created', (data) => {
                    setMultiplayerState(prev => ({ ...prev, roomId: data.roomId, inRoom: true }));
                });
                s.on('player_joined', (data) => {
                    setMultiplayerState(prev => ({ ...prev, players: data.players }));
                });
                s.on('player_left', (data) => {
                    setMultiplayerState(prev => ({ ...prev, players: data.players }));
                });
                s.on('player_ready', (data) => {
                    setMultiplayerState(prev => ({ ...prev, players: data.players }));
                });
                s.on('game_start', (data) => {
                    setMultiplayerState(prev => ({ ...prev, questions: data.questions, gameStarted: true }));
                    setView('multiplayer_battle');
                });
                s.on('answer_result', (data) => {
                    // Update leaderboard during game
                });
                s.on('game_end', (data) => {
                    setMultiplayerState(prev => ({ ...prev, rankings: data.rankings, gameStarted: false }));
                    // Note: do NOT switch views here — battle view handles game_end via its own socket listener
                });
                s.on('error', (data) => {
                    alert(data.message);
                });
                return () => s.disconnect();
            }, []);

            const createRoom = (nickname, difficulty) => {
                const roomId = 'room_' + Math.random().toString(36).substr(2, 8);
                socket.emit('create_room', { roomId, nickname, difficulty });
            };

            const joinRoom = (roomId, nickname) => {
                socket.emit('join_room', { roomId, nickname });
                setMultiplayerState(prev => ({ ...prev, roomId }));
            };

            const toggleReady = () => {
                socket.emit('toggle_ready');
            };

            const submitAnswer = (word, timeMs) => {
                socket.emit('submit_answer', { word, timeMs });
                setMultiplayerState(prev => ({ ...prev, myProgress: prev.myProgress + 1 }));
            };

            const leaveRoom = () => {
                socket.emit('leave_room');
                setMultiplayerState(prev => ({ ...prev, inRoom: false, roomId: null, players: [], questions: [], gameStarted: false }));
            };

            // Multiplayer Lobby View
            if (view === 'multiplayer_lobby') {
                const { connected, inRoom, roomId, players, gameStarted, rankings } = multiplayerState;
                const [lobbyLeaderboard, setLobbyLeaderboard] = useState([]);

                // Fetch leaderboard when lobby mounts
                useEffect(() => {
                    if (!serverOnline) return;
                    fetch(`${API_URL}/api/leaderboard`)
                        .then(r => r.json())
                        .then(data => {
                            const top = Array.isArray(data) ? data.slice(0, 5) : [];
                            setLobbyLeaderboard(top);
                        })
                        .catch(() => {});
                }, [serverOnline]);
                return (
                    <div className="h-full bg-zinc-950 flex flex-col items-center justify-center p-6">
                        <div className="w-full max-w-lg">
                            <div className="flex items-center gap-4 mb-8">
                                <button onPointerDown={() => setView('mode_select')} className="bg-zinc-800 p-3 rounded-xl border border-zinc-700 min-w-[44px] min-h-[44px] flex items-center justify-center"><LucideIcon icon={ArrowLeft}/></button>
                                <h2 className="text-2xl font-black text-white font-display flex items-center gap-2"><LucideIcon icon={SwordsIcon} className="text-rose-400"/> 多人對戰大廳</h2>
                                <div className={`ml-auto px-3 py-1 rounded-full text-xs font-bold ${connected ? 'bg-green-900 text-green-400' : 'bg-red-900 text-red-400'}`}>{connected ? '已連接' : '未連接'}</div>
                            </div>
                            {!inRoom ? (
                                <div className="space-y-6">
                                    <div className="glass-strong p-6 rounded-2xl">
                                        <h3 className="text-lg font-bold text-white mb-4">創建房間</h3>
                                        <button onPointerDown={() => { createRoom(userName, 'normal'); }} className="w-full py-4 rounded-xl font-bold text-lg bg-gradient-to-r from-purple-600 to-rose-600 text-white shadow-lg">建立新房間</button>
                                    </div>
                                    <div className="glass-strong p-6 rounded-2xl">
                                        <h3 className="text-lg font-bold text-white mb-4">加入房間</h3>
                                        <input id="roomCodeInput" className="w-full p-4 bg-zinc-800 border border-zinc-600 rounded-xl text-center text-white placeholder-zinc-500 mb-4" placeholder="輸入房間代碼"/>
                                        <button onPointerDown={() => { const code = document.getElementById('roomCodeInput').value; if(code) joinRoom(code, userName); }} className="w-full py-4 rounded-xl font-bold text-lg bg-zinc-700 hover:bg-zinc-600 text-white">加入</button>
                                    </div>
                                    <div className="glass-strong p-4 rounded-2xl">
                                        <h4 className="text-sm font-bold text-zinc-400 mb-3 flex items-center gap-2"><LucideIcon icon={Trophy} size={14}/> 當前排行榜</h4>
                                        {lobbyLeaderboard.length === 0 ? (
                                            <div className="text-zinc-600 text-sm py-2">暫無排名</div>
                                        ) : (
                                            <div className="space-y-2">
                                                {lobbyLeaderboard.map((entry, i) => (
                                                    <div key={i} className="flex items-center gap-3 text-sm">
                                                        <span className={`w-5 text-center font-bold ${i === 0 ? 'text-yellow-400' : i === 1 ? 'text-zinc-300' : 'text-zinc-500'}`}>{i + 1}</span>
                                                        <span className="text-white font-bold flex-1 truncate">{entry.nickname}</span>
                                                        <span className="text-purple-400 font-mono">{entry.total_score} 分</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        <button onPointerDown={()=>{AudioEngine.click();setView('leaderboard');}} className="mt-3 w-full py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-400 text-sm font-bold">查看完整排行榜</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="glass-strong p-6 rounded-2xl text-center">
                                        <div className="text-sm text-zinc-400 mb-2">房間代碼</div>
                                        <div className="flex items-center justify-center gap-3 mb-4">
                                            <div className="text-3xl font-black text-purple-400 font-mono tracking-wider">{roomId}</div>
                                            <button onPointerDown={()=>{navigator.clipboard.writeText(roomId); AudioEngine.click();}} className="p-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-zinc-400"><LucideIcon icon={Copy} size={18}/></button>
                                        </div>
                                        <div className="text-sm text-zinc-400 mb-4">玩家 {players.length}</div>
                                        <div className="flex flex-wrap gap-2 justify-center mb-6">
                                            {players.map((p, i) => (
                                                <div key={i} className="px-4 py-2 bg-zinc-800 rounded-full text-white font-bold">{p}</div>
                                            ))}
                                        </div>
                                        {!gameStarted ? (
                                            <button onPointerDown={toggleReady} className="w-full py-4 rounded-xl font-bold text-lg bg-gradient-to-r from-green-600 to-emerald-600 text-white shadow-lg animate-pulse">準備完成！</button>
                                        ) : (
                                            <div className="text-center text-white">
                                                <div className="text-2xl font-bold text-yellow-400 animate-pulse">等待其他玩家...</div>
                                            </div>
                                        )}
                                    </div>
                                    {rankings.length > 0 && (
                                        <div className="glass-strong p-6 rounded-2xl">
                                            <h3 className="text-lg font-bold text-white mb-4">🏆 比賽結果</h3>
                                            {rankings.map((r, i) => (
                                                <div key={i} className={`flex items-center gap-4 py-3 ${i === 0 ? 'text-yellow-400' : 'text-zinc-300'}`}>
                                                    <div className="text-2xl font-black">{i + 1}</div>
                                                    <div className="text-xl font-bold">{r.nickname}</div>
                                                    <div className="ml-auto text-lg">{r.wpm} WPM</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <button onPointerDown={leaveRoom} className="w-full py-3 rounded-xl font-bold bg-zinc-800 hover:bg-zinc-700 text-zinc-400">離開房間</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // Multiplayer Battle View (P2 — fixed)
            if (view === 'multiplayer_battle') {
                // Use local state for game so it doesn't depend on stale multiplayerState
                const [localProgress, setLocalProgress] = useState(0);
                const [localQuestions, setLocalQuestions] = useState([]);
                const [gamePhase, setGamePhase] = useState('waiting'); // waiting | countdown | playing | done
                const [countdown, setCountdown] = useState(3);
                const [qStartTime, setQStartTime] = useState(Date.now());
                const [gameTimer, setGameTimer] = useState(60);
                const [myScore, setMyScore] = useState(0);
                const [lastResult, setLastResult] = useState(null); // null | 'correct' | 'wrong'
                const [playerScores, setPlayerScores] = useState({});
                const [rankings, setRankings] = useState([]);
                const inputRef = useRef(null);

                const { connected, inRoom, roomId } = multiplayerState;
                const currentQ = localQuestions[localProgress];
                const myNickname = userName;

                // Sync questions when game_start arrives
                useEffect(() => {
                    if (multiplayerState.questions && multiplayerState.questions.length > 0 && gamePhase === 'waiting') {
                        setLocalQuestions(multiplayerState.questions);
                        setLocalProgress(0);
                        setGamePhase('countdown');
                        setMyScore(0);
                        setPlayerScores({});
                        setRankings([]);
                        setGameTimer(60);
                        setQStartTime(Date.now());
                    }
                }, [multiplayerState.questions]);

                // Countdown sequence
                useEffect(() => {
                    if (gamePhase !== 'countdown') return;
                    setCountdown(3);
                    let remaining = 3;
                    const interval = setInterval(() => {
                        remaining--;
                        if (remaining <= 0) {
                            clearInterval(interval);
                            setGamePhase('playing');
                            // Start game timer
                            const timerInterval = setInterval(() => {
                                setGameTimer(t => {
                                    if (t <= 1) {
                                        clearInterval(timerInterval);
                                        setGamePhase('done');
                                        return 0;
                                    }
                                    return t - 1;
                                });
                            }, 1000);
                        } else {
                            setCountdown(remaining);
                        }
                    }, 1000);
                    return () => clearInterval(interval);
                }, [gamePhase]);

                // Listen for answer_result from server
                useEffect(() => {
                    if (!socket) return;
                    const handleAnswerResult = (data) => {
                        if (data.correct) {
                            AudioEngine.correct();
                        } else {
                            AudioEngine.wrong();
                        }
                        setPlayerScores(prev => ({
                            ...prev,
                            [data.nickname || 'unknown']: (prev[data.nickname || 'unknown'] || 0) + (data.correct ? 1 : 0)
                        }));
                    };
                    const handleGameEnd = (data) => {
                        setRankings(data.rankings || []);
                        setGamePhase('done');
                    };
                    socket.on('answer_result', handleAnswerResult);
                    socket.on('game_end', handleGameEnd);
                    return () => {
                        socket.off('answer_result', handleAnswerResult);
                        socket.off('game_end', handleGameEnd);
                    };
                }, [socket]);

                const handleSubmit = (word) => {
                    if (gamePhase !== 'playing' || !currentQ) return;
                    const timeMs = Date.now() - qStartTime;
                    const correct = currentQ.text === word;
                    if (correct) {
                        AudioEngine.correct();
                        setMyScore(s => s + 100);
                    } else {
                        AudioEngine.wrong();
                    }
                    setLastResult(correct ? 'correct' : 'wrong');
                    setTimeout(() => setLastResult(null), 500);
                    submitAnswer(word, timeMs);
                    setQStartTime(Date.now());
                    const next = localProgress + 1;
                    if (next >= localQuestions.length) {
                        setGamePhase('done');
                    } else {
                        setLocalProgress(next);
                    }
                    if (inputRef.current) {
                        inputRef.current.value = '';
                        inputRef.current.focus();
                    }
                };

                const timerMin = Math.floor(gameTimer / 60);
                const timerSec = gameTimer % 60;
                const timerDisplay = `${timerMin}:${String(timerSec).padStart(2, '0')}`;

                // Sort players by score for live ranking
                const sortedPlayers = Object.entries(playerScores).sort((a, b) => b[1] - a[1]);

                return (
                    <div className="h-full bg-battle flex flex-col items-center justify-center p-6">
                        {/* Offline Banner */}
                        {!serverOnline && (
                            <div className="w-full max-w-3xl mb-4 p-3 bg-red-900/80 border border-red-500/50 rounded-xl text-center">
                                <span className="text-red-300 font-bold text-sm">⚠️ 伺服器已斷開連接</span>
                            </div>
                        )}

                        <div className="w-full max-w-3xl">
                            {/* Header */}
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-2">
                                    <LucideIcon icon={Timer} className="text-rose-400"/>
                                    <span className={`text-3xl font-black font-mono ${gameTimer <= 10 ? 'text-red-400 animate-pulse' : 'text-white'}`}>{timerDisplay}</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <LucideIcon icon={Target} className="text-purple-400"/>
                                    <span className="text-2xl font-black text-white">{myScore}</span>
                                </div>
                                <button onPointerDown={() => { leaveRoom(); setGamePhase('waiting'); setView('multiplayer_lobby'); }} className="px-4 py-2 rounded-xl bg-zinc-800 hover:bg-zinc-700 text-zinc-400 text-sm font-bold border border-zinc-700">離開</button>
                            </div>

                            {/* Waiting for players */}
                            {gamePhase === 'waiting' && (
                                <div className="text-center py-16">
                                    <div className="text-5xl mb-4 animate-pulse">⏳</div>
                                    <h2 className="text-2xl font-black text-white mb-2">等待其他玩家...</h2>
                                    <p className="text-zinc-400">伺服器分配題目中</p>
                                </div>
                            )}

                            {/* Countdown */}
                            {gamePhase === 'countdown' && (
                                <div className="text-center py-16">
                                    <div className="text-9xl font-black text-rose-400 animate-pulse">
                                        {countdown > 0 ? countdown : 'GO!'}
                                    </div>
                                    <div className="text-2xl text-zinc-400 mt-4">準備好！</div>
                                </div>
                            )}

                            {/* Playing */}
                            {gamePhase === 'playing' && currentQ && (
                                <>
                                    <div className="glass-strong p-8 rounded-2xl text-center mb-6">
                                        <div className={`text-3xl font-black text-white mb-2 tracking-wider ${lastResult === 'correct' ? 'text-green-400' : lastResult === 'wrong' ? 'text-red-400' : ''}`}>
                                            {currentQ.text || '...'}
                                        </div>
                                        <div className="text-sm text-zinc-500 mb-6">倉頡：{currentQ.code || currentQ.hint || '—'}</div>
                                        <input ref={inputRef} autoFocus
                                            className={`w-full p-4 bg-zinc-800 border-2 rounded-xl text-center text-2xl text-white outline-none transition-colors ${lastResult === 'correct' ? 'border-green-500' : lastResult === 'wrong' ? 'border-red-500 animate-shake' : 'border-purple-500'}`}
                                            placeholder="輸入答案後按 Enter..."
                                            onKeyDown={(e) => {
                                                if (e.key === 'Enter' && inputRef.current && inputRef.current.value.trim()) {
                                                    handleSubmit(inputRef.current.value.trim());
                                                    inputRef.current.value = '';
                                                }
                                            }}
                                        />
                                        <div className="mt-4 text-zinc-500 text-sm">按 Enter 提交</div>
                                    </div>

                                    {/* Progress bar */}
                                    <div className="mb-4">
                                        <div className="flex justify-between text-sm text-zinc-400 mb-2">
                                            <span>你的進度</span>
                                            <span>{localProgress + 1} / {localQuestions.length}</span>
                                        </div>
                                        <div className="h-3 bg-zinc-800 rounded-full overflow-hidden">
                                            <div className="h-full bg-gradient-to-r from-purple-600 to-rose-600 transition-all duration-300" style={{width: `${((localProgress + 1) / localQuestions.length) * 100}%`}}/>
                                        </div>
                                    </div>

                                    {/* Live ranking */}
                                    <div className="glass-strong p-4 rounded-2xl">
                                        <h4 className="text-sm font-bold text-zinc-400 mb-3 flex items-center gap-2"><LucideIcon icon={TrendingUp} size={14}/> 實時排名</h4>
                                        {sortedPlayers.length === 0 ? (
                                            <div className="text-zinc-600 text-sm">等待玩家回答...</div>
                                        ) : sortedPlayers.map(([nick, correct], i) => (
                                            <div key={i} className="flex items-center gap-3 py-1.5">
                                                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${i === 0 ? 'bg-yellow-500 text-black' : 'bg-zinc-700 text-zinc-300'}`}>{i + 1}</div>
                                                <div className={`flex-1 font-bold ${nick === myNickname ? 'text-purple-400' : 'text-white'}`}>{nick}{nick === myNickname ? ' (你)' : ''}</div>
                                                <div className="text-purple-400 font-mono text-sm">{correct} 題</div>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}

                            {/* Done */}
                            {gamePhase === 'done' && (
                                <div className="text-center py-8">
                                    <h2 className="text-3xl font-black text-yellow-400 mb-2">🏆 比賽結束！</h2>
                                    {rankings.length > 0 ? (
                                        <div className="glass-strong p-6 rounded-2xl mt-4 text-left max-w-sm mx-auto">
                                            {rankings.map((r, i) => (
                                                <div key={i} className={`flex items-center gap-4 py-3 border-b border-zinc-800 last:border-0 ${i === 0 ? 'text-yellow-400' : 'text-zinc-300'}`}>
                                                    <div className="text-2xl font-black w-8">{i + 1}</div>
                                                    <div className="flex-1 font-black">{r.nickname}</div>
                                                    <div className="text-sm">{r.wpm} WPM</div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-zinc-400 mt-4">結算中...</div>
                                    )}
                                    <button onPointerDown={() => { setView('multiplayer_lobby'); }} className="mt-8 px-8 py-4 rounded-2xl bg-gradient-to-r from-purple-600 to-rose-600 text-white font-black text-lg shadow-lg">返回大廳</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            const goHome = () => setView('mode_select');
            const goBack = () => { setView('mode_select'); setConfig({mode:null, chapter:null}); setSelectedCategory('all'); };

            const handleGameEnd = (coinsEarned, sessionStats) => {
                setMetaState(prev => ({
                    ...prev, coins: prev.coins + (coinsEarned||0),
                    stats: {
                        totalCorrect: prev.stats.totalCorrect + (sessionStats?.correct||0),
                        totalWrong: prev.stats.totalWrong + (sessionStats?.wrong||0),
                        gamesPlayed: prev.stats.gamesPlayed + 1,
                        highestCombo: Math.max(prev.stats.highestCombo, (sessionStats?.maxCombo||0))
                    }
                }));

                // Cloud Save — submit to server (fire and forget)
                const API_URL = window.TYPING_KINGDOM_API_URL || (window.location.protocol === 'https:' ? 'https://locally-ultram-fall-mile.trycloudflare.com' : 'http://localhost:3000');
                const total = (sessionStats?.correct||0) + (sessionStats?.wrong||0);
                const accuracy = total > 0 ? Math.round((sessionStats.correct / total) * 100) : 0;
                const wpm = sessionStats?.wpm || 0;
                const score = (sessionStats?.correct||0) * 10 + (sessionStats?.maxCombo||0) * 5;
                fetch(`${API_URL}/api/game_record`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nickname: userName,
                        wpm,
                        accuracy,
                        score,
                        game_mode: config?.mode || 'rpg',
                        category: config?.chapter || null
                    })
                }).catch(() => {}); // silently fail — localStorage is backup

                // Cloud save meta_state to server (fire and forget)
                if (userName && serverOnline) {
                    fetch(`${API_URL}/api/player/${encodeURIComponent(userName)}/meta_state`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            meta_state: {
                                coins: metaState.coins + (coinsEarned||0),
                                upgrades: metaState.upgrades,
                                unlockedArtifacts: metaState.unlockedArtifacts,
                                unlockedSkills: metaState.unlockedSkills,
                                stats: {
                                    totalCorrect: metaState.stats.totalCorrect + (sessionStats?.correct||0),
                                    totalWrong: metaState.stats.totalWrong + (sessionStats?.wrong||0),
                                    gamesPlayed: metaState.stats.gamesPlayed + 1,
                                    highestCombo: Math.max(metaState.stats.highestCombo, (sessionStats?.maxCombo||0))
                                },
                                avatar: metaState.avatar
                            }
                        })
                    }).catch(() => {});
                }

                goHome();
            };

            const handleExportSave = () => {
                const blob = new Blob([JSON.stringify({metaState, userName})], {type:'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href=url; a.download='typing_kingdom_backup.json';
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            const handleImportSave = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            const data = JSON.parse(ev.target.result);
                            if (data.metaState && data.userName) {
                                setMetaState(prev => ({...prev, ...data.metaState, stats: {...prev.stats, ...(data.metaState.stats||{})}}));
                                setUserName(data.userName);
                                AudioEngine.levelUp();
                            }
                        } catch(err) { AudioEngine.wrong(); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            };

            // ── HOME ──

                            style={{left:`${10+i*8}%`, top:`${20+Math.sin(i)*30}%`}}
                            animate={{y:[0,-30,0], opacity:[0.3,0.8,0.3]}}
                            transition={{repeat:Infinity, duration:3+i*0.5, delay:i*0.3}}/>

                    <motion.div initial={{scale:0.8, opacity:0}} animate={{scale:1, opacity:1}} transition={{duration:0.6}}
                        className="bg-zinc-900/80 backdrop-blur-xl p-10 rounded-3xl shadow-2xl text-center w-full max-w-md border border-zinc-700/50 glass relative z-10">

                            <div className="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-purple-600 to-purple-900 flex items-center justify-center shadow-lg shadow-purple-900/50 border border-purple-500/30">
                                <LucideIcon icon={Rocket} size={40} className="text-white"/>
                            </div>
                        </motion.div>

                        <p className="text-zinc-500 mb-8 text-sm tracking-widest">TYPEQUEST KINGDOM V55</p>
                        <input className="w-full p-4 bg-zinc-800/80 border border-zinc-600/50 rounded-2xl text-center text-lg mb-6 text-white placeholder-zinc-600 focus:border-purple-500 outline-none transition-colors glass"
                            placeholder="召喚師之名" value={userName} onChange={e=>setUserName(e.target.value)}/>
                        <button aria-label="開始遊戲" disabled={!userName} onPointerDown={()=>{
                            AudioEngine.click();
                            // Cloud load: fetch player stats from server in background
                            if(userName) {
                                const API_URL = window.TYPING_KINGDOM_API_URL || (window.location.protocol === 'https:' ? 'https://locally-ultram-fall-mile.trycloudflare.com' : 'http://localhost:3000');
                                fetch(`${API_URL}/api/player/${encodeURIComponent(userName)}`).then(r=>r.json()).then(serverStats=>{
                                    if(serverStats && serverStats.id) {
                                        // Show cloud badge if player has cloud data
                                        const cloudBadge = document.getElementById('cloudBadge');
                                        if(cloudBadge) cloudBadge.style.display = serverStats.games_played > 0 ? 'inline-flex' : 'none';
                                    }
                                }).catch(()=>{});
                            }
                            setView('mode_select');
                        }}
                            className="w-full py-4 rounded-2xl font-bold text-lg shadow-lg shadow-purple-900/30 flex items-center justify-center gap-3 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                            style={{background:'linear-gradient(135deg, #7c3aed, #5b21b6)'}}>
                            <LucideIcon icon={Play}/> 進入王國
                        </button>
                        <button aria-label="匯出存檔" onPointerDown={handleExportSave} className="text-zinc-600 hover:text-zinc-400 text-xs flex items-center gap-1 mx-auto mt-4 transition-colors min-h-[44px]"><LucideIcon icon={Download} size={12}/> 備份存檔
                        </button>
                        <button aria-label="匯入存檔" onPointerDown={handleImportSave} className="text-zinc-600 hover:text-zinc-400 text-xs flex items-center gap-1 mx-auto mt-2 transition-colors min-h-[44px]"><LucideIcon icon={Upload} size={12}/> 恢復存檔
                        </button>
                    </motion.div>
                </div>
            );

            // ── DASHBOARD ──
            if (view === 'dashboard') {
                const {totalCorrect,totalWrong,gamesPlayed,highestCombo} = metaState.stats;

                return (

                                    <div className="p-3 bg-blue-600/30 rounded-xl"><LucideIcon icon={Cloud} size={24} className="text-blue-400"/></div>
                                    <div>
                                        <div className="text-blue-300 font-bold text-sm">☁️ 雲端數據</div>
                                        <div className="text-zinc-400 text-xs mt-1">雲端遊戲: {serverStats.games_played}次 | 最高WPM: {serverStats.highest_wpm} | 總分: {serverStats.total_score}</div>
                                    </div>
                                </div>
                            </div>

                                    <div className={`p-4 rounded-xl`} style={{background:x.c.replace('text-','rgba(').replace('-400',',0.2)')}}><LucideIcon icon={x.icon} size={24} className={x.c}/></div>
                                </motion.div>
                            ))}

                            <h2 className="text-2xl font-black text-white font-display flex items-center gap-2"><LucideIcon icon={Sword} className="text-amber-400"/> 角色選擇</h2>
                        </div>
                        <div className="grid grid-cols-2 gap-6 max-w-4xl mx-auto">
                            {Object.values(AVATARS).map(av => (
                                <motion.button key={av.id} whileHover={{scale:1.03}} whileTap={{scale:0.97}}
                                    onPointerDown={()=>{AudioEngine.click(); setMetaState(prev=>({...prev, avatar:av.id})); setView('mode_select');}}
                                    className={`relative overflow-hidden rounded-2xl border-2 p-6 text-left transition-all ${metaState.avatar===av.id ? 'border-amber-500 bg-amber-900/20 shadow-lg shadow-amber-500/20':'border-zinc-700 bg-zinc-900 hover:border-zinc-500'}`}>
                                    {av.assetPath ? (
                                        <img src={av.assetPath} alt={av.name} className="w-32 h-32 object-contain mx-auto mb-4 rounded-xl" onError={e=>{e.target.style.display='none';}} style={{opacity:0, transition:'opacity 0.3s'}} onLoad={e=>e.target.style.opacity='1'}/>
                                    ) : (
                                        <div className="w-32 h-32 mx-auto mb-4 rounded-2xl bg-zinc-800 flex items-center justify-center">
                                            <LucideIcon icon={av.icon} size={64} className={av.color}/>
                                        </div>
                                    )}
                                    <div className={`text-xl font-black mb-1 ${av.color}`}>{av.name}</div>
                                    {metaState.avatar===av.id && <div className="text-amber-400 text-sm font-bold">✓ 已選擇</div>}
                                </motion.button>
                            ))}
                        </div>
                        <p className="text-center text-zinc-600 text-xs mt-8">選擇的角色將用於所有單人模式</p>
                    </div>
                );
            }

            // ── MODE SELECT ──
            if (view === 'mode_select') return (
                <div className="h-full bg-zinc-950 overflow-y-auto">
                    {/* Header */}
                    <div className="sticky top-0 z-30 bg-zinc-950/95 backdrop-blur-xl border-b border-zinc-800/50 px-6 py-4">
                        <div className="flex justify-between items-center max-w-5xl mx-auto">
                            <div className="flex items-center gap-4">
                                <div className="w-11 h-11 bg-gradient-to-br from-purple-600 to-purple-900 rounded-xl flex items-center justify-center border border-purple-500/30 shadow-lg shadow-purple-900/20">
                                    <LucideIcon icon={User} size={20} className="text-purple-200"/>
                                </div>
                                <div>
                                    <h2 className="text-lg font-bold text-white">{userName}</h2>
                                    <div className="flex items-center gap-1 text-gold-400 text-sm font-bold">
                                        <LucideIcon icon={Coins} size={13}/> {metaState.coins}
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button aria-label="角色選擇" onPointerDown={()=>setView('avatar_select')} className="bg-zinc-800/80 hover:bg-zinc-700 px-4 py-2 rounded-xl text-amber-400 font-bold flex items-center gap-2 border border-zinc-700/50 transition-colors min-h-[44px]">
                                    <LucideIcon icon={AVATARS[metaState.avatar]?.icon||Sword} size={16}/> {(AVATARS[metaState.avatar]?.name||'選擇角色')}
                                </button>
                                <button aria-label="數據面板" onPointerDown={()=>setView('dashboard')} className="bg-zinc-800/80 hover:bg-zinc-700 px-4 py-2 rounded-xl text-blue-400 font-bold flex items-center gap-2 border border-zinc-700/50 transition-colors min-h-[44px]">
                                    <LucideIcon icon={BarChart3} size={16}/> 儀表板
                                </button>
                                <button aria-label="技能商店" onPointerDown={()=>setView('meta_shop')} className="bg-zinc-800/80 hover:bg-zinc-700 px-4 py-2 rounded-xl text-gold-400 font-bold flex items-center gap-2 border border-zinc-700/50 transition-colors min-h-[44px]">
                                    <LucideIcon icon={ShoppingBag} size={16}/> 知識聖殿
                                </button>
                                <button aria-label="排行榜" onPointerDown={() => { AudioEngine.click(); setView('leaderboard'); }} className="bg-zinc-800/80 hover:bg-zinc-700 px-4 py-2 rounded-xl text-yellow-400 font-bold flex items-center gap-2 border border-zinc-700/50 transition-colors min-h-[44px]">
                                    <LucideIcon icon={Trophy} size={16}/> 排行榜
                                </button>
                                <button aria-label={audioMuted ? '開啟音效' : '靜音'} onPointerDown={toggleSound} className="bg-zinc-800/80 hover:bg-zinc-700 p-3 rounded-xl border border-zinc-700/50 transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center">{audioMuted ? '🔇' : '🔊'}</button>
                                <button aria-label="首頁" onPointerDown={()=>setView('home')} className="bg-zinc-800/80 hover:bg-zinc-700 p-3 rounded-xl border border-zinc-700/50 transition-colors min-w-[44px] min-h-[44px] flex items-center justify-center"><LucideIcon icon={Home} size={18}/></button>
                            </div>
                        </div>
                        {/* Debug info - server status */}
                        <div className="max-w-5xl mx-auto px-6 py-2 flex items-center justify-between text-xs text-zinc-600">
                            <div className="flex items-center gap-2">
                                <span>🔌 伺服器: {serverOnline ? '在線' : '離線'}</span>
                            </div>
                            <div className="text-zinc-700 font-mono">
                                {(window.TYPING_KINGDOM_SERVER_URL || window.TYPING_KINGDOM_API_URL || '').replace(/^https?:\/\//, '') || 'localhost:3000'}
                            </div>
                        </div>
                    </div>

                    {/* Mode grid */}
                    <div className="p-6 max-w-5xl mx-auto">
                        <h3 className="text-zinc-500 text-sm font-bold mb-5 tracking-widest uppercase">選擇模式</h3>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">

                                <motion.button key={mode.id} initial={{opacity:0,y:30}} animate={{opacity:1,y:0}} transition={{delay:i*0.05}}
                                    onPointerDown={()=>{AudioEngine.click(); if(mode.id==='battle'){setConfig({...config,mode:mode.id});setView('multiplayer_lobby');} else {setConfig({...config,mode:mode.id});setView('chapter_select');}}}
                                    className={`mode-card relative overflow-hidden rounded-2xl border-2 glass ${mode.accentBorder} group cursor-pointer`}>

                                    <div className={`absolute inset-0 ${mode.bg} opacity-80`}/>

                                    <div className="absolute inset-0 opacity-40" style={{background: mode.hero, backgroundSize:'cover'}}/>
                                    {/* Shimmer effect */}
                                    <div className="absolute inset-0 bg-gradient-to-b from-transparent to-zinc-950/90 z-10"/>

                                    <div className="relative z-20 p-4 flex flex-col items-center text-center h-full justify-between min-h-[140px]">

                                            <p className="text-[10px] text-zinc-500 leading-tight mb-2">{mode.desc}</p>
                                            <div className="text-[9px] text-zinc-600 italic">{mode.tagline}</div>
                                        </div>
                                    </div>
                                </motion.button>

                        </p>
                    </div>

            if (view === 'chapter_select') {
                const currentMode = GAME_MODES[config.mode];
                const activeCat = CATEGORY_GROUPS.find(c => c.id === selectedCategory) || CATEGORY_GROUPS[0];
                const filteredChapters = activeCat.codes
                    ? CHAPTERS.filter(ch => activeCat.codes.includes(ch.code))
                    : CHAPTERS;
                return (
                    <div className="h-full bg-zinc-950 overflow-y-auto">
                        {/* Mode hero banner */}
                        <div className="relative overflow-hidden" style={{height:'180px'}}>
                            <div className={`absolute inset-0 ${currentMode.bg} opacity-60`} style={{backgroundImage:currentMode.hero, backgroundSize:'cover'}}/>
                            <div className="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-zinc-950"/>
                            <div className="absolute inset-0 flex items-center justify-center">
                                <div className="text-center">
                                    <div className={`p-4 rounded-2xl ${currentMode.accentBg} border ${currentMode.accentBorder} inline-block mb-3`}>
                                        <LucideIcon icon={currentMode.icon} size={40} className={currentMode.color}/>
                                    </div>
                                    <h2 className={`text-3xl font-black font-display ${currentMode.color}`}>{currentMode.name}</h2>
                                    <p className="text-zinc-400 text-sm mt-1">{currentMode.tagline}</p>
                                </div>

                            <button aria-label="返回" onPointerDown={goBack} className="absolute top-4 left-4 bg-zinc-900/80 backdrop-blur p-3 rounded-xl border border-zinc-700/50 hover:bg-zinc-800 transition-colors z-20 min-w-[44px] min-h-[44px] flex items-center justify-center">
                                <LucideIcon icon={ArrowLeft}/>
                            </button>

                        <div className="p-6 max-w-4xl mx-auto">

                            <div className="flex flex-wrap gap-2 mb-5 justify-center">
                                {CATEGORY_GROUPS.map(cat => (
                                    <button key={cat.id} aria-label={`選擇類別 ${cat.name}`}
                                        onPointerDown={()=>{AudioEngine.click();setSelectedCategory(cat.id);}}
                                        className={`px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-1.5 border transition-all min-h-[44px]
                                            ${selectedCategory === cat.id
                                                ? `bg-gradient-to-r ${cat.bg} border-${cat.color} text-white shadow-lg`
                                                : 'bg-zinc-900/60 border-zinc-800 text-zinc-400 hover:border-zinc-700'
                                            }`}
                                        style={selectedCategory === cat.id ? {borderColor: cat.color} : {}}
                                    >
                                        <span>{cat.icon}</span>
                                        <span>{cat.name}</span>
                                    </button>
                                ))}
                            </div>

                            {/* Chapter grid filtered by category */}
                            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
                                <button aria-label="取消選擇" onPointerDown={()=>{setConfig({...config,chapter:null});setView('game');}}
                                    className="col-span-full mb-2 p-4 bg-gradient-to-r from-purple-900/40 to-purple-800/20 border-2 border-purple-500/40 rounded-2xl hover:border-purple-400 transition-all flex flex-col items-center gap-1">
                                    <span className="text-lg font-black text-purple-300">🌐 隨機挑戰</span>
